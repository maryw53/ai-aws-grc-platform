name: Azure
description: Microsoft Azure evidence collection templates

templates:
  mfa_enforcement:
    name: MFA Enforcement Status
    control: MFA enabled for all users
    keywords:
      - mfa
      - multi-factor
      - authentication
    formats:
      python: |
        #!/usr/bin/env python3
        """
        Evidence Collection Script
        Control: MFA enabled for all users
        Provider: Azure
        Generated: {timestamp}
        """

        import json
        from datetime import datetime
        from azure.identity import DefaultAzureCredential
        from msgraph import GraphServiceClient

        def collect_mfa_evidence():
            evidence = {
                "control": "MFA enabled for all users",
                "timestamp": datetime.utcnow().isoformat(),
                "provider": "Azure",
                "results": []
            }

            try:
                credential = DefaultAzureCredential()
                client = GraphServiceClient(credential)

                # Get all users
                users = client.users.get()

                for user in users.value:
                    # Check authentication methods
                    auth_methods = client.users.by_user_id(user.id).authentication.methods.get()

                    has_mfa = any(
                        method.odata_type in [
                            '#microsoft.graph.microsoftAuthenticatorAuthenticationMethod',
                            '#microsoft.graph.phoneAuthenticationMethod',
                            '#microsoft.graph.fido2AuthenticationMethod'
                        ]
                        for method in auth_methods.value
                    )

                    evidence["results"].append({
                        "user": user.user_principal_name,
                        "display_name": user.display_name,
                        "mfa_enabled": has_mfa,
                        "status": "PASS" if has_mfa else "FAIL"
                    })

            except Exception as e:
                evidence["error"] = str(e)
                evidence["status"] = "ERROR"

            return evidence

        if __name__ == "__main__":
            result = collect_mfa_evidence()
            print(json.dumps(result, indent=2))
      bash: |
        #!/bin/bash
        # Evidence Collection Script
        # Control: MFA enabled for all users
        # Provider: Azure
        # Generated: {timestamp}

        set -e

        echo "=== Azure MFA Evidence Collection ==="
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo ""

        echo "--- Checking Azure AD MFA Status ---"
        # List all users and their authentication methods
        echo "Fetching user list..."
        az ad user list --query "[].{UPN:userPrincipalName,DisplayName:displayName,ID:id}" --output table

        echo ""
        echo "--- Conditional Access Policies (MFA Related) ---"
        az rest --method GET --uri "https://graph.microsoft.com/v1.0/identity/conditionalAccess/policies" --query "value[?contains(displayName, 'MFA') || grantControls.builtInControls[?@ == 'mfa']].{Name:displayName,State:state}" --output table 2>/dev/null || echo "Requires Conditional Access policy read permissions"

        echo ""
        echo "--- Security Defaults Status ---"
        az rest --method GET --uri "https://graph.microsoft.com/v1.0/policies/identitySecurityDefaultsEnforcementPolicy" --output yaml 2>/dev/null || echo "Could not retrieve security defaults status"

        echo ""
        echo "--- Per-User MFA Status (Legacy) ---"
        az rest --method GET --uri "https://graph.microsoft.com/v1.0/reports/authenticationMethods/userRegistrationDetails" --query "value[].{UPN:userPrincipalName,MFARegistered:isMfaRegistered}" --output table 2>/dev/null || echo "Requires Reports.Read.All permission"
    instructions: |
      ## Azure CLI Prerequisites

      1. **Install Azure CLI:**
         ```bash
         # macOS
         brew install azure-cli

         # Linux
         curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
         ```

      2. **Login to Azure:**
         ```bash
         az login
         # For service principal:
         az login --service-principal -u <app-id> -p <password> --tenant <tenant>
         ```

      3. **Required permissions:**
         - User.Read.All (MS Graph)
         - UserAuthenticationMethod.Read.All (MS Graph)
         - Reports.Read.All (for registration details)

  storage_encryption:
    name: Storage Account Encryption
    control: Storage accounts encrypted at rest
    keywords:
      - storage
      - encrypt
      - blob
      - data at rest
    formats:
      python: |
        #!/usr/bin/env python3
        """
        Evidence Collection Script
        Control: Storage accounts encrypted at rest
        Provider: Azure
        Generated: {timestamp}
        """

        import json
        from datetime import datetime
        from azure.identity import DefaultAzureCredential
        from azure.mgmt.storage import StorageManagementClient
        from azure.mgmt.resource import SubscriptionClient

        def collect_storage_encryption_evidence():
            evidence = {
                "control": "Storage accounts encrypted at rest",
                "timestamp": datetime.utcnow().isoformat(),
                "provider": "Azure",
                "results": [],
                "summary": {"total": 0, "encrypted": 0, "cmk_encrypted": 0}
            }

            try:
                credential = DefaultAzureCredential()
                sub_client = SubscriptionClient(credential)

                for sub in sub_client.subscriptions.list():
                    storage_client = StorageManagementClient(credential, sub.subscription_id)

                    for account in storage_client.storage_accounts.list():
                        evidence["summary"]["total"] += 1

                        encryption = account.encryption
                        is_encrypted = encryption.services.blob.enabled if encryption.services and encryption.services.blob else False
                        key_source = encryption.key_source if encryption else "Unknown"

                        if is_encrypted:
                            evidence["summary"]["encrypted"] += 1
                            if key_source == "Microsoft.Keyvault":
                                evidence["summary"]["cmk_encrypted"] += 1

                        evidence["results"].append({
                            "subscription": sub.display_name,
                            "storage_account": account.name,
                            "resource_group": account.id.split('/')[4],
                            "encryption_enabled": is_encrypted,
                            "key_source": key_source,
                            "infrastructure_encryption": getattr(encryption, 'require_infrastructure_encryption', False),
                            "status": "PASS" if is_encrypted else "FAIL"
                        })

            except Exception as e:
                evidence["error"] = str(e)
                evidence["status"] = "ERROR"

            return evidence

        if __name__ == "__main__":
            result = collect_storage_encryption_evidence()
            print(json.dumps(result, indent=2))
      bash: |
        #!/bin/bash
        # Evidence Collection Script
        # Control: Storage accounts encrypted at rest
        # Provider: Azure
        # Generated: {timestamp}

        set -e

        echo "=== Azure Storage Encryption Evidence ==="
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo ""

        echo "--- All Storage Accounts with Encryption Status ---"
        az storage account list --query "[].{Name:name,ResourceGroup:resourceGroup,Encryption:encryption.services.blob.enabled,KeySource:encryption.keySource,InfrastructureEncryption:encryption.requireInfrastructureEncryption}" --output table

        echo ""
        echo "--- Storage Accounts Using Customer-Managed Keys ---"
        az storage account list --query "[?encryption.keySource=='Microsoft.Keyvault'].{Name:name,KeyVault:encryption.keyVaultProperties.keyVaultUri}" --output table

        echo ""
        echo "--- Detailed Encryption Settings ---"
        for account in $(az storage account list --query "[].name" --output tsv); do
            echo "Storage Account: $account"
            az storage account show --name "$account" --query "encryption" --output yaml
            echo "---"
        done
    instructions: |
      ## Required Azure Permissions
      - Microsoft.Storage/storageAccounts/read
      - Reader role on subscriptions

  network_security:
    name: Network Security Groups
    control: NSG rules properly configured
    keywords:
      - nsg
      - network security
      - firewall
      - inbound
    formats:
      python: |
        #!/usr/bin/env python3
        """
        Evidence Collection Script
        Control: NSG rules properly configured
        Provider: Azure
        Generated: {timestamp}
        """

        import json
        from datetime import datetime
        from azure.identity import DefaultAzureCredential
        from azure.mgmt.network import NetworkManagementClient
        from azure.mgmt.resource import SubscriptionClient

        def collect_nsg_evidence():
            evidence = {
                "control": "NSG rules properly configured",
                "timestamp": datetime.utcnow().isoformat(),
                "provider": "Azure",
                "results": [],
                "findings": []
            }

            try:
                credential = DefaultAzureCredential()
                sub_client = SubscriptionClient(credential)

                for sub in sub_client.subscriptions.list():
                    network_client = NetworkManagementClient(credential, sub.subscription_id)

                    for nsg in network_client.network_security_groups.list_all():
                        risky_rules = []

                        for rule in nsg.security_rules:
                            # Check for overly permissive rules
                            if rule.access == 'Allow' and rule.direction == 'Inbound':
                                if rule.source_address_prefix in ['*', '0.0.0.0/0', 'Internet']:
                                    if rule.destination_port_range in ['*', '22', '3389', '3306', '1433']:
                                        risky_rules.append({
                                            "rule_name": rule.name,
                                            "source": rule.source_address_prefix,
                                            "port": rule.destination_port_range,
                                            "priority": rule.priority
                                        })

                        evidence["results"].append({
                            "subscription": sub.display_name,
                            "nsg_name": nsg.name,
                            "resource_group": nsg.id.split('/')[4],
                            "total_rules": len(nsg.security_rules),
                            "risky_rules_count": len(risky_rules),
                            "risky_rules": risky_rules,
                            "status": "FAIL" if risky_rules else "PASS"
                        })

                        if risky_rules:
                            evidence["findings"].extend(risky_rules)

            except Exception as e:
                evidence["error"] = str(e)
                evidence["status"] = "ERROR"

            return evidence

        if __name__ == "__main__":
            result = collect_nsg_evidence()
            print(json.dumps(result, indent=2))
      bash: |
        #!/bin/bash
        # Evidence Collection Script
        # Control: NSG rules properly configured
        # Provider: Azure
        # Generated: {timestamp}

        set -e

        echo "=== Azure NSG Evidence Collection ==="
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo ""

        echo "--- All Network Security Groups ---"
        az network nsg list --query "[].{Name:name,ResourceGroup:resourceGroup,Location:location}" --output table

        echo ""
        echo "--- Inbound Rules Allowing Internet Access ---"
        az network nsg list --query "[].{NSG:name,Rules:securityRules[?access=='Allow' && direction=='Inbound' && (sourceAddressPrefix=='*' || sourceAddressPrefix=='Internet')].{Rule:name,Port:destinationPortRange,Source:sourceAddressPrefix,Priority:priority}}" --output yaml

        echo ""
        echo "--- Rules Allowing SSH (22) from Internet ---"
        for nsg in $(az network nsg list --query "[].name" --output tsv); do
            rg=$(az network nsg show --name "$nsg" --query "resourceGroup" --output tsv 2>/dev/null)
            echo "NSG: $nsg"
            az network nsg rule list --nsg-name "$nsg" --resource-group "$rg" --query "[?access=='Allow' && direction=='Inbound' && destinationPortRange=='22' && (sourceAddressPrefix=='*' || sourceAddressPrefix=='Internet')]" --output yaml 2>/dev/null || echo "  No risky SSH rules"
        done

        echo ""
        echo "--- Rules Allowing RDP (3389) from Internet ---"
        for nsg in $(az network nsg list --query "[].name" --output tsv); do
            rg=$(az network nsg show --name "$nsg" --query "resourceGroup" --output tsv 2>/dev/null)
            echo "NSG: $nsg"
            az network nsg rule list --nsg-name "$nsg" --resource-group "$rg" --query "[?access=='Allow' && direction=='Inbound' && destinationPortRange=='3389' && (sourceAddressPrefix=='*' || sourceAddressPrefix=='Internet')]" --output yaml 2>/dev/null || echo "  No risky RDP rules"
        done
    instructions: |
      ## Required Azure Permissions
      - Microsoft.Network/networkSecurityGroups/read
      - Reader role on subscriptions

  key_vault:
    name: Key Vault Configuration
    control: Key Vault properly secured
    keywords:
      - key vault
      - keyvault
      - secrets
      - keys
    formats:
      python: |
        #!/usr/bin/env python3
        """
        Evidence Collection Script
        Control: Key Vault properly secured
        Provider: Azure
        Generated: {timestamp}
        """

        import json
        from datetime import datetime
        from azure.identity import DefaultAzureCredential
        from azure.mgmt.keyvault import KeyVaultManagementClient
        from azure.mgmt.resource import SubscriptionClient

        def collect_keyvault_evidence():
            evidence = {
                "control": "Key Vault properly secured",
                "timestamp": datetime.utcnow().isoformat(),
                "provider": "Azure",
                "results": []
            }

            try:
                credential = DefaultAzureCredential()
                sub_client = SubscriptionClient(credential)

                for sub in sub_client.subscriptions.list():
                    kv_client = KeyVaultManagementClient(credential, sub.subscription_id)

                    for vault in kv_client.vaults.list():
                        properties = vault.properties

                        evidence["results"].append({
                            "subscription": sub.display_name,
                            "vault_name": vault.name,
                            "resource_group": vault.id.split('/')[4],
                            "soft_delete_enabled": properties.enable_soft_delete,
                            "purge_protection": properties.enable_purge_protection,
                            "rbac_authorization": properties.enable_rbac_authorization,
                            "public_network_access": properties.public_network_access,
                            "private_endpoint_connections": len(properties.private_endpoint_connections or []),
                            "status": "PASS" if properties.enable_soft_delete and properties.enable_purge_protection else "WARN"
                        })

            except Exception as e:
                evidence["error"] = str(e)
                evidence["status"] = "ERROR"

            return evidence

        if __name__ == "__main__":
            result = collect_keyvault_evidence()
            print(json.dumps(result, indent=2))
      bash: |
        #!/bin/bash
        # Evidence Collection Script
        # Control: Key Vault properly secured
        # Provider: Azure
        # Generated: {timestamp}

        set -e

        echo "=== Azure Key Vault Evidence Collection ==="
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo ""

        echo "--- All Key Vaults ---"
        az keyvault list --query "[].{Name:name,ResourceGroup:resourceGroup,Location:location}" --output table

        echo ""
        echo "--- Key Vault Security Settings ---"
        for vault in $(az keyvault list --query "[].name" --output tsv); do
            echo "Vault: $vault"
            az keyvault show --name "$vault" --query "{SoftDelete:properties.enableSoftDelete,PurgeProtection:properties.enablePurgeProtection,RBACAuth:properties.enableRbacAuthorization,PublicAccess:properties.publicNetworkAccess}" --output yaml
            echo "---"
        done

        echo ""
        echo "--- Key Vaults Without Purge Protection ---"
        az keyvault list --query "[?properties.enablePurgeProtection!=\`true\`].{Name:name,ResourceGroup:resourceGroup}" --output table
    instructions: |
      ## Required Azure Permissions
      - Microsoft.KeyVault/vaults/read
      - Reader role on subscriptions

  activity_log:
    name: Activity Log Settings
    control: Activity logs exported to storage
    keywords:
      - activity log
      - audit log
      - monitoring
      - diagnostic
    formats:
      python: |
        #!/usr/bin/env python3
        """
        Evidence Collection Script
        Control: Activity logs exported to storage
        Provider: Azure
        Generated: {timestamp}
        """

        import json
        from datetime import datetime
        from azure.identity import DefaultAzureCredential
        from azure.mgmt.monitor import MonitorManagementClient
        from azure.mgmt.resource import SubscriptionClient

        def collect_activity_log_evidence():
            evidence = {
                "control": "Activity logs exported to storage",
                "timestamp": datetime.utcnow().isoformat(),
                "provider": "Azure",
                "results": []
            }

            try:
                credential = DefaultAzureCredential()
                sub_client = SubscriptionClient(credential)

                for sub in sub_client.subscriptions.list():
                    monitor_client = MonitorManagementClient(credential, sub.subscription_id)

                    # Get diagnostic settings for the subscription
                    settings = monitor_client.subscription_diagnostic_settings.list(sub.subscription_id)

                    sub_settings = []
                    for setting in settings:
                        sub_settings.append({
                            "name": setting.name,
                            "storage_account": setting.storage_account_id,
                            "log_analytics": setting.workspace_id,
                            "event_hub": setting.event_hub_authorization_rule_id
                        })

                    evidence["results"].append({
                        "subscription": sub.display_name,
                        "subscription_id": sub.subscription_id,
                        "diagnostic_settings_count": len(sub_settings),
                        "settings": sub_settings,
                        "status": "PASS" if sub_settings else "FAIL"
                    })

            except Exception as e:
                evidence["error"] = str(e)
                evidence["status"] = "ERROR"

            return evidence

        if __name__ == "__main__":
            result = collect_activity_log_evidence()
            print(json.dumps(result, indent=2))
      bash: |
        #!/bin/bash
        # Evidence Collection Script
        # Control: Activity logs exported to storage
        # Provider: Azure
        # Generated: {timestamp}

        set -e

        echo "=== Azure Activity Log Evidence Collection ==="
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo ""

        echo "--- Subscription Diagnostic Settings ---"
        for sub in $(az account list --query "[].id" --output tsv); do
            echo "Subscription: $sub"
            az monitor diagnostic-settings subscription list --subscription "$sub" --output yaml 2>/dev/null || echo "  No diagnostic settings configured"
            echo "---"
        done

        echo ""
        echo "--- Log Analytics Workspaces ---"
        az monitor log-analytics workspace list --query "[].{Name:name,ResourceGroup:resourceGroup,RetentionDays:retentionInDays}" --output table

        echo ""
        echo "--- Recent Activity Log Entries (last 24h) ---"
        az monitor activity-log list --offset 1d --query "[0:5].{Time:eventTimestamp,Operation:operationName.value,Status:status.value,Caller:caller}" --output table
    instructions: |
      ## Required Azure Permissions
      - Microsoft.Insights/diagnosticSettings/read
      - Microsoft.OperationalInsights/workspaces/read
      - Monitoring Reader role


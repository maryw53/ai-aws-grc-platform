name: Kubernetes
description: Kubernetes cluster evidence collection templates

templates:
  rbac_audit:
    name: RBAC Configuration Audit
    control: RBAC roles properly configured with least privilege
    keywords:
      - rbac
      - role
      - binding
      - permission
      - cluster role
    formats:
      python: |
        #!/usr/bin/env python3
        """
        Evidence Collection Script
        Control: RBAC roles properly configured with least privilege
        Provider: Kubernetes
        Generated: {timestamp}
        """

        import json
        from datetime import datetime
        from kubernetes import client, config

        def collect_rbac_evidence():
            evidence = {
                "control": "RBAC roles properly configured with least privilege",
                "timestamp": datetime.utcnow().isoformat(),
                "provider": "Kubernetes",
                "results": [],
                "findings": []
            }

            try:
                config.load_kube_config()
                rbac = client.RbacAuthorizationV1Api()

                # Check ClusterRoleBindings
                cluster_bindings = rbac.list_cluster_role_binding()

                for binding in cluster_bindings.items:
                    role_ref = binding.role_ref.name
                    subjects = binding.subjects or []

                    # Flag overprivileged bindings
                    is_overprivileged = role_ref in ['cluster-admin', 'admin', 'edit']

                    binding_info = {
                        "type": "ClusterRoleBinding",
                        "name": binding.metadata.name,
                        "role": role_ref,
                        "subjects": [
                            {"kind": s.kind, "name": s.name, "namespace": s.namespace}
                            for s in subjects
                        ],
                        "status": "WARN" if is_overprivileged else "PASS"
                    }

                    evidence["results"].append(binding_info)

                    if is_overprivileged:
                        evidence["findings"].append({
                            "binding": binding.metadata.name,
                            "finding": f"Uses privileged role: {role_ref}",
                            "subjects": [s.name for s in subjects]
                        })

                # Check for default service account usage
                v1 = client.CoreV1Api()
                for ns in v1.list_namespace().items:
                    pods = v1.list_namespaced_pod(ns.metadata.name)
                    for pod in pods.items:
                        if pod.spec.service_account_name == "default":
                            evidence["findings"].append({
                                "type": "DefaultServiceAccount",
                                "namespace": ns.metadata.name,
                                "pod": pod.metadata.name,
                                "finding": "Uses default service account"
                            })

            except Exception as e:
                evidence["error"] = str(e)
                evidence["status"] = "ERROR"

            return evidence

        if __name__ == "__main__":
            result = collect_rbac_evidence()
            print(json.dumps(result, indent=2))
      bash: |
        #!/bin/bash
        # Evidence Collection Script
        # Control: RBAC roles properly configured with least privilege
        # Provider: Kubernetes
        # Generated: {timestamp}

        set -e

        echo "=== Kubernetes RBAC Evidence ==="
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "Context: $(kubectl config current-context)"
        echo ""

        echo "--- ClusterRoleBindings ---"
        kubectl get clusterrolebindings -o custom-columns="NAME:.metadata.name,ROLE:.roleRef.name,SUBJECTS:.subjects[*].name"

        echo ""
        echo "--- Bindings to cluster-admin Role ---"
        kubectl get clusterrolebindings -o json | jq -r '.items[] | select(.roleRef.name=="cluster-admin") | "\(.metadata.name): \(.subjects[].name)"'

        echo ""
        echo "--- ClusterRoles with Wildcard Permissions ---"
        kubectl get clusterroles -o json | jq -r '.items[] | select(.rules[].resources[] == "*" or .rules[].verbs[] == "*") | .metadata.name'

        echo ""
        echo "--- RoleBindings per Namespace ---"
        for ns in $(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}'); do
            echo "Namespace: $ns"
            kubectl get rolebindings -n "$ns" -o custom-columns="NAME:.metadata.name,ROLE:.roleRef.name" 2>/dev/null || echo "  No rolebindings"
        done

        echo ""
        echo "--- Pods Using Default Service Account ---"
        kubectl get pods -A -o json | jq -r '.items[] | select(.spec.serviceAccountName=="default" or .spec.serviceAccountName==null) | "\(.metadata.namespace)/\(.metadata.name)"'

        echo ""
        echo "--- Service Accounts with Secrets ---"
        kubectl get serviceaccounts -A -o custom-columns="NAMESPACE:.metadata.namespace,NAME:.metadata.name,SECRETS:.secrets[*].name"
    instructions: |
      ## kubectl Prerequisites

      1. **Install kubectl:**
         ```bash
         # macOS
         brew install kubectl

         # Linux
         curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
         chmod +x kubectl && sudo mv kubectl /usr/local/bin/
         ```

      2. **Configure cluster access:**
         ```bash
         # For managed Kubernetes
         aws eks update-kubeconfig --name CLUSTER_NAME  # EKS
         az aks get-credentials --name CLUSTER_NAME     # AKS
         gcloud container clusters get-credentials CLUSTER_NAME  # GKE

         # Verify connection
         kubectl cluster-info
         ```

      3. **Required RBAC permissions:**
         - rbac.authorization.k8s.io/clusterroles: list, get
         - rbac.authorization.k8s.io/clusterrolebindings: list, get
         - rbac.authorization.k8s.io/rolebindings: list, get

  pod_security:
    name: Pod Security Standards
    control: Pods running with security contexts
    keywords:
      - pod
      - security
      - context
      - privileged
      - root
    formats:
      python: |
        #!/usr/bin/env python3
        """
        Evidence Collection Script
        Control: Pods running with security contexts
        Provider: Kubernetes
        Generated: {timestamp}
        """

        import json
        from datetime import datetime
        from kubernetes import client, config

        def collect_pod_security_evidence():
            evidence = {
                "control": "Pods running with security contexts",
                "timestamp": datetime.utcnow().isoformat(),
                "provider": "Kubernetes",
                "results": [],
                "findings": [],
                "summary": {"total_pods": 0, "compliant": 0, "non_compliant": 0}
            }

            try:
                config.load_kube_config()
                v1 = client.CoreV1Api()

                pods = v1.list_pod_for_all_namespaces()

                for pod in pods.items:
                    evidence["summary"]["total_pods"] += 1
                    issues = []

                    pod_security_context = pod.spec.security_context or client.V1PodSecurityContext()

                    for container in pod.spec.containers:
                        sc = container.security_context or client.V1SecurityContext()

                        # Check for privileged containers
                        if sc.privileged:
                            issues.append(f"Container {container.name} is privileged")

                        # Check for root user
                        if sc.run_as_user == 0 or (not sc.run_as_non_root and not pod_security_context.run_as_non_root):
                            issues.append(f"Container {container.name} may run as root")

                        # Check for capabilities
                        if sc.capabilities and sc.capabilities.add:
                            dangerous_caps = [c for c in sc.capabilities.add if c in ['SYS_ADMIN', 'NET_ADMIN', 'ALL']]
                            if dangerous_caps:
                                issues.append(f"Container {container.name} has dangerous capabilities: {dangerous_caps}")

                        # Check read-only root filesystem
                        if not sc.read_only_root_filesystem:
                            issues.append(f"Container {container.name} has writable root filesystem")

                    is_compliant = len(issues) == 0

                    if is_compliant:
                        evidence["summary"]["compliant"] += 1
                    else:
                        evidence["summary"]["non_compliant"] += 1
                        evidence["findings"].extend([{
                            "namespace": pod.metadata.namespace,
                            "pod": pod.metadata.name,
                            "issue": issue
                        } for issue in issues])

                    evidence["results"].append({
                        "namespace": pod.metadata.namespace,
                        "pod": pod.metadata.name,
                        "issues": issues,
                        "status": "PASS" if is_compliant else "FAIL"
                    })

            except Exception as e:
                evidence["error"] = str(e)
                evidence["status"] = "ERROR"

            return evidence

        if __name__ == "__main__":
            result = collect_pod_security_evidence()
            print(json.dumps(result, indent=2))
      bash: |
        #!/bin/bash
        # Evidence Collection Script
        # Control: Pods running with security contexts
        # Provider: Kubernetes
        # Generated: {timestamp}

        set -e

        echo "=== Kubernetes Pod Security Evidence ==="
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "Context: $(kubectl config current-context)"
        echo ""

        echo "--- Privileged Pods ---"
        kubectl get pods -A -o json | jq -r '.items[] | select(.spec.containers[].securityContext.privileged==true) | "\(.metadata.namespace)/\(.metadata.name)"'

        echo ""
        echo "--- Pods Running as Root ---"
        kubectl get pods -A -o json | jq -r '.items[] | select(.spec.containers[].securityContext.runAsUser==0 or (.spec.securityContext.runAsNonRoot!=true and .spec.containers[].securityContext.runAsNonRoot!=true)) | "\(.metadata.namespace)/\(.metadata.name)"' | head -20

        echo ""
        echo "--- Pods with Dangerous Capabilities ---"
        kubectl get pods -A -o json | jq -r '.items[] | select(.spec.containers[].securityContext.capabilities.add[]? | IN("SYS_ADMIN","NET_ADMIN","ALL")) | "\(.metadata.namespace)/\(.metadata.name): \(.spec.containers[].securityContext.capabilities.add)"'

        echo ""
        echo "--- Pods Without Read-Only Root Filesystem ---"
        kubectl get pods -A -o json | jq -r '.items[] | select(.spec.containers[].securityContext.readOnlyRootFilesystem!=true) | "\(.metadata.namespace)/\(.metadata.name)"' | head -20

        echo ""
        echo "--- Pod Security Standards per Namespace ---"
        kubectl get namespaces -o json | jq -r '.items[] | "\(.metadata.name): enforce=\(.metadata.labels["pod-security.kubernetes.io/enforce"] // "not-set")"'

        echo ""
        echo "--- Security Context Summary ---"
        echo "Total pods: $(kubectl get pods -A --no-headers | wc -l)"
        echo "Privileged: $(kubectl get pods -A -o json | jq '[.items[] | select(.spec.containers[].securityContext.privileged==true)] | length')"
    instructions: |
      ## Required kubectl Access
      - pods: list, get (all namespaces)
      - namespaces: list, get

  network_policies:
    name: Network Policies
    control: Network policies configured for workload isolation
    keywords:
      - network
      - policy
      - ingress
      - egress
      - isolation
    formats:
      python: |
        #!/usr/bin/env python3
        """
        Evidence Collection Script
        Control: Network policies configured for workload isolation
        Provider: Kubernetes
        Generated: {timestamp}
        """

        import json
        from datetime import datetime
        from kubernetes import client, config

        def collect_network_policy_evidence():
            evidence = {
                "control": "Network policies configured for workload isolation",
                "timestamp": datetime.utcnow().isoformat(),
                "provider": "Kubernetes",
                "results": [],
                "findings": []
            }

            try:
                config.load_kube_config()
                v1 = client.CoreV1Api()
                networking = client.NetworkingV1Api()

                namespaces = v1.list_namespace()

                for ns in namespaces.items:
                    ns_name = ns.metadata.name
                    policies = networking.list_namespaced_network_policy(ns_name)

                    has_default_deny = any(
                        p.spec.pod_selector.match_labels == {} and
                        (p.spec.policy_types is None or 'Ingress' in p.spec.policy_types)
                        for p in policies.items
                    )

                    ns_info = {
                        "namespace": ns_name,
                        "network_policy_count": len(policies.items),
                        "has_default_deny": has_default_deny,
                        "policies": [
                            {
                                "name": p.metadata.name,
                                "pod_selector": p.spec.pod_selector.match_labels,
                                "policy_types": p.spec.policy_types or ['Ingress']
                            }
                            for p in policies.items
                        ],
                        "status": "PASS" if len(policies.items) > 0 else "WARN"
                    }

                    evidence["results"].append(ns_info)

                    if len(policies.items) == 0 and ns_name not in ['kube-system', 'kube-public', 'kube-node-lease']:
                        evidence["findings"].append({
                            "namespace": ns_name,
                            "finding": "No network policies configured",
                            "recommendation": "Consider adding default-deny network policy"
                        })

            except Exception as e:
                evidence["error"] = str(e)
                evidence["status"] = "ERROR"

            return evidence

        if __name__ == "__main__":
            result = collect_network_policy_evidence()
            print(json.dumps(result, indent=2))
      bash: |
        #!/bin/bash
        # Evidence Collection Script
        # Control: Network policies configured for workload isolation
        # Provider: Kubernetes
        # Generated: {timestamp}

        set -e

        echo "=== Kubernetes Network Policy Evidence ==="
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "Context: $(kubectl config current-context)"
        echo ""

        echo "--- All Network Policies ---"
        kubectl get networkpolicies -A -o custom-columns="NAMESPACE:.metadata.namespace,NAME:.metadata.name,POD-SELECTOR:.spec.podSelector.matchLabels"

        echo ""
        echo "--- Namespaces Without Network Policies ---"
        for ns in $(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}'); do
            count=$(kubectl get networkpolicies -n "$ns" --no-headers 2>/dev/null | wc -l)
            if [ "$count" -eq 0 ]; then
                echo "$ns"
            fi
        done

        echo ""
        echo "--- Network Policies per Namespace ---"
        for ns in $(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}'); do
            count=$(kubectl get networkpolicies -n "$ns" --no-headers 2>/dev/null | wc -l)
            echo "$ns: $count policies"
        done

        echo ""
        echo "--- Default Deny Policies ---"
        kubectl get networkpolicies -A -o json | jq -r '.items[] | select(.spec.podSelector.matchLabels == {} or .spec.podSelector.matchLabels == null) | "\(.metadata.namespace)/\(.metadata.name)"'

        echo ""
        echo "--- Detailed Policy Rules ---"
        kubectl get networkpolicies -A -o yaml
    instructions: |
      ## Required kubectl Access
      - networkpolicies: list, get (all namespaces)
      - namespaces: list, get

  secrets_management:
    name: Secrets Configuration
    control: Secrets properly encrypted and managed
    keywords:
      - secret
      - encryption
      - sensitive
      - credential
    formats:
      python: |
        #!/usr/bin/env python3
        """
        Evidence Collection Script
        Control: Secrets properly encrypted and managed
        Provider: Kubernetes
        Generated: {timestamp}
        """

        import json
        from datetime import datetime
        from kubernetes import client, config

        def collect_secrets_evidence():
            evidence = {
                "control": "Secrets properly encrypted and managed",
                "timestamp": datetime.utcnow().isoformat(),
                "provider": "Kubernetes",
                "results": [],
                "findings": [],
                "summary": {"total_secrets": 0, "service_account_tokens": 0, "other_secrets": 0}
            }

            try:
                config.load_kube_config()
                v1 = client.CoreV1Api()

                secrets = v1.list_secret_for_all_namespaces()

                for secret in secrets.items:
                    evidence["summary"]["total_secrets"] += 1

                    secret_type = secret.type

                    if secret_type == "kubernetes.io/service-account-token":
                        evidence["summary"]["service_account_tokens"] += 1
                    else:
                        evidence["summary"]["other_secrets"] += 1

                    # Check for potentially sensitive secret types
                    is_sensitive = secret_type in [
                        "kubernetes.io/basic-auth",
                        "kubernetes.io/ssh-auth",
                        "kubernetes.io/tls",
                        "Opaque"
                    ]

                    evidence["results"].append({
                        "namespace": secret.metadata.namespace,
                        "name": secret.metadata.name,
                        "type": secret_type,
                        "keys": list(secret.data.keys()) if secret.data else [],
                        "created": str(secret.metadata.creation_timestamp),
                        "is_sensitive": is_sensitive,
                        "status": "INFO"
                    })

                # Check for secrets in environment variables
                pods = v1.list_pod_for_all_namespaces()
                for pod in pods.items:
                    for container in pod.spec.containers:
                        if container.env:
                            for env in container.env:
                                if env.value_from and env.value_from.secret_key_ref:
                                    evidence["findings"].append({
                                        "type": "SecretInEnv",
                                        "namespace": pod.metadata.namespace,
                                        "pod": pod.metadata.name,
                                        "container": container.name,
                                        "secret": env.value_from.secret_key_ref.name
                                    })

            except Exception as e:
                evidence["error"] = str(e)
                evidence["status"] = "ERROR"

            return evidence

        if __name__ == "__main__":
            result = collect_secrets_evidence()
            print(json.dumps(result, indent=2))
      bash: |
        #!/bin/bash
        # Evidence Collection Script
        # Control: Secrets properly encrypted and managed
        # Provider: Kubernetes
        # Generated: {timestamp}

        set -e

        echo "=== Kubernetes Secrets Evidence ==="
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "Context: $(kubectl config current-context)"
        echo ""

        echo "--- Secrets Summary by Type ---"
        kubectl get secrets -A -o json | jq -r '[.items[].type] | group_by(.) | map({type: .[0], count: length}) | .[]' | jq -s '.'

        echo ""
        echo "--- All Secrets (excluding service account tokens) ---"
        kubectl get secrets -A --field-selector type!=kubernetes.io/service-account-token -o custom-columns="NAMESPACE:.metadata.namespace,NAME:.metadata.name,TYPE:.type,AGE:.metadata.creationTimestamp"

        echo ""
        echo "--- Secrets per Namespace ---"
        for ns in $(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}'); do
            count=$(kubectl get secrets -n "$ns" --field-selector type!=kubernetes.io/service-account-token --no-headers 2>/dev/null | wc -l)
            if [ "$count" -gt 0 ]; then
                echo "$ns: $count secrets"
            fi
        done

        echo ""
        echo "--- Pods Using Secrets as Environment Variables ---"
        kubectl get pods -A -o json | jq -r '.items[] | select(.spec.containers[].env[]?.valueFrom.secretKeyRef != null) | "\(.metadata.namespace)/\(.metadata.name)"'

        echo ""
        echo "--- Pods with Secret Volume Mounts ---"
        kubectl get pods -A -o json | jq -r '.items[] | select(.spec.volumes[]?.secret != null) | "\(.metadata.namespace)/\(.metadata.name): \(.spec.volumes[] | select(.secret != null) | .secret.secretName)"'

        echo ""
        echo "--- Encryption Configuration (if accessible) ---"
        kubectl get --raw /apis/apiserver.config.k8s.io/v1/encryptionconfigurations 2>/dev/null || echo "Encryption configuration not accessible (requires API server access)"
    instructions: |
      ## Required kubectl Access
      - secrets: list (not get - to avoid exposing secret values)
      - pods: list, get (all namespaces)

  admission_controllers:
    name: Admission Controller Status
    control: Security admission controllers enabled
    keywords:
      - admission
      - controller
      - webhook
      - psp
      - opa
      - gatekeeper
    formats:
      python: |
        #!/usr/bin/env python3
        """
        Evidence Collection Script
        Control: Security admission controllers enabled
        Provider: Kubernetes
        Generated: {timestamp}
        """

        import json
        from datetime import datetime
        from kubernetes import client, config

        def collect_admission_controller_evidence():
            evidence = {
                "control": "Security admission controllers enabled",
                "timestamp": datetime.utcnow().isoformat(),
                "provider": "Kubernetes",
                "results": []
            }

            try:
                config.load_kube_config()
                admission = client.AdmissionregistrationV1Api()

                # Check ValidatingWebhookConfigurations
                validating = admission.list_validating_webhook_configuration()
                evidence["results"].append({
                    "type": "ValidatingWebhookConfigurations",
                    "count": len(validating.items),
                    "webhooks": [
                        {
                            "name": w.metadata.name,
                            "webhooks": [wh.name for wh in w.webhooks]
                        }
                        for w in validating.items
                    ]
                })

                # Check MutatingWebhookConfigurations
                mutating = admission.list_mutating_webhook_configuration()
                evidence["results"].append({
                    "type": "MutatingWebhookConfigurations",
                    "count": len(mutating.items),
                    "webhooks": [
                        {
                            "name": w.metadata.name,
                            "webhooks": [wh.name for wh in w.webhooks]
                        }
                        for w in mutating.items
                    ]
                })

                # Check for OPA Gatekeeper
                apps = client.AppsV1Api()
                try:
                    gatekeeper = apps.read_namespaced_deployment(
                        name="gatekeeper-controller-manager",
                        namespace="gatekeeper-system"
                    )
                    evidence["results"].append({
                        "type": "OPAGatekeeper",
                        "installed": True,
                        "replicas": gatekeeper.status.ready_replicas
                    })
                except:
                    evidence["results"].append({
                        "type": "OPAGatekeeper",
                        "installed": False
                    })

            except Exception as e:
                evidence["error"] = str(e)
                evidence["status"] = "ERROR"

            return evidence

        if __name__ == "__main__":
            result = collect_admission_controller_evidence()
            print(json.dumps(result, indent=2))
      bash: |
        #!/bin/bash
        # Evidence Collection Script
        # Control: Security admission controllers enabled
        # Provider: Kubernetes
        # Generated: {timestamp}

        set -e

        echo "=== Kubernetes Admission Controller Evidence ==="
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "Context: $(kubectl config current-context)"
        echo ""

        echo "--- Validating Webhook Configurations ---"
        kubectl get validatingwebhookconfigurations -o custom-columns="NAME:.metadata.name,WEBHOOKS:.webhooks[*].name"

        echo ""
        echo "--- Mutating Webhook Configurations ---"
        kubectl get mutatingwebhookconfigurations -o custom-columns="NAME:.metadata.name,WEBHOOKS:.webhooks[*].name"

        echo ""
        echo "--- OPA Gatekeeper Status ---"
        kubectl get deployments -n gatekeeper-system 2>/dev/null || echo "OPA Gatekeeper not installed"

        echo ""
        echo "--- Gatekeeper Constraints (if installed) ---"
        kubectl get constraints 2>/dev/null || echo "No Gatekeeper constraints found"

        echo ""
        echo "--- Pod Security Admission Labels ---"
        kubectl get namespaces -o json | jq -r '.items[] | select(.metadata.labels["pod-security.kubernetes.io/enforce"] != null) | "\(.metadata.name): \(.metadata.labels["pod-security.kubernetes.io/enforce"])"'

        echo ""
        echo "--- Kyverno Policies (if installed) ---"
        kubectl get clusterpolicies 2>/dev/null || echo "Kyverno not installed"
    instructions: |
      ## Required kubectl Access
      - validatingwebhookconfigurations: list, get
      - mutatingwebhookconfigurations: list, get
      - deployments: get (gatekeeper-system namespace)


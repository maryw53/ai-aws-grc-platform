name: Jira Field Configuration
description: Configurable Jira custom field mappings and defaults

# Default project key for security tickets
default_project: SEC

# Custom field IDs - update these to match your Jira instance
# To find your custom field IDs:
# 1. Go to Jira Admin > Issues > Custom Fields
# 2. Click on the field name to view its configuration
# 3. The field ID is in the URL (e.g., customfield_10001)
custom_fields:
  likelihood:
    id: customfield_10001
    name: Risk Likelihood
    description: Likelihood of the risk occurring

  impact:
    id: customfield_10002
    name: Risk Impact
    description: Business impact if the risk materializes

  risk_score:
    id: customfield_10003
    name: Risk Score
    description: Calculated risk score (likelihood x impact)

  mitigation:
    id: customfield_10004
    name: Mitigation Strategy
    description: Proposed mitigation approach

  definition_of_done:
    id: customfield_10005
    name: Definition of Done
    description: Acceptance criteria for the ticket

# Issue type mappings
issue_types:
  vulnerability: Bug
  missing_control: Task
  improvement: Story
  default: Security Task

# Priority mappings based on risk score
priority_mapping:
  critical_threshold: 12  # Risk score >= 12 = Critical
  high_threshold: 6       # Risk score >= 6 = High
  medium_threshold: 3     # Risk score >= 3 = Medium
  # Below medium_threshold = Low

# Default labels to add to all risk tickets
default_labels:
  - security
  - risk-mitigation

# Technology detection keywords for auto-labeling
technology_keywords:
  aws:
    - aws
    - s3
    - ec2
    - lambda
    - iam
    - cloudformation
  azure:
    - azure
    - blob
    - ad
    - entra
  gcp:
    - gcp
    - gcs
    - bigquery
    - compute engine
  kubernetes:
    - kubernetes
    - k8s
    - pod
    - deployment
    - helm
  database:
    - database
    - db
    - sql
    - postgres
    - mysql
    - mongodb
  authentication:
    - authentication
    - auth
    - oauth
    - saml
    - sso
    - mfa
  encryption:
    - encryption
    - encrypt
    - kms
    - tls
    - ssl

# Risk keywords for extraction
risk_keywords:
  likelihood:
    critical:
      - critical
      - very high
      - extremely likely
      - guaranteed
    high:
      - high
      - likely
      - probable
      - frequent
    medium:
      - medium
      - moderate
      - possible
      - occasional
    low:
      - low
      - unlikely
      - rare
      - seldom

  impact:
    critical:
      - critical
      - catastrophic
      - severe
      - complete loss
      - data breach
    high:
      - high
      - significant
      - major
      - substantial
    medium:
      - medium
      - moderate
      - some
      - partial
    low:
      - low
      - minimal
      - minor
      - negligible

  mitigation_indicators:
    - mitigation
    - fix
    - solution
    - remediation
    - address
    - implement
    - deploy
    - enable

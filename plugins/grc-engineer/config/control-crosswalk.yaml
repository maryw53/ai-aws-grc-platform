# Master Control Mapping Database
# Maps security controls across all major compliance frameworks
# Identifies overlaps, conflicts, and optimization opportunities

version: "1.0"
description: Universal control mapping for cross-framework compliance optimization

controls:
  access_control_account_management:
    name: Account Management
    category: Access Control

    # Framework mappings
    nist_800_53:
      - AC-2
      - AC-2(1)  # Automated account management
      - AC-2(2)  # Temporary/emergency accounts
      - AC-2(3)  # Disable inactive accounts
      - AC-2(4)  # Automated audit actions

    iso_27001:
      - A.9.2.1  # User registration and de-registration
      - A.9.2.2  # User access provisioning
      - A.9.2.3  # Management of privileged access rights
      - A.9.2.5  # Review of user access rights

    soc2:
      - CC6.1  # Logical and physical access controls
      - CC6.2  # Prior to issuing system credentials
      - CC6.3  # Removes access when appropriate

    pci_dss:
      - 8.1    # Identification and authentication
      - 8.1.1  # Unique user IDs
      - 8.1.3  # Immediately revoke access for terminated users
      - 8.1.4  # Remove/disable inactive accounts every 90 days

    cis_controls:
      - 5.1    # Establish and maintain an inventory of accounts
      - 5.2    # Use unique passwords
      - 5.3    # Disable dormant accounts
      - 6.1    # Establish access control policy
      - 6.2    # Establish access based on need to know

    cmmc:
      - AC.L2-3.1.1  # Authorized access control
      - AC.L2-3.1.2  # Transaction and function control
      - IA.L2-3.5.1  # Identify users
      - IA.L2-3.5.2  # Authenticate users

    fedramp:
      - AC-2     # NIST 800-53 control
      - baseline: Moderate

    # Common requirements across all frameworks
    common_requirements:
      - Unique user IDs for all individuals
      - Formal access request and approval process
      - Periodic access reviews (quarterly to annually)
      - Automated provisioning and de-provisioning
      - Separation of duties for privileged access
      - Audit trail of all account management actions

    # Conflicting requirements
    conflicts:
      - name: Access Review Frequency
        soc2: "No specific frequency, risk-based approach recommended"
        pci_dss: "Quarterly reviews required (every 90 days)"
        nist: "Annually minimum, or when roles/responsibilities change"
        iso_27001: "At planned intervals (typically annually)"
        resolution: "Use quarterly (90 days) to satisfy most restrictive requirement (PCI-DSS)"

      - name: Inactive Account Detection
        pci_dss: "Remove/disable after 90 days of inactivity"
        nist: "Organization-defined time period"
        soc2: "Risk-based determination"
        resolution: "Use 90 days to satisfy PCI-DSS requirement"

    # Cloud implementation patterns
    cloud_implementation:
      aws: |
        - IAM users with unique identifiers
        - IAM Access Analyzer for unused access detection
        - AWS IAM Identity Center (SSO) for federated access
        - AWS Config rules for compliance monitoring
        - CloudTrail for audit logging
        - Lambda + EventBridge for automated lifecycle management

      azure: |
        - Azure Active Directory users
        - Azure AD Privileged Identity Management (PIM)
        - Azure AD Access Reviews for periodic certification
        - Azure Policy for compliance enforcement
        - Azure Monitor for audit logging
        - Logic Apps for automation

      gcp: |
        - Cloud IAM users and service accounts
        - Policy Analyzer for access analysis
        - Workforce Identity Federation
        - Organization Policy for constraints
        - Cloud Logging for audit trails
        - Cloud Functions for automation

      kubernetes: |
        - RBAC for role-based access control
        - ServiceAccounts for workload identity
        - Admission controllers for policy enforcement
        - Audit logging enabled
        - Automated RBAC reviews via scripts

  encryption_at_rest:
    name: Encryption at Rest
    category: Data Protection

    nist_800_53:
      - SC-28     # Protection of information at rest
      - SC-28(1)  # Cryptographic protection

    iso_27001:
      - A.10.1.1  # Policy on use of cryptographic controls
      - A.10.1.2  # Key management

    soc2:
      - CC6.7  # Encryption of data at rest

    pci_dss:
      - 3.4    # Render PAN unreadable (encryption)
      - 3.5    # Document and implement key management
      - 3.6    # Cryptographic key procedures

    cis_controls:
      - 3.11   # Encrypt sensitive data at rest

    cmmc:
      - SC.L2-3.13.11  # Cryptographic protection
      - SC.L2-3.13.16  # Protect confidentiality using encryption

    common_requirements:
      - Encrypt sensitive data at rest
      - Use industry-standard encryption algorithms (AES-256)
      - Implement key management procedures
      - Separate encryption keys from encrypted data
      - Regular key rotation

    conflicts:
      - name: Encryption Algorithm
        pci_dss: "Strong cryptography (AES-256, RSA 2048+)"
        nist: "FIPS 140-2 validated modules required for federal"
        soc2: "Industry-standard encryption"
        resolution: "Use AES-256 with FIPS 140-2 validated modules to satisfy all"

    cloud_implementation:
      aws: |
        - S3 bucket encryption (SSE-S3, SSE-KMS, SSE-C)
        - EBS volume encryption
        - RDS encryption at rest
        - AWS KMS for key management (FIPS 140-2 Level 3)
        - CloudHSM for dedicated hardware (FIPS 140-2 Level 3)

      azure: |
        - Storage Service Encryption (SSE)
        - Azure Disk Encryption for VMs
        - Transparent Data Encryption (TDE) for databases
        - Azure Key Vault (FIPS 140-2 Level 2)
        - Dedicated HSM (FIPS 140-2 Level 3)

      gcp: |
        - Default encryption for Cloud Storage
        - Persistent Disk encryption
        - Cloud SQL encryption
        - Cloud KMS (FIPS 140-2 Level 3)
        - Cloud HSM (FIPS 140-2 Level 3)

      kubernetes: |
        - etcd encryption at rest
        - Encrypted persistent volumes
        - External KMS provider integration
        - Secret encryption

  logging_and_monitoring:
    name: Security Logging and Monitoring
    category: Audit and Accountability

    nist_800_53:
      - AU-2     # Event logging
      - AU-3     # Content of audit records
      - AU-6     # Audit review, analysis, and reporting
      - AU-11    # Audit record retention
      - SI-4     # System monitoring

    iso_27001:
      - A.12.4.1  # Event logging
      - A.12.4.2  # Protection of log information
      - A.12.4.3  # Administrator and operator logs
      - A.12.4.4  # Clock synchronization

    soc2:
      - CC7.2  # System monitoring
      - CC7.3  # Evaluation of system monitoring

    pci_dss:
      - 10.1   # Implement audit trails
      - 10.2   # Automated audit trails for all users
      - 10.3   # Record audit trail entries
      - 10.6   # Review logs and security events
      - 10.7   # Retain audit trail history for one year

    cis_controls:
      - 8.2    # Collect audit logs
      - 8.3    # Ensure adequate storage for logs
      - 8.5    # Collect detailed audit logs
      - 8.11   # Conduct audit log reviews

    cmmc:
      - AU.L2-3.3.1   # Create and retain system audit logs
      - AU.L2-3.3.2   # Ensure actions can be traced to users

    common_requirements:
      - Comprehensive security event logging
      - Protected and tamper-evident log storage
      - Centralized log aggregation
      - Regular log review and analysis
      - Alerting on security events
      - Time synchronization (NTP)

    conflicts:
      - name: Log Retention Period
        pci_dss: "One year minimum (3 months immediately available)"
        soc2: "Retention period based on risk assessment"
        nist: "Organization-defined period (typically 90 days)"
        iso_27001: "As required by applicable regulations"
        resolution: "Use 1 year with 3+ months online to satisfy PCI-DSS"

      - name: Log Review Frequency
        pci_dss: "Daily review of security events and logs"
        nist: "Organization-defined frequency"
        soc2: "Continuous or periodic based on risk"
        resolution: "Daily automated review with alerting"

    cloud_implementation:
      aws: |
        - CloudTrail for API logging (all regions)
        - VPC Flow Logs for network traffic
        - CloudWatch Logs for application logs
        - S3 with object lock for tamper-proof storage
        - EventBridge for real-time alerting
        - Security Hub for aggregation
        - GuardDuty for threat detection

      azure: |
        - Azure Monitor for centralized logging
        - Activity Log for control plane operations
        - NSG Flow Logs for network traffic
        - Log Analytics workspace for retention
        - Immutable blob storage for compliance
        - Azure Sentinel for SIEM
        - Microsoft Defender for threat detection

      gcp: |
        - Cloud Audit Logs (admin, data access, system events)
        - VPC Flow Logs
        - Cloud Logging for aggregation
        - Bucket Lock for immutable storage
        - Cloud Monitoring for alerting
        - Security Command Center for analysis

      kubernetes: |
        - Audit logging enabled on API server
        - Container runtime logging
        - Centralized logging (Fluentd/Fluent Bit)
        - Log aggregation (ELK, Loki, CloudWatch)
        - Falco for runtime security monitoring

  vulnerability_management:
    name: Vulnerability and Patch Management
    category: System and Information Integrity

    nist_800_53:
      - RA-5     # Vulnerability scanning
      - SI-2     # Flaw remediation (patching)
      - SI-2(2)  # Automated flaw remediation status

    iso_27001:
      - A.12.6.1  # Management of technical vulnerabilities
      - A.14.2.5  # Secure system engineering principles

    soc2:
      - CC7.1  # Detection of anomalies and security events
      - CC8.1  # Detect changes that could affect system

    pci_dss:
      - 5.2    # Anti-malware mechanisms
      - 6.2    # Ensure systems are protected from known vulnerabilities
      - 6.3.3  # Review custom code prior to release
      - 11.3   # External and internal vulnerability scans

    cis_controls:
      - 7.1    # Establish vulnerability management program
      - 7.2    # Establish vulnerability remediation process
      - 7.3    # Perform automated OS patch management
      - 7.4    # Perform automated application patch management
      - 7.5    # Perform vulnerability scans

    cmmc:
      - RA.L2-3.11.2  # Vulnerability scans
      - SI.L2-3.14.1  # Identify and correct flaws
      - SI.L2-3.14.2  # Malicious code protection

    common_requirements:
      - Regular vulnerability scanning (monthly minimum)
      - Timely patch deployment (critical patches within 30 days)
      - Asset inventory for patch tracking
      - Testing patches before production deployment
      - Prioritization based on risk

    conflicts:
      - name: Vulnerability Scan Frequency
        pci_dss: "Quarterly external scans by ASV, internal scans quarterly and after significant changes"
        nist: "Organization-defined frequency"
        soc2: "Risk-based frequency"
        resolution: "Quarterly minimum for external, monthly for internal"

      - name: Critical Patch Timeline
        pci_dss: "High-risk vulnerabilities patched within one month"
        cis: "Critical vulnerabilities within 15 days"
        nist: "Organization-defined timeframes"
        resolution: "Critical: 15 days, High: 30 days, Medium: 90 days"

    cloud_implementation:
      aws: |
        - AWS Systems Manager Patch Manager
        - Amazon Inspector for vulnerability scanning
        - AWS Security Hub for aggregated findings
        - EventBridge for automated patch workflows
        - AWS Config for compliance tracking

      azure: |
        - Azure Update Management
        - Microsoft Defender for Cloud (vulnerability assessment)
        - Azure Automation for patch orchestration
        - Azure Policy for compliance

      gcp: |
        - OS Patch Management for Compute Engine
        - Container Analysis for image scanning
        - Security Command Center for findings
        - Cloud Asset Inventory for tracking

      kubernetes: |
        - Image scanning in CI/CD (Trivy, Aqua, Snyk)
        - Admission controllers for image policy
        - Automated image updates
        - Runtime vulnerability detection

  network_security:
    name: Network Security and Segmentation
    category: Network Security

    nist_800_53:
      - SC-7     # Boundary protection
      - SC-7(3)  # Access points
      - SC-7(4)  # External telecommunications
      - SC-7(5)  # Deny by default, allow by exception

    iso_27001:
      - A.13.1.1  # Network controls
      - A.13.1.2  # Security of network services
      - A.13.1.3  # Segregation in networks

    soc2:
      - CC6.6  # Logical access to system resources

    pci_dss:
      - 1.2    # Build firewall configurations that restrict connections
      - 1.3    # Prohibit direct public access to cardholder data
      - 1.4    # Install personal firewall software on mobile devices
      - 2.1    # Establish configuration standards

    cis_controls:
      - 12.1   # Ensure network infrastructure is up-to-date
      - 12.2   # Establish and maintain secure network architecture
      - 12.4   # Deny communication over unauthorized ports
      - 13.1   # Centralize security event alerting

    cmmc:
      - SC.L2-3.13.1  # Boundary protection
      - SC.L2-3.13.5  # Public access protection

    common_requirements:
      - Network segmentation by trust level
      - Deny by default, allow by exception
      - Firewall rules documented and reviewed
      - Monitoring of network traffic
      - DMZ for public-facing services

    conflicts:
      - name: Firewall Rule Review
        pci_dss: "Review firewall rules every 6 months"
        nist: "Annual minimum"
        soc2: "Regular reviews based on risk"
        resolution: "Semi-annual (every 6 months) to satisfy PCI-DSS"

    cloud_implementation:
      aws: |
        - VPC with public/private subnets
        - Security Groups (stateful firewall)
        - Network ACLs (stateless firewall)
        - AWS Network Firewall for advanced filtering
        - VPC Flow Logs for monitoring
        - Transit Gateway for hub-and-spoke

      azure: |
        - Virtual Networks (VNets)
        - Network Security Groups (NSGs)
        - Azure Firewall
        - Application Gateway with WAF
        - NSG Flow Logs
        - Virtual WAN for networking

      gcp: |
        - VPC networks
        - Firewall rules (ingress/egress)
        - Cloud Armor for DDoS protection
        - VPC Flow Logs
        - Cloud NAT for outbound traffic

      kubernetes: |
        - Network Policies for pod-to-pod traffic
        - Ingress controllers with TLS termination
        - Service mesh (Istio, Linkerd) for mTLS
        - NetworkPolicy enforcement (Calico, Cilium)

# Cross-framework optimization tiers
optimization_tiers:
  tier1_four_frameworks:
    description: "Controls that satisfy 4+ frameworks with single implementation"
    value: "Highest ROI - implement these first"
    examples:
      - access_control_account_management
      - encryption_at_rest
      - logging_and_monitoring

  tier2_three_frameworks:
    description: "Controls that satisfy 3 frameworks"
    value: "High ROI - implement after tier 1"
    examples:
      - vulnerability_management
      - network_security

  tier3_two_frameworks:
    description: "Controls that satisfy 2 frameworks"
    value: "Medium ROI"

  tier4_single_framework:
    description: "Framework-specific controls"
    value: "Lower ROI - implement last, only if needed"
    examples:
      - "PCI-DSS quarterly ASV scans"
      - "SOC2 vendor management"
      - "NIST security authorization (CA-6)"
      - "ISO management review of ISMS"

# Implementation effort estimates
effort_estimates:
  access_control_account_management:
    hours: 40
    complexity: Medium
    dependencies:
      - Identity provider setup
      - Automation tooling

  encryption_at_rest:
    hours: 24
    complexity: Low
    dependencies:
      - KMS setup
      - Key rotation procedures

  logging_and_monitoring:
    hours: 60
    complexity: High
    dependencies:
      - SIEM platform
      - Log aggregation infrastructure
      - Alerting mechanisms

  vulnerability_management:
    hours: 80
    complexity: High
    dependencies:
      - Scanning tools
      - Patch management system
      - Change management process

  network_security:
    hours: 50
    complexity: Medium
    dependencies:
      - Network architecture design
      - Firewall platforms

name: ISO/IEC 27001
version: "2022"
description: Information Security Management System (ISMS) - Annex A Controls

controls:
  A.5.1:
    title: Policies for information security
    description: Information security policy and topic-specific policies shall be defined, approved by management, published, communicated to and acknowledged by relevant personnel.
    category: Organizational Controls

  A.8.2:
    title: Privileged access rights
    description: The allocation and use of privileged access rights shall be restricted and managed.
    category: Access Control
    keywords:
      - privileged access
      - admin
      - root
      - sudo

  A.8.3:
    title: Information access restriction
    description: Access to information and other associated assets shall be restricted in accordance with the established topic-specific policy on access control.
    category: Access Control
    keywords:
      - access control
      - rbac
      - permissions

  A.8.9:
    title: Configuration management
    description: Configurations, including security configurations, of hardware, software, services and networks shall be established, documented, implemented, monitored and reviewed.
    category: Configuration Management
    keywords:
      - configuration
      - hardening
      - baseline

  A.8.10:
    title: Information deletion
    description: Information stored in information systems, devices or in any other storage media shall be deleted when no longer required.
    category: Information Protection
    keywords:
      - data deletion
      - retention
      - purge

  A.8.24:
    title: Use of cryptography
    description: Rules for the effective use of cryptography, including cryptographic key management, shall be defined and implemented.
    category: Cryptographic Controls
    keywords:
      - encryption
      - kms
      - cryptographic
      - tls
      - ssl

  A.8.25:
    title: Secure development life cycle
    description: Rules for the secure development of software and systems shall be established and applied.
    category: Secure Development
    keywords:
      - sdlc
      - secure development
      - code review

  A.9.2.1:
    title: User registration and de-registration
    description: A formal user registration and de-registration process shall be implemented to enable assignment of access rights.
    category: Access Control
    keywords:
      - user registration
      - provisioning
      - deprovisioning

  A.10.1.1:
    title: Cryptographic controls
    description: A policy on the use of cryptographic controls for protection of information shall be developed and implemented.
    category: Cryptography
    keywords:
      - encryption
      - cryptography
      - key management

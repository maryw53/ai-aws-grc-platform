  CM-5(1): { required: true, notes: "Automated Access Enforcement/Audit Records" }
  CM-6(2): { required: true, notes: "Respond to Unauthorized Changes" }
  CM-7(4): { required: true, notes: "Unauthorized Software/Blacklisting" }
  CM-8(4): { required: true, notes: "Accountability Information" }
  CM-8(5): { required: true, notes: "No Duplicate Accounting" }
  CM-12: { required: true, notes: "Information Location" }

name: FedRAMP High Baseline
version: Rev 5
description: |
  FedRAMP High Impact baseline for systems with severe or catastrophic risk to organizational
  operations, assets, individuals, and the Nation. Approximately 421 controls.

impact_level: High
applicable_to:
  - High impact federal information systems
  - Law enforcement and emergency services data
  - Financial systems
  - Health systems
  - Critical infrastructure
  - Any system where loss of confidentiality, integrity, or availability could have severe effects

controls:
  # This file includes all Moderate controls plus additional High-specific controls
  # For brevity, listing only the additional controls beyond Moderate

  # Access Control (AC) - High additions
  AC-2(5): { required: true, notes: "Inactivity Logout" }
  AC-2(11): { required: true, notes: "Usage Conditions" }
  AC-2(12): { required: true, notes: "Account Monitoring for Atypical Usage" }
  AC-2(13): { required: true, notes: "Disable Accounts for High-Risk Individuals" }
  AC-3(2): { required: true, notes: "Dual Authorization" }
  AC-4(4): { required: true, notes: "Flow Control of Encrypted Information" }
  AC-6(3): { required: true, notes: "Network Access to Privileged Commands" }
  AC-17(9): { required: true, notes: "Disconnect/Disable Access" }

  # Awareness and Training (AT) - High additions
  AT-2(1): { required: true, notes: "Practical Exercises" }
  AT-2(3): { required: true, notes: "Social Engineering and Mining" }
  AT-2(5): { required: true, notes: "Advanced Persistent Threat" }
  AT-3(3): { required: true, notes: "Practical Exercises" }

  # Audit and Accountability (AU) - High additions
  AU-9(2): { required: true, notes: "Store on Separate Physical Systems" }
  AU-10: { required: true, notes: "Non-repudiation" }
  AU-12(1): { required: true, notes: "System-Wide/Time-Correlated Audit Trail" }
  AU-12(3): { required: true, notes: "Changes by Authorized Individuals" }

  # Security Assessment (CA) - High additions

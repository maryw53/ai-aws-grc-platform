fedramp_additional:
  continuous_monitoring_frequency: monthly
  penetration_testing: annual
  vulnerability_scanning: monthly
  assessment_frequency: annual
  specialized_assessments:
    - red_team_exercises
    - penetration_testing
    - malware_analysis

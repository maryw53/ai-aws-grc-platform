  AC-1: { required: true, notes: "Policy and Procedures" }
  AC-2: { required: true, notes: "Account Management" }
  AC-3: { required: true, notes: "Access Enforcement" }
  AC-7: { required: true, notes: "Unsuccessful Logon Attempts" }
  AC-8: { required: true, notes: "System Use Notification" }
  AC-14: { required: true, notes: "Permitted Actions without Identification" }
  AC-17: { required: true, notes: "Remote Access" }
  AC-18: { required: true, notes: "Wireless Access" }
  AC-19: { required: true, notes: "Access Control for Mobile Devices" }
  AC-20: { required: true, notes: "Use of External Systems" }
  AC-22: { required: true, notes: "Publicly Accessible Content" }


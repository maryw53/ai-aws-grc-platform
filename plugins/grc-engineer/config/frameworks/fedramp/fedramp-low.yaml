name: FedRAMP Low Baseline
version: Rev 5
description: |
  FedRAMP Low Impact baseline for systems with low risk to organizational operations,
  assets, individuals, and the Nation. Approximately 125 controls.

impact_level: Low
applicable_to:
  - Low impact federal information systems
  - Systems containing publicly available data
  - Non-sensitive, non-confidential workloads

controls:

name: FedRAMP Moderate Baseline
version: Rev 5
description: |
  FedRAMP Moderate Impact baseline for systems with serious risk to organizational operations,
  assets, individuals, and the Nation. Approximately 325 controls.

impact_level: Moderate
applicable_to:
  - Moderate impact federal information systems
  - Controlled Unclassified Information (CUI)
  - PII and PHI data
  - Most SaaS offerings


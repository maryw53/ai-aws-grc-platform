name: NIST 800-53 PL - Planning
family: PL
description: Controls for security and privacy planning
version: Rev 5

controls:
  PL-1:
    title: Policy and Procedures
    description: |
      Develop, document, and disseminate security and privacy planning policy and procedures.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws organizations describe-organization"
            description: "Verify organizational structure"
            pass_criteria: "Organization supports planning"

  PL-2:
    title: System Security and Privacy Plans
    description: |
      Develop security and privacy plans that describe the security and privacy controls
      in place and planned for the system.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws securityhub describe-hub"
            description: "Check Security Hub configuration"
            pass_criteria: "Security Hub documents security posture"
          - cmd: "aws configservice describe-conformance-packs"
            description: "Check conformance packs"
            pass_criteria: "Conformance packs document controls"
        evidence_script: |
          #!/bin/bash
          echo "=== PL-2 System Security Plan Evidence ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Security Hub Standards ==="
          aws securityhub get-enabled-standards --query 'StandardsSubscriptions[*].{Standard:StandardsArn,Status:StandardsStatus}' --output table
          echo ""
          echo "=== Conformance Packs ==="
          aws configservice describe-conformance-packs --query 'ConformancePackDetails[*].{Name:ConformancePackName,Status:ConformancePackState}' --output table
      azure:
        commands:
          - cmd: "az security regulatory-compliance-standards list"
            description: "List compliance standards"
            pass_criteria: "Compliance standards document controls"
      gcp:
        commands:
          - cmd: "gcloud scc sources list --organization=ORG_ID"
            description: "List SCC sources"
            pass_criteria: "SCC documents security"

  PL-4:
    title: Rules of Behavior
    description: |
      Establish and provide to users rules that describe responsibilities and expected behavior
      for system and information usage.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-account-aliases"
            description: "Check account setup"
            pass_criteria: "Account policies support rules of behavior"
      azure:
        commands:
          - cmd: "az ad terms-of-use list"
            description: "Check Terms of Use"
            pass_criteria: "Terms of Use are defined"

  PL-8:
    title: Security and Privacy Architectures
    description: |
      Develop security and privacy architectures that describe the requirements and approach
      for protecting the confidentiality, integrity, and availability of information.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-vpcs"
            description: "Document VPC architecture"
            pass_criteria: "Network architecture is documented"
          - cmd: "aws organizations describe-organization"
            description: "Document organization architecture"
            pass_criteria: "Account architecture is documented"
        evidence_script: |
          #!/bin/bash
          echo "=== PL-8 Security Architecture ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== VPC Architecture ==="
          aws ec2 describe-vpcs --query 'Vpcs[*].{VpcId:VpcId,CidrBlock:CidrBlock,IsDefault:IsDefault}' --output table
          echo ""
          echo "=== Subnet Architecture ==="
          aws ec2 describe-subnets --query 'Subnets[*].{SubnetId:SubnetId,VpcId:VpcId,CidrBlock:CidrBlock,AZ:AvailabilityZone}' --output table
          echo ""
          echo "=== Account Structure ==="
          aws organizations list-accounts --query 'Accounts[*].{Id:Id,Name:Name,Status:Status}' --output table 2>/dev/null || echo "Not organization master"
      azure:
        commands:
          - cmd: "az network vnet list"
            description: "Document VNet architecture"
            pass_criteria: "Network architecture documented"
      gcp:
        commands:
          - cmd: "gcloud compute networks list"
            description: "Document VPC architecture"
            pass_criteria: "Network architecture documented"
      kubernetes:
        commands:
          - cmd: "kubectl get namespaces"
            description: "Document namespace architecture"
            pass_criteria: "Namespace structure documented"

  PL-10:
    title: Baseline Selection
    description: |
      Select a control baseline for the system.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws securityhub get-enabled-standards"
            description: "Check enabled security standards"
            pass_criteria: "Security standards are selected"
          - cmd: "aws configservice describe-conformance-packs"
            description: "Check conformance packs"
            pass_criteria: "Baseline conformance packs selected"
      azure:
        commands:
          - cmd: "az security regulatory-compliance-standards list"
            description: "List compliance standards"
            pass_criteria: "Standards are selected"

  PL-11:
    title: Baseline Tailoring
    description: |
      Tailor the selected control baseline by applying specified tailoring actions.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws configservice describe-conformance-pack-compliance --conformance-pack-name PACK"
            description: "Check conformance pack customization"
            pass_criteria: "Baseline is tailored appropriately"
      azure:
        commands:
          - cmd: "az policy exemption list"
            description: "List policy exemptions"
            pass_criteria: "Exemptions document tailoring"

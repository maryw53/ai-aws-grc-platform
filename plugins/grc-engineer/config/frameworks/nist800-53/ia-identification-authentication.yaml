  IA-11:
    title: Re-authentication
    description: |
      Require users to re-authenticate when defined circumstances or situations require.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws cognito-idp describe-user-pool --user-pool-id POOL_ID --query 'UserPool.Policies.PasswordPolicy'"
            description: "Check Cognito session settings"
            pass_criteria: "Session timeout requires re-authentication"
          - cmd: "aws iam get-role --role-name ROLE --query 'Role.MaxSessionDuration'"
            description: "Check role session duration"
            pass_criteria: "Session duration is limited"
      azure:
        commands:
          - cmd: "az ad conditional-access policy list --query '[?sessionControls.signInFrequency!=null]'"
            description: "Check sign-in frequency policies"
            pass_criteria: "Sign-in frequency requires re-authentication"
      gcp:
        commands:
          - cmd: "gcloud iam workload-identity-pools describe POOL --location=global"
            description: "Check workload identity session settings"
            pass_criteria: "Session settings require re-authentication"

  IA-12:
    title: Identity Proofing
    description: |
      Identity proof users that require accounts for logical access to systems based on
      appropriate identity proofing principles and guidelines.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws cognito-idp describe-user-pool --user-pool-id POOL_ID --query 'UserPool.AutoVerifiedAttributes'"
            description: "Check auto-verified attributes"
            pass_criteria: "Email or phone verification required"
          - cmd: "aws cognito-idp list-identity-providers --user-pool-id POOL_ID"
            description: "List identity providers for identity proofing"
            pass_criteria: "Identity proofing is configured"
      azure:
        commands:
          - cmd: "az ad identity-governance entitlement-management access-package list"
            description: "List access packages"
            pass_criteria: "Identity proofing in access request workflow"
      gcp:
        commands:
          - cmd: "gcloud identity groups list --organization=ORG_ID"
            description: "List identity groups"
            pass_criteria: "Group membership requires identity verification"

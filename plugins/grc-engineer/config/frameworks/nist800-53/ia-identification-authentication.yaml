name: NIST 800-53 IA - Identification and Authentication
family: IA
description: Controls for identifying and authenticating users, devices, and services
version: Rev 5

controls:
  IA-1:
    title: Policy and Procedures
    description: |
      Develop, document, and disseminate identification and authentication policy and procedures.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam get-account-password-policy"
            description: "Check account password policy"
            pass_criteria: "Password policy is defined"
      azure:
        commands:
          - cmd: "az ad conditional-access policy list"
            description: "List Conditional Access policies"
            pass_criteria: "CA policies are defined"
      gcp:
        commands:
          - cmd: "gcloud iam policies get-iam-policy PROJECT_ID"
            description: "Get IAM policy"
            pass_criteria: "IAM policy is defined"

  IA-2:
    title: Identification and Authentication (Organizational Users)
    description: |
      Uniquely identify and authenticate organizational users and associate identity with processes.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-users"
            description: "List IAM users"
            pass_criteria: "All users have unique identifiers"
          - cmd: "aws iam get-account-summary --query 'SummaryMap.{Users:Users,Groups:Groups,Roles:Roles}'"
            description: "Get account summary"
            pass_criteria: "User accounts are managed"
          - cmd: "aws organizations list-accounts"
            description: "List organization accounts"
            pass_criteria: "Organization structure supports identity management"
        evidence_script: |
          #!/bin/bash
          echo "=== IA-2 User Identification and Authentication ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== IAM Users ==="
          aws iam list-users --query 'Users[*].{UserName:UserName,CreateDate:CreateDate,PasswordLastUsed:PasswordLastUsed}' --output table
          echo ""
          echo "=== Account Summary ==="
          aws iam get-account-summary --output table
      azure:
        commands:
          - cmd: "az ad user list --query '[].{UPN:userPrincipalName,Enabled:accountEnabled}'"
            description: "List Azure AD users"
            pass_criteria: "All users have unique UPNs"
          - cmd: "az ad sp list --all --query '[].{Name:displayName,Type:servicePrincipalType}'"
            description: "List service principals"
            pass_criteria: "Service principals are documented"
      gcp:
        commands:
          - cmd: "gcloud iam service-accounts list"
            description: "List service accounts"
            pass_criteria: "Service accounts are unique and documented"
          - cmd: "gcloud identity groups list --organization=ORG_ID"
            description: "List identity groups"
            pass_criteria: "Groups support identity management"
      kubernetes:
        commands:
          - cmd: "kubectl get serviceaccounts -A"
            description: "List service accounts"
            pass_criteria: "Service accounts are unique per namespace"
          - cmd: "kubectl auth can-i --list"
            description: "List current user permissions"
            pass_criteria: "User is properly authenticated"

  IA-2(1):
    title: Multi-Factor Authentication to Privileged Accounts
    description: |
      Implement multi-factor authentication for access to privileged accounts.
    baseline: [low, moderate, high]
    parent: IA-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-users --query 'Users[*].UserName' --output text | xargs -I {} aws iam list-mfa-devices --user-name {}"
            description: "Check MFA for all users"
            pass_criteria: "All privileged users have MFA enabled"
          - cmd: "aws iam get-credential-report"
            description: "Get credential report for MFA status"
            pass_criteria: "MFA active for privileged users"
          - cmd: "aws iam list-virtual-mfa-devices"
            description: "List virtual MFA devices"
            pass_criteria: "MFA devices are assigned"
        evidence_script: |
          #!/bin/bash
          echo "=== IA-2(1) MFA for Privileged Accounts ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== User MFA Status ==="
          aws iam generate-credential-report >/dev/null 2>&1
          sleep 5
          aws iam get-credential-report --query 'Content' --output text | base64 -d | cut -d',' -f1,4,8 | head -20
          echo ""
          echo "=== Virtual MFA Devices ==="
          aws iam list-virtual-mfa-devices --query 'VirtualMFADevices[*].{SerialNumber:SerialNumber,User:User.UserName}' --output table
      azure:
        commands:
          - cmd: "az ad user list --query '[].{UPN:userPrincipalName,MFA:strongAuthenticationDetail}'"
            description: "Check user MFA status"
            pass_criteria: "MFA enabled for privileged users"
          - cmd: "az ad conditional-access policy list --query '[?conditions.users.includeRoles!=null]'"
            description: "Check CA policies for privileged roles"
            pass_criteria: "CA policies require MFA for privileged access"
      gcp:
        commands:
          - cmd: "gcloud identity groups memberships list --group-email=ADMIN_GROUP"
            description: "List admin group members"
            pass_criteria: "Admin users have 2-step verification"
      kubernetes:
        commands:
          - cmd: "kubectl get clusterrolebindings -o json | jq '.items[] | select(.roleRef.name==\"cluster-admin\") | .subjects'"
            description: "List cluster-admin users"
            pass_criteria: "Cluster admins use MFA-protected identity"

  IA-2(2):
    title: Multi-Factor Authentication to Non-Privileged Accounts
    description: |
      Implement multi-factor authentication for access to non-privileged accounts.
    baseline: [moderate, high]
    parent: IA-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam generate-credential-report && sleep 3 && aws iam get-credential-report --query 'Content' --output text | base64 -d"
            description: "Generate and retrieve credential report"
            pass_criteria: "MFA enabled for all users"
      azure:
        commands:
          - cmd: "az ad conditional-access policy list --query '[?conditions.users.includeUsers[0]==`All`]'"
            description: "Check CA policies for all users"
            pass_criteria: "CA policies require MFA for all users"
      gcp:
        commands:
          - cmd: "gcloud organizations get-iam-policy ORG_ID"
            description: "Check organization IAM policy"
            pass_criteria: "2-step verification enforced"

  IA-2(6):
    title: Access to Accounts - Separate Device
    description: |
      Implement multi-factor authentication for access using a separate device.
    baseline: [high]
    parent: IA-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-virtual-mfa-devices --query 'VirtualMFADevices[*].{User:User.UserName,Serial:SerialNumber}'"
            description: "List MFA devices (verify hardware tokens)"
            pass_criteria: "Hardware MFA devices used for high-privileged accounts"
      azure:
        commands:
          - cmd: "az ad authentication-method list"
            description: "List authentication methods"
            pass_criteria: "Hardware security keys or separate device MFA configured"

  IA-2(8):
    title: Access to Accounts - Replay Resistant
    description: |
      Implement replay-resistant authentication mechanisms for access to privileged and non-privileged accounts.
    baseline: [moderate, high]
    parent: IA-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-virtual-mfa-devices"
            description: "Check for TOTP-based MFA (replay resistant)"
            pass_criteria: "Time-based MFA in use"
          - cmd: "aws iam get-account-password-policy"
            description: "Check password policy"
            pass_criteria: "Password policy supports strong authentication"
      azure:
        commands:
          - cmd: "az ad conditional-access policy list --query '[].{Name:displayName,Grant:grantControls}'"
            description: "Check CA grant controls"
            pass_criteria: "MFA with replay resistance required"

  IA-3:
    title: Device Identification and Authentication
    description: |
      Uniquely identify and authenticate devices before establishing connections.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iot list-things"
            description: "List IoT devices"
            pass_criteria: "IoT devices are registered and authenticated"
          - cmd: "aws ec2 describe-instances --query 'Reservations[*].Instances[*].{Id:InstanceId,Profile:IamInstanceProfile.Arn}'"
            description: "Check instance profiles (device identity)"
            pass_criteria: "Instances have IAM instance profiles"
          - cmd: "aws ssm describe-instance-information"
            description: "List SSM managed instances"
            pass_criteria: "Managed instances are identified"
      azure:
        commands:
          - cmd: "az ad device list --query '[].{Name:displayName,TrustType:trustType}'"
            description: "List Azure AD devices"
            pass_criteria: "Devices are registered with Azure AD"
          - cmd: "az iot hub device-identity list --hub-name HUB"
            description: "List IoT Hub devices"
            pass_criteria: "IoT devices are registered"
      gcp:
        commands:
          - cmd: "gcloud compute instances list --format='table(name,serviceAccounts.email)'"
            description: "List instances with service accounts"
            pass_criteria: "Instances have service account identities"
          - cmd: "gcloud iot devices list --registry=REGISTRY --region=REGION"
            description: "List IoT devices"
            pass_criteria: "IoT devices are registered"
      kubernetes:
        commands:
          - cmd: "kubectl get nodes -o json | jq '.items[] | {name:.metadata.name,labels:.metadata.labels}'"
            description: "List node identities"
            pass_criteria: "Nodes are properly identified"

  IA-4:
    title: Identifier Management
    description: |
      Manage system identifiers by receiving authorization, selecting unique identifiers,
      assigning identifiers to intended parties, and preventing reuse.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-users --query 'Users[*].{UserName:UserName,UserId:UserId,CreateDate:CreateDate}'"
            description: "List user identifiers"
            pass_criteria: "User IDs are unique and documented"
          - cmd: "aws iam list-roles --query 'Roles[*].{RoleName:RoleName,RoleId:RoleId}'"
            description: "List role identifiers"
            pass_criteria: "Role IDs are unique"
          - cmd: "aws iam list-service-accounts --query 'ServiceAccounts[*].ServiceAccountId'"
            description: "List service account identifiers"
            pass_criteria: "Service account IDs are unique"
        evidence_script: |
          #!/bin/bash
          echo "=== IA-4 Identifier Management ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== IAM User Identifiers ==="
          aws iam list-users --query 'Users[*].{UserName:UserName,UserId:UserId,CreateDate:CreateDate}' --output table
          echo ""
          echo "=== IAM Role Identifiers ==="
          aws iam list-roles --query 'Roles[*].{RoleName:RoleName,RoleId:RoleId}' --output table
          echo ""
          echo "=== Service Account Identifiers ==="
          aws iam list-service-specific-credentials --user-name USER 2>/dev/null || echo "No service-specific credentials"
      azure:
        commands:
          - cmd: "az ad user list --query '[].{UPN:userPrincipalName,ObjectId:id}'"
            description: "List user identifiers"
            pass_criteria: "User IDs are unique"
          - cmd: "az ad app list --query '[].{Name:displayName,AppId:appId}'"
            description: "List application identifiers"
            pass_criteria: "App IDs are unique"
      gcp:
        commands:
          - cmd: "gcloud iam service-accounts list --format='table(email,uniqueId)'"
            description: "List service account identifiers"
            pass_criteria: "Service account IDs are unique"
      kubernetes:
        commands:
          - cmd: "kubectl get serviceaccounts -A -o json | jq '.items[] | {namespace:.metadata.namespace,name:.metadata.name,uid:.metadata.uid}'"
            description: "List service account UIDs"
            pass_criteria: "Service account UIDs are unique"

  IA-4(4):
    title: Identify User Status
    description: |
      Manage individual identifiers by uniquely identifying each individual as a contractor,
      government employee, etc.
    baseline: [moderate, high]
    parent: IA-4
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-users --query 'Users[*].{UserName:UserName,Tags:Tags}'"
            description: "Check user tags for status identification"
            pass_criteria: "Users have tags indicating their status"
          - cmd: "aws iam list-user-tags --user-name USERNAME"
            description: "Get user tags"
            pass_criteria: "User status is tagged (employee, contractor, etc.)"
      azure:
        commands:
          - cmd: "az ad user list --query '[].{UPN:userPrincipalName,UserType:userType,JobTitle:jobTitle}'"
            description: "Check user type and attributes"
            pass_criteria: "User type identifies status"
      gcp:
        commands:
          - cmd: "gcloud iam service-accounts describe SA_EMAIL --format='value(description)'"
            description: "Check service account description"
            pass_criteria: "Service account purpose is documented"

  IA-5:
    title: Authenticator Management
    description: |
      Manage system authenticators by verifying identity, initial distribution,
      establishing administrative procedures, changing/refreshing authenticators,
      protecting authenticators, and requiring individual authenticators.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam get-account-password-policy"
            description: "Get password policy"
            pass_criteria: "Password policy meets requirements"
          - cmd: "aws iam list-access-keys --user-name USERNAME"
            description: "List access keys for user"
            pass_criteria: "Access keys are managed"
          - cmd: "aws secretsmanager list-secrets"
            description: "List Secrets Manager secrets"
            pass_criteria: "Secrets are properly managed"
        evidence_script: |
          #!/bin/bash
          echo "=== IA-5 Authenticator Management ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Password Policy ==="
          aws iam get-account-password-policy
          echo ""
          echo "=== Access Key Age ==="
          for user in $(aws iam list-users --query 'Users[*].UserName' --output text); do
            echo "User: $user"
            aws iam list-access-keys --user-name "$user" --query 'AccessKeyMetadata[*].{KeyId:AccessKeyId,Status:Status,CreateDate:CreateDate}' --output table
          done
          echo ""
          echo "=== Secrets Manager Rotation ==="
          aws secretsmanager list-secrets --query 'SecretList[*].{Name:Name,RotationEnabled:RotationEnabled,LastRotated:LastRotatedDate}' --output table
      azure:
        commands:
          - cmd: "az ad conditional-access policy list --query '[].{Name:displayName,State:state}'"
            description: "List authentication policies"
            pass_criteria: "Authentication policies are defined"
          - cmd: "az keyvault secret list --vault-name VAULT"
            description: "List Key Vault secrets"
            pass_criteria: "Secrets are managed in Key Vault"
      gcp:
        commands:
          - cmd: "gcloud iam service-accounts keys list --iam-account=SA_EMAIL"
            description: "List service account keys"
            pass_criteria: "Keys are properly managed"
          - cmd: "gcloud secrets list"
            description: "List Secret Manager secrets"
            pass_criteria: "Secrets are managed"
      kubernetes:
        commands:
          - cmd: "kubectl get secrets -A -o json | jq '.items[] | {namespace:.metadata.namespace,name:.metadata.name,type:.type}'"
            description: "List secrets"
            pass_criteria: "Secrets are properly managed"

  IA-5(1):
    title: Password-Based Authentication
    description: |
      For password-based authentication, enforce minimum complexity, change frequency,
      and protect against password guessing.
    baseline: [low, moderate, high]
    parent: IA-5
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam get-account-password-policy"
            description: "Check password policy settings"
            pass_criteria: "MinimumPasswordLength >= 14, RequireSymbols, RequireNumbers, RequireUppercase, RequireLowercase"
        evidence_script: |
          #!/bin/bash
          echo "=== IA-5(1) Password Policy ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          aws iam get-account-password-policy --output table
      azure:
        commands:
          - cmd: "az ad conditional-access policy list --query '[?contains(displayName,`password`)]'"
            description: "Check password-related CA policies"
            pass_criteria: "Password policies enforce complexity"
      gcp:
        commands:
          - cmd: "gcloud identity password-policies describe"
            description: "Check password policy"
            pass_criteria: "Password policy enforces complexity"

  IA-5(2):
    title: Public Key-Based Authentication
    description: |
      For public key-based authentication, validate certificates, enforce authorized access
      to corresponding private key, and map authenticated identity.
    baseline: [moderate, high]
    parent: IA-5
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-ssh-public-keys --user-name USERNAME"
            description: "List SSH public keys for user"
            pass_criteria: "SSH keys are managed"
          - cmd: "aws acm list-certificates --query 'CertificateSummaryList[*].{Domain:DomainName,Status:Status}'"
            description: "List ACM certificates"
            pass_criteria: "Certificates are valid"
          - cmd: "aws ec2 describe-key-pairs"
            description: "List EC2 key pairs"
            pass_criteria: "Key pairs are documented"
      azure:
        commands:
          - cmd: "az keyvault certificate list --vault-name VAULT"
            description: "List Key Vault certificates"
            pass_criteria: "Certificates are managed"
      gcp:
        commands:
          - cmd: "gcloud compute os-login ssh-keys list"
            description: "List OS Login SSH keys"
            pass_criteria: "SSH keys are managed via OS Login"
      kubernetes:
        commands:
          - cmd: "kubectl get secrets -A -o json | jq '.items[] | select(.type==\"kubernetes.io/tls\") | {name:.metadata.name,namespace:.metadata.namespace}'"
            description: "List TLS secrets"
            pass_criteria: "TLS certificates are managed"

  IA-5(6):
    title: Protection of Authenticators
    description: |
      Protect authenticators commensurate with the security category of the information accessed.
    baseline: [moderate, high]
    parent: IA-5
    cloud_tests:
      aws:
        commands:
          - cmd: "aws secretsmanager list-secrets --query 'SecretList[*].{Name:Name,KmsKeyId:KmsKeyId}'"
            description: "Check Secrets Manager KMS encryption"
            pass_criteria: "Secrets are KMS encrypted"
          - cmd: "aws ssm describe-parameters --query 'Parameters[?Type==`SecureString`]'"
            description: "List SecureString parameters"
            pass_criteria: "Sensitive parameters use SecureString"
      azure:
        commands:
          - cmd: "az keyvault show --name VAULT --query '{SoftDelete:properties.enableSoftDelete,RBAC:properties.enableRbacAuthorization}'"
            description: "Check Key Vault protection"
            pass_criteria: "Soft delete and RBAC enabled"
      gcp:
        commands:
          - cmd: "gcloud secrets describe SECRET --format='value(replication)'"
            description: "Check secret replication (protection)"
            pass_criteria: "Appropriate replication for protection"

  IA-5(7):
    title: No Embedded Unencrypted Static Authenticators
    description: |
      Ensure that unencrypted static authenticators are not embedded in applications
      or access scripts.
    baseline: [moderate, high]
    parent: IA-5
    cloud_tests:
      aws:
        commands:
          - cmd: "aws lambda list-functions --query 'Functions[*].{Name:FunctionName,EnvVars:Environment.Variables}'"
            description: "Check Lambda environment variables"
            pass_criteria: "No plaintext credentials in environment variables"
          - cmd: "aws codepipeline list-pipelines"
            description: "List CodePipeline pipelines"
            pass_criteria: "Review pipelines for embedded credentials"
      azure:
        commands:
          - cmd: "az functionapp config appsettings list --resource-group RG --name APP"
            description: "Check Function App settings"
            pass_criteria: "No plaintext credentials in settings"
      gcp:
        commands:
          - cmd: "gcloud functions describe FUNCTION --format='value(environmentVariables)'"
            description: "Check Cloud Function environment"
            pass_criteria: "No plaintext credentials"
      kubernetes:
        commands:
          - cmd: "kubectl get pods -A -o json | jq '.items[].spec.containers[].env[]? | select(.value!=null and (.name | test(\"PASSWORD|SECRET|KEY|TOKEN\"; \"i\")))'"
            description: "Check for hardcoded secrets in env vars"
            pass_criteria: "No hardcoded sensitive values"

  IA-6:
    title: Authentication Feedback
    description: |
      Obscure feedback of authentication information during the authentication process.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws cognito-idp describe-user-pool --user-pool-id POOL_ID"
            description: "Check Cognito user pool settings"
            pass_criteria: "Error messages do not reveal user existence"
      azure:
        commands:
          - cmd: "az ad b2c identity-provider list"
            description: "Check identity provider configuration"
            pass_criteria: "Authentication feedback is obscured"
      gcp:
        commands:
          - cmd: "gcloud identity provider-configurations list"
            description: "Check identity provider configuration"
            pass_criteria: "Authentication feedback is obscured"

  IA-7:
    title: Cryptographic Module Authentication
    description: |
      Implement mechanisms for authentication to a cryptographic module that meet
      applicable requirements.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws kms describe-key --key-id KEY_ID --query 'KeyMetadata.{Origin:Origin,KeyState:KeyState}'"
            description: "Check KMS key origin"
            pass_criteria: "Key origin is appropriate (AWS_KMS or EXTERNAL)"
          - cmd: "aws cloudhsm describe-clusters"
            description: "List CloudHSM clusters"
            pass_criteria: "CloudHSM for FIPS 140-2 Level 3"
      azure:
        commands:
          - cmd: "az keyvault show --name VAULT --query 'properties.sku'"
            description: "Check Key Vault SKU"
            pass_criteria: "Premium SKU for HSM-backed keys"
      gcp:
        commands:
          - cmd: "gcloud kms keys describe KEY --keyring=KEYRING --location=LOCATION --format='value(primary.protectionLevel)'"
            description: "Check KMS key protection level"
            pass_criteria: "HSM protection level for high security"

  IA-8:
    title: Identification and Authentication (Non-Organizational Users)
    description: |
      Uniquely identify and authenticate non-organizational users or processes
      acting on behalf of non-organizational users.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-roles --query 'Roles[?AssumeRolePolicyDocument.Statement[?Principal.Federated!=null]]'"
            description: "List federated roles"
            pass_criteria: "Federated access is documented"
          - cmd: "aws cognito-idp list-user-pools --max-results 10"
            description: "List Cognito user pools"
            pass_criteria: "External user pools are managed"
        evidence_script: |
          #!/bin/bash
          echo "=== IA-8 Non-Organizational User Authentication ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Federated Roles ==="
          aws iam list-roles --query 'Roles[?contains(AssumeRolePolicyDocument.Statement[0].Principal|to_string(@),`federated`)].{RoleName:RoleName,Arn:Arn}' --output table
          echo ""
          echo "=== Cognito User Pools ==="
          aws cognito-idp list-user-pools --max-results 20 --query 'UserPools[*].{Name:Name,Id:Id}' --output table
          echo ""
          echo "=== Identity Providers ==="
          aws cognito-idp list-identity-providers --user-pool-id POOL_ID 2>/dev/null || echo "Specify user pool ID"
      azure:
        commands:
          - cmd: "az ad app list --query '[?signInAudience!=`AzureADMyOrg`].{Name:displayName,Audience:signInAudience}'"
            description: "List apps with external access"
            pass_criteria: "External access is documented"
          - cmd: "az ad b2c application list"
            description: "List B2C applications"
            pass_criteria: "B2C apps are managed"
      gcp:
        commands:
          - cmd: "gcloud iam workload-identity-pools list --location=global"
            description: "List workload identity pools"
            pass_criteria: "External identity federation is managed"

  IA-8(1):
    title: Acceptance of PIV Credentials from Other Agencies
    description: |
      Accept and electronically verify PIV credentials from other federal agencies.
    baseline: [moderate, high]
    parent: IA-8
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-saml-providers"
            description: "List SAML providers"
            pass_criteria: "SAML providers configured for PIV"
      azure:
        commands:
          - cmd: "az ad app list --query '[?contains(displayName,`PIV`) || contains(displayName,`CAC`)]'"
            description: "Check for PIV/CAC integration"
            pass_criteria: "PIV integration configured"

  IA-8(2):
    title: Acceptance of External Authenticators
    description: |
      Accept only external authenticators that are NIST-compliant.
    baseline: [moderate, high]
    parent: IA-8
    cloud_tests:
      aws:
        commands:
          - cmd: "aws cognito-idp list-identity-providers --user-pool-id POOL_ID"
            description: "List identity providers"
            pass_criteria: "Only NIST-compliant providers configured"
      azure:
        commands:
          - cmd: "az ad identity-provider list"
            description: "List identity providers"
            pass_criteria: "Only compliant providers configured"

  IA-9:
    title: Service Identification and Authentication
    description: |
      Uniquely identify and authenticate services and applications before establishing
      communications with devices, users, or other services.
    baseline: [high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-roles --query 'Roles[?contains(RoleName,`Service`)].{RoleName:RoleName,Arn:Arn}'"
            description: "List service roles"
            pass_criteria: "Services use dedicated roles"
          - cmd: "aws ecs list-services --cluster CLUSTER"
            description: "List ECS services"
            pass_criteria: "Services are identified"
      azure:
        commands:
          - cmd: "az ad sp list --filter \"servicePrincipalType eq 'Application'\" --query '[].{Name:displayName,AppId:appId}'"
            description: "List application service principals"
            pass_criteria: "Applications are uniquely identified"

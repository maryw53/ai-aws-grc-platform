name: NIST 800-53 MP - Media Protection
family: MP
description: Controls for protecting system media containing sensitive information
version: Rev 5

controls:
  MP-1:
    title: Policy and Procedures
    description: |
      Develop, document, and disseminate media protection policy and procedures.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws kms list-keys"
            description: "List KMS keys for media encryption"
            pass_criteria: "KMS keys support media protection"

  MP-2:
    title: Media Access
    description: |
      Restrict access to digital and non-digital media to authorized users.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws s3api get-bucket-policy --bucket BUCKET"
            description: "Check S3 bucket access policy"
            pass_criteria: "Media access is restricted"
          - cmd: "aws ec2 describe-volumes --query 'Volumes[*].{VolumeId:VolumeId,Encrypted:Encrypted,Attachments:Attachments}'"
            description: "Check EBS volume access"
            pass_criteria: "Volume access is controlled"
        evidence_script: |
          #!/bin/bash
          echo "=== MP-2 Media Access ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== S3 Bucket Access (Public Access Block) ==="
          for bucket in $(aws s3api list-buckets --query 'Buckets[*].Name' --output text); do
            echo "Bucket: $bucket"
            aws s3api get-public-access-block --bucket "$bucket" 2>/dev/null || echo "No public access block"
            echo "---"
          done
      azure:
        commands:
          - cmd: "az storage account list --query '[].{Name:name,AllowBlobPublicAccess:allowBlobPublicAccess}'"
            description: "Check storage public access"
            pass_criteria: "Public access is restricted"
      gcp:
        commands:
          - cmd: "gsutil iam get gs://BUCKET"
            description: "Check bucket IAM"
            pass_criteria: "Bucket access is restricted"

  MP-3:
    title: Media Marking
    description: |
      Mark system media indicating distribution limitations, handling caveats, and applicable security markings.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws s3api get-object-tagging --bucket BUCKET --key KEY"
            description: "Check object classification tags"
            pass_criteria: "Objects are marked/tagged"
          - cmd: "aws resourcegroupstaggingapi get-resources --tag-filters Key=Classification"
            description: "Find resources with classification tags"
            pass_criteria: "Resources are classified"
      azure:
        commands:
          - cmd: "az resource list --query '[?tags.Classification!=null]'"
            description: "Find classified resources"
            pass_criteria: "Resources are marked"
      gcp:
        commands:
          - cmd: "gcloud asset search-all-resources --query='labels.classification:*'"
            description: "Find labeled resources"
            pass_criteria: "Resources are marked"

  MP-4:
    title: Media Storage
    description: |
      Physically control and securely store digital and non-digital media.
      Protect system media types until destroyed or sanitized.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-volumes --query 'Volumes[?Encrypted==`true`]'"
            description: "Check for encrypted volumes"
            pass_criteria: "Media storage is encrypted"
          - cmd: "aws s3api get-bucket-encryption --bucket BUCKET"
            description: "Check S3 encryption"
            pass_criteria: "S3 storage is encrypted"
        evidence_script: |
          #!/bin/bash
          echo "=== MP-4 Media Storage ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Encrypted EBS Volumes ==="
          aws ec2 describe-volumes --query 'Volumes[*].{VolumeId:VolumeId,Encrypted:Encrypted,Size:Size}' --output table
          echo ""
          echo "=== S3 Bucket Encryption ==="
          for bucket in $(aws s3api list-buckets --query 'Buckets[*].Name' --output text); do
            echo -n "$bucket: "
            aws s3api get-bucket-encryption --bucket "$bucket" 2>/dev/null && echo "Encrypted" || echo "NOT ENCRYPTED"
          done
      azure:
        commands:
          - cmd: "az disk list --query '[].{Name:name,Encrypted:encryptionSettingsCollection.enabled}'"
            description: "Check disk encryption"
            pass_criteria: "Disks are encrypted"
      gcp:
        commands:
          - cmd: "gcloud compute disks list --format='table(name,diskEncryptionKey)'"
            description: "Check disk encryption"
            pass_criteria: "Disks are encrypted"

  MP-5:
    title: Media Transport
    description: |
      Protect and control digital and non-digital media during transport.
      Document activities associated with transport. Restrict activities to authorized personnel.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws s3api get-bucket-policy --bucket BUCKET"
            description: "Check S3 transport policies"
            pass_criteria: "Transport requires encryption"
          - cmd: "aws snowball list-jobs"
            description: "List Snowball jobs"
            pass_criteria: "Physical transport is documented"
      azure:
        commands:
          - cmd: "az databox job list"
            description: "List Data Box jobs"
            pass_criteria: "Physical transport is documented"
      gcp:
        commands:
          - cmd: "gcloud transfer jobs list"
            description: "List transfer jobs"
            pass_criteria: "Transfers are documented"

  MP-6:
    title: Media Sanitization
    description: |
      Sanitize digital and non-digital media prior to disposal, release, or reuse.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-volumes --filters 'Name=status,Values=available'"
            description: "Find unattached volumes (candidates for sanitization)"
            pass_criteria: "Unattached volumes are managed"
          - cmd: "aws ec2 describe-snapshots --owner-ids self --query 'Snapshots[*].{Id:SnapshotId,StartTime:StartTime}'"
            description: "List snapshots for lifecycle review"
            pass_criteria: "Snapshots are lifecycle managed"
        evidence_script: |
          #!/bin/bash
          echo "=== MP-6 Media Sanitization ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Unattached Volumes (Review for Deletion) ==="
          aws ec2 describe-volumes --filters 'Name=status,Values=available' --query 'Volumes[*].{VolumeId:VolumeId,Size:Size,CreateTime:CreateTime}' --output table
          echo ""
          echo "=== Old Snapshots (Review for Deletion) ==="
          cutoff=$(date -d "-365 days" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -v-365d +%Y-%m-%dT%H:%M:%SZ)
          aws ec2 describe-snapshots --owner-ids self --query "Snapshots[?StartTime<\`$cutoff\`].{Id:SnapshotId,StartTime:StartTime}" --output table | head -20
      azure:
        commands:
          - cmd: "az disk list --query '[?diskState==`Unattached`]'"
            description: "Find unattached disks"
            pass_criteria: "Unattached disks are managed"
      gcp:
        commands:
          - cmd: "gcloud compute disks list --filter='status:READY AND NOT users:*'"
            description: "Find unattached disks"
            pass_criteria: "Unattached disks are managed"

  MP-6(1):
    title: Review, Approve, Track, Document, and Verify
    description: |
      Review, approve, track, document, and verify media sanitization and disposal actions.
    baseline: [moderate, high]
    parent: MP-6
    cloud_tests:
      aws:
        commands:
          - cmd: "aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=DeleteVolume"
            description: "Check volume deletion events"
            pass_criteria: "Deletions are logged"
          - cmd: "aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=DeleteSnapshot"
            description: "Check snapshot deletion events"
            pass_criteria: "Deletions are documented"
      azure:
        commands:
          - cmd: "az monitor activity-log list --query '[?authorization.action contains `delete`]'"
            description: "Check deletion activity"
            pass_criteria: "Deletions are logged"

  MP-7:
    title: Media Use
    description: |
      Restrict the use of certain types of digital media on organizational systems.
      Prohibit the use of portable storage devices when such devices have no identifiable owner.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws organizations list-policies --filter SERVICE_CONTROL_POLICY"
            description: "Check SCPs for media restrictions"
            pass_criteria: "Policies restrict media use"
          - cmd: "aws ec2 describe-instances --query 'Reservations[*].Instances[*].{Id:InstanceId,BlockDevices:BlockDeviceMappings}'"
            description: "Check instance storage"
            pass_criteria: "Storage is controlled"
      azure:
        commands:
          - cmd: "az policy definition list --query '[?contains(displayName,`storage`)]'"
            description: "Check storage policies"
            pass_criteria: "Storage policies exist"

  MP-8:
    title: Media Downgrading
    description: |
      Establish a process for downgrading media when approved.
      Employ downgrading mechanisms with defined strength and integrity.
    baseline: [high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws resourcegroupstaggingapi get-resources --tag-filters Key=Classification"
            description: "Check classification tags"
            pass_criteria: "Classification is documented"
      azure:
        commands:
          - cmd: "az purview data-source list"
            description: "Check data governance"
            pass_criteria: "Data governance supports downgrading"

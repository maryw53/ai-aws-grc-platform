name: NIST 800-53 CM - Configuration Management
family: CM
description: Controls for managing system configuration, baseline settings, and changes
version: Rev 5

controls:
  CM-1:
    title: Policy and Procedures
    description: |
      Develop, document, and disseminate configuration management policy and procedures.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws configservice describe-configuration-recorders"
            description: "Check AWS Config recorders"
            pass_criteria: "Configuration recorders are active"
      azure:
        commands:
          - cmd: "az policy assignment list"
            description: "List policy assignments"
            pass_criteria: "Configuration policies are assigned"
      gcp:
        commands:
          - cmd: "gcloud resource-manager org-policies list --organization=ORG_ID"
            description: "List organization policies"
            pass_criteria: "Configuration policies are defined"

  CM-2:
    title: Baseline Configuration
    description: |
      Develop, document, and maintain current baseline configurations for the system.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws configservice describe-conformance-packs"
            description: "List conformance packs (baseline configs)"
            pass_criteria: "Conformance packs define baseline"
          - cmd: "aws ec2 describe-launch-templates"
            description: "List EC2 launch templates"
            pass_criteria: "Launch templates define baseline"
          - cmd: "aws ssm list-documents --document-filter-list 'key=DocumentType,value=Automation'"
            description: "List SSM automation documents"
            pass_criteria: "Automation documents maintain baseline"
        evidence_script: |
          #!/bin/bash
          echo "=== CM-2 Baseline Configuration ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Conformance Packs ==="
          aws configservice describe-conformance-packs --query 'ConformancePackDetails[*].{Name:ConformancePackName,Status:ConformancePackState}' --output table
          echo ""
          echo "=== Launch Templates ==="
          aws ec2 describe-launch-templates --query 'LaunchTemplates[*].{Name:LaunchTemplateName,Version:LatestVersionNumber}' --output table
          echo ""
          echo "=== CloudFormation Stacks ==="
          aws cloudformation list-stacks --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE --query 'StackSummaries[*].{Name:StackName,Status:StackStatus}' --output table
      azure:
        commands:
          - cmd: "az blueprint list"
            description: "List Azure Blueprints"
            pass_criteria: "Blueprints define baseline"
          - cmd: "az vm image list --all --publisher Canonical --offer UbuntuServer"
            description: "List approved VM images"
            pass_criteria: "Approved images are documented"
      gcp:
        commands:
          - cmd: "gcloud compute instance-templates list"
            description: "List instance templates"
            pass_criteria: "Instance templates define baseline"
          - cmd: "gcloud deployment-manager deployments list"
            description: "List Deployment Manager deployments"
            pass_criteria: "Deployments maintain baseline"
      kubernetes:
        commands:
          - cmd: "kubectl get configmaps -A"
            description: "List ConfigMaps"
            pass_criteria: "ConfigMaps define baseline settings"
          - cmd: "helm list -A"
            description: "List Helm releases"
            pass_criteria: "Helm charts define baseline"

  CM-2(2):
    title: Automation Support for Accuracy and Currency
    description: |
      Maintain the currency, completeness, accuracy, and availability of the baseline configuration
      using automated mechanisms.
    baseline: [moderate, high]
    parent: CM-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws configservice describe-configuration-recorder-status"
            description: "Check Config recorder status"
            pass_criteria: "Recorder is recording"
          - cmd: "aws ssm describe-patch-baselines"
            description: "List patch baselines"
            pass_criteria: "Patch baselines are current"
      azure:
        commands:
          - cmd: "az automation account list"
            description: "List Automation accounts"
            pass_criteria: "Automation maintains baseline"
          - cmd: "az policy state list --query '[?complianceState==`NonCompliant`]'"
            description: "Check policy compliance"
            pass_criteria: "No non-compliant resources"
      gcp:
        commands:
          - cmd: "gcloud asset search-all-resources --asset-types='compute.googleapis.com/Instance'"
            description: "Search compute resources"
            pass_criteria: "Resources match baseline"

  CM-2(3):
    title: Retention of Previous Configurations
    description: |
      Retain previous versions of baseline configurations to support rollback.
    baseline: [moderate, high]
    parent: CM-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws configservice get-resource-config-history --resource-type AWS::EC2::Instance --resource-id INSTANCE_ID --limit 5"
            description: "Check configuration history"
            pass_criteria: "Configuration history is maintained"
          - cmd: "aws ec2 describe-launch-template-versions --launch-template-id TEMPLATE_ID"
            description: "List launch template versions"
            pass_criteria: "Multiple versions maintained"
      azure:
        commands:
          - cmd: "az vm list --query '[].{Name:name,Version:storageProfile.imageReference.version}'"
            description: "Check VM versions"
            pass_criteria: "Version history is maintained"
      gcp:
        commands:
          - cmd: "gcloud compute instance-templates list --sort-by=creationTimestamp"
            description: "List template versions"
            pass_criteria: "Template versions are retained"

  CM-3:
    title: Configuration Change Control
    description: |
      Determine and document types of changes under configuration control.
      Review proposed changes and approve/disapprove with explicit security impact consideration.
      Document and retain configuration change decisions.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=ModifyInstanceAttribute --max-results 10"
            description: "Check for configuration change events"
            pass_criteria: "Changes are logged"
          - cmd: "aws servicecatalog list-portfolios"
            description: "List Service Catalog portfolios"
            pass_criteria: "Changes go through Service Catalog"
          - cmd: "aws codecommit list-repositories"
            description: "List CodeCommit repositories"
            pass_criteria: "Infrastructure code is version controlled"
        evidence_script: |
          #!/bin/bash
          echo "=== CM-3 Configuration Change Control ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Recent Configuration Changes ==="
          aws cloudtrail lookup-events --lookup-attributes AttributeKey=ReadOnly,AttributeValue=false --max-results 20 --query 'Events[*].{Time:EventTime,Event:EventName,User:Username}' --output table
          echo ""
          echo "=== CodePipeline (Change Control) ==="
          aws codepipeline list-pipelines --query 'pipelines[*].{Name:name}' --output table
      azure:
        commands:
          - cmd: "az monitor activity-log list --max-events 10 --query '[].{Operation:operationName.value,Status:status.value,Caller:caller}'"
            description: "Check Activity Log for changes"
            pass_criteria: "Changes are logged"
          - cmd: "az devops project list"
            description: "List DevOps projects"
            pass_criteria: "Changes go through DevOps"
      gcp:
        commands:
          - cmd: "gcloud logging read 'protoPayload.methodName:update OR protoPayload.methodName:insert' --limit=10"
            description: "Check for configuration changes"
            pass_criteria: "Changes are logged"
          - cmd: "gcloud source repos list"
            description: "List Cloud Source Repositories"
            pass_criteria: "Infrastructure code is version controlled"
      kubernetes:
        commands:
          - cmd: "kubectl get events --field-selector reason=Updated --sort-by='.lastTimestamp'"
            description: "Check for update events"
            pass_criteria: "Changes are tracked"

  CM-3(2):
    title: Testing, Validation, and Documentation of Changes
    description: |
      Test, validate, and document changes before implementation in the operational environment.
    baseline: [moderate, high]
    parent: CM-3
    cloud_tests:
      aws:
        commands:
          - cmd: "aws codepipeline list-pipelines"
            description: "List CI/CD pipelines"
            pass_criteria: "Pipelines include testing stages"
          - cmd: "aws cloudformation describe-change-sets --stack-name STACK"
            description: "Check change sets for testing"
            pass_criteria: "Change sets document changes"
      azure:
        commands:
          - cmd: "az pipelines list"
            description: "List Azure Pipelines"
            pass_criteria: "Pipelines include testing"
      gcp:
        commands:
          - cmd: "gcloud builds list --limit=5"
            description: "List Cloud Build history"
            pass_criteria: "Builds include testing"

  CM-4:
    title: Impact Analyses
    description: |
      Analyze changes to the system to determine potential security and privacy impacts
      prior to implementation.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws cloudformation describe-change-sets --stack-name STACK --query 'Summaries[*].{Name:ChangeSetName,Status:Status}'"
            description: "List change sets for impact analysis"
            pass_criteria: "Change sets exist for proposed changes"
          - cmd: "aws access-analyzer list-analyzers"
            description: "List Access Analyzers for impact analysis"
            pass_criteria: "Access Analyzer evaluates policy changes"
      azure:
        commands:
          - cmd: "az policy state list --query '[?complianceState==`NonCompliant`]' --management-group MG"
            description: "Check policy compliance for impact"
            pass_criteria: "Compliance impact is analyzed"
      gcp:
        commands:
          - cmd: "gcloud iam policy-intelligence simulate-org-policy"
            description: "Simulate policy impact"
            pass_criteria: "Policy impact is analyzed"

  CM-5:
    title: Access Restrictions for Change
    description: |
      Define, document, approve, and enforce physical and logical access restrictions
      for changes to the system.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-policies --query 'Policies[?contains(PolicyName,`Change`) || contains(PolicyName,`Deploy`)]'"
            description: "List change-related policies"
            pass_criteria: "Policies restrict change access"
          - cmd: "aws organizations list-policies --filter SERVICE_CONTROL_POLICY"
            description: "List SCPs for change restrictions"
            pass_criteria: "SCPs enforce change restrictions"
        evidence_script: |
          #!/bin/bash
          echo "=== CM-5 Access Restrictions for Change ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Service Control Policies ==="
          aws organizations list-policies --filter SERVICE_CONTROL_POLICY --query 'Policies[*].{Name:Name,Id:Id}' --output table
          echo ""
          echo "=== IAM Users with Modify Permissions ==="
          aws iam get-account-authorization-details --filter User --query 'UserDetailList[*].{UserName:UserName,Policies:AttachedManagedPolicies[*].PolicyName}' --output table
      azure:
        commands:
          - cmd: "az role assignment list --role 'Contributor'"
            description: "List Contributor role assignments"
            pass_criteria: "Change access is restricted"
          - cmd: "az lock list"
            description: "List resource locks"
            pass_criteria: "Locks protect critical resources"
      gcp:
        commands:
          - cmd: "gcloud projects get-iam-policy PROJECT --filter='bindings.role:editor'"
            description: "List users with Editor role"
            pass_criteria: "Change access is restricted"
          - cmd: "gcloud resource-manager org-policies describe constraints/compute.requireShieldedVm --organization=ORG_ID"
            description: "Check organization constraints"
            pass_criteria: "Constraints enforce restrictions"
      kubernetes:
        commands:
          - cmd: "kubectl get clusterrolebindings -o json | jq '.items[] | select(.roleRef.name | test(\"edit|admin\"))'"
            description: "List edit/admin bindings"
            pass_criteria: "Change access is restricted"

  CM-6:
    title: Configuration Settings
    description: |
      Establish and document configuration settings that reflect the most restrictive mode
      consistent with operational requirements.
      Implement the configuration settings.
      Monitor and control changes to the settings.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws configservice describe-config-rules"
            description: "List Config rules for settings"
            pass_criteria: "Config rules enforce settings"
          - cmd: "aws ssm describe-parameters --query 'Parameters[?Type==`SecureString`]'"
            description: "List secure parameters"
            pass_criteria: "Sensitive settings are secured"
          - cmd: "aws ec2 describe-instances --query 'Reservations[*].Instances[*].{Id:InstanceId,MetadataOptions:MetadataOptions}'"
            description: "Check instance metadata settings"
            pass_criteria: "IMDSv2 is required"
        evidence_script: |
          #!/bin/bash
          echo "=== CM-6 Configuration Settings ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Config Rules ==="
          aws configservice describe-config-rules --query 'ConfigRules[*].{Name:ConfigRuleName,State:ConfigRuleState}' --output table
          echo ""
          echo "=== Instance Metadata Settings ==="
          aws ec2 describe-instances --query 'Reservations[*].Instances[*].{Id:InstanceId,HttpTokens:MetadataOptions.HttpTokens,HttpEndpoint:MetadataOptions.HttpEndpoint}' --output table
      azure:
        commands:
          - cmd: "az policy state summarize"
            description: "Summarize policy compliance"
            pass_criteria: "Configuration is compliant"
          - cmd: "az vm list --query '[].{Name:name,SecurityType:securityProfile.securityType}'"
            description: "Check VM security settings"
            pass_criteria: "Security settings are restrictive"
      gcp:
        commands:
          - cmd: "gcloud compute project-info describe --format='value(commonInstanceMetadata)'"
            description: "Check project metadata settings"
            pass_criteria: "Project settings are restrictive"
          - cmd: "gcloud asset search-all-resources --query='state:ACTIVE'"
            description: "Search active resources"
            pass_criteria: "Resources match configuration"
      kubernetes:
        commands:
          - cmd: "kubectl get configmaps -A -o json | jq '.items[] | {namespace:.metadata.namespace,name:.metadata.name}'"
            description: "List ConfigMaps"
            pass_criteria: "Configuration is documented"

  CM-6(1):
    title: Automated Management, Application, and Verification
    description: |
      Manage, apply, and verify configuration settings using automated mechanisms.
    baseline: [moderate, high]
    parent: CM-6
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ssm describe-instance-information --query 'InstanceInformationList[*].{Id:InstanceId,PingStatus:PingStatus,AssociationStatus:AssociationStatus}'"
            description: "Check SSM managed instances"
            pass_criteria: "Instances are SSM managed"
          - cmd: "aws configservice describe-remediation-configurations"
            description: "List auto-remediation configs"
            pass_criteria: "Auto-remediation is configured"
      azure:
        commands:
          - cmd: "az policy remediation list"
            description: "List policy remediations"
            pass_criteria: "Auto-remediation is configured"
      gcp:
        commands:
          - cmd: "gcloud compute instances os-inventory describe INSTANCE"
            description: "Check OS inventory"
            pass_criteria: "OS inventory is automated"

  CM-7:
    title: Least Functionality
    description: |
      Configure the system to provide only mission essential capabilities.
      Prohibit or restrict the use of specified functions, ports, protocols, and services.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-security-groups --query 'SecurityGroups[*].{GroupId:GroupId,GroupName:GroupName,IpPermissions:IpPermissions}'"
            description: "Check security group rules"
            pass_criteria: "Only necessary ports are open"
          - cmd: "aws elbv2 describe-listeners --query 'Listeners[*].{Protocol:Protocol,Port:Port}'"
            description: "Check load balancer listeners"
            pass_criteria: "Only necessary protocols/ports"
          - cmd: "aws lambda list-functions --query 'Functions[*].{Name:FunctionName,Runtime:Runtime}'"
            description: "List Lambda runtimes"
            pass_criteria: "Only necessary runtimes"
        evidence_script: |
          #!/bin/bash
          echo "=== CM-7 Least Functionality ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Open Ports (Security Groups with 0.0.0.0/0) ==="
          aws ec2 describe-security-groups --query 'SecurityGroups[?IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]]].{GroupId:GroupId,GroupName:GroupName,Ports:IpPermissions[*].{From:FromPort,To:ToPort,Protocol:IpProtocol}}' --output json
          echo ""
          echo "=== Running Services ==="
          aws ecs list-services --cluster default 2>/dev/null || echo "No ECS services"
      azure:
        commands:
          - cmd: "az network nsg rule list --nsg-name NSG --resource-group RG"
            description: "List NSG rules"
            pass_criteria: "Only necessary rules"
          - cmd: "az vm extension list --vm-name VM --resource-group RG"
            description: "List VM extensions"
            pass_criteria: "Only necessary extensions"
      gcp:
        commands:
          - cmd: "gcloud compute firewall-rules list --format='table(name,allowed,targetTags)'"
            description: "List firewall rules"
            pass_criteria: "Only necessary rules"
          - cmd: "gcloud services list --enabled"
            description: "List enabled APIs"
            pass_criteria: "Only necessary APIs enabled"
      kubernetes:
        commands:
          - cmd: "kubectl get services -A -o json | jq '.items[] | {name:.metadata.name,type:.spec.type,ports:.spec.ports}'"
            description: "List exposed services"
            pass_criteria: "Only necessary services exposed"

  CM-7(1):
    title: Periodic Review
    description: |
      Review the system to identify unnecessary and/or nonsecure functions, ports,
      protocols, and services; and disable those deemed unnecessary.
    baseline: [moderate, high]
    parent: CM-7
    cloud_tests:
      aws:
        commands:
          - cmd: "aws trustedadvisor describe-checks --language en"
            description: "List Trusted Advisor checks"
            pass_criteria: "Trusted Advisor reviews are current"
          - cmd: "aws securityhub get-findings --filters '{\"ProductName\":[{\"Value\":\"Security Hub\",\"Comparison\":\"EQUALS\"}]}' --max-items 10"
            description: "Check Security Hub findings"
            pass_criteria: "Findings are reviewed"
      azure:
        commands:
          - cmd: "az security assessment list"
            description: "List security assessments"
            pass_criteria: "Assessments are reviewed"
      gcp:
        commands:
          - cmd: "gcloud recommender recommendations list --recommender=google.iam.policy.Recommender --location=global"
            description: "List IAM recommendations"
            pass_criteria: "Recommendations are reviewed"

  CM-7(2):
    title: Prevent Program Execution
    description: |
      Prevent program execution in accordance with defined policies regarding software program
      usage and restrictions.
    baseline: [moderate, high]
    parent: CM-7
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ssm describe-document --name AWS-RunPowerShellScript"
            description: "Check SSM document restrictions"
            pass_criteria: "Script execution is controlled"
          - cmd: "aws organizations list-policies --filter SERVICE_CONTROL_POLICY"
            description: "List SCPs for execution control"
            pass_criteria: "SCPs restrict execution"
      azure:
        commands:
          - cmd: "az vm run-command list --location LOCATION"
            description: "Check allowed run commands"
            pass_criteria: "Run commands are controlled"
      gcp:
        commands:
          - cmd: "gcloud compute instances describe INSTANCE --format='value(shieldedInstanceConfig)'"
            description: "Check Shielded VM settings"
            pass_criteria: "Secure boot prevents unauthorized execution"
      kubernetes:
        commands:
          - cmd: "kubectl get podsecuritypolicies"
            description: "Check pod security policies"
            pass_criteria: "PSPs prevent unauthorized execution"

  CM-8:
    title: System Component Inventory
    description: |
      Develop and document an inventory of system components that accurately reflects the system.
      Update the inventory as system changes occur.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-instances --query 'Reservations[*].Instances[*].{Id:InstanceId,Type:InstanceType,State:State.Name,Tags:Tags}'"
            description: "List EC2 instances"
            pass_criteria: "All instances are inventoried"
          - cmd: "aws resourcegroupstaggingapi get-resources --resource-type-filters ec2"
            description: "Get tagged resources"
            pass_criteria: "Resources are tagged for inventory"
          - cmd: "aws ssm describe-instance-information"
            description: "List SSM managed instances"
            pass_criteria: "Instances are in SSM inventory"
        evidence_script: |
          #!/bin/bash
          echo "=== CM-8 System Component Inventory ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== EC2 Instances ==="
          aws ec2 describe-instances --query 'Reservations[*].Instances[*].{Id:InstanceId,Type:InstanceType,State:State.Name,Name:Tags[?Key==`Name`]|[0].Value}' --output table
          echo ""
          echo "=== RDS Instances ==="
          aws rds describe-db-instances --query 'DBInstances[*].{Id:DBInstanceIdentifier,Engine:Engine,Status:DBInstanceStatus}' --output table
          echo ""
          echo "=== Lambda Functions ==="
          aws lambda list-functions --query 'Functions[*].{Name:FunctionName,Runtime:Runtime}' --output table
          echo ""
          echo "=== S3 Buckets ==="
          aws s3api list-buckets --query 'Buckets[*].{Name:Name,Created:CreationDate}' --output table
      azure:
        commands:
          - cmd: "az resource list --output table"
            description: "List all resources"
            pass_criteria: "All resources are inventoried"
          - cmd: "az vm list --output table"
            description: "List VMs"
            pass_criteria: "VMs are inventoried"
      gcp:
        commands:
          - cmd: "gcloud asset search-all-resources"
            description: "Search all resources"
            pass_criteria: "All resources are inventoried"
          - cmd: "gcloud compute instances list"
            description: "List compute instances"
            pass_criteria: "Instances are inventoried"
      kubernetes:
        commands:
          - cmd: "kubectl get all -A"
            description: "List all resources"
            pass_criteria: "All resources are inventoried"

  CM-8(1):
    title: Updates During Installation and Removal
    description: |
      Update the inventory as an integral part of component installation, removal, and updates.
    baseline: [moderate, high]
    parent: CM-8
    cloud_tests:
      aws:
        commands:
          - cmd: "aws configservice describe-configuration-recorder-status"
            description: "Check Config recorder (auto-updates inventory)"
            pass_criteria: "Config recorder is active"
          - cmd: "aws cloudtrail lookup-events --lookup-attributes AttributeKey=EventName,AttributeValue=RunInstances --max-results 5"
            description: "Check for instance launches"
            pass_criteria: "Launches are tracked"
      azure:
        commands:
          - cmd: "az monitor activity-log list --resource-type Microsoft.Compute/virtualMachines --max-events 10"
            description: "Check VM activity log"
            pass_criteria: "VM changes are tracked"
      gcp:
        commands:
          - cmd: "gcloud logging read 'protoPayload.methodName:compute.instances.insert OR protoPayload.methodName:compute.instances.delete' --limit=10"
            description: "Check instance creation/deletion logs"
            pass_criteria: "Changes are tracked"

  CM-8(3):
    title: Automated Unauthorized Component Detection
    description: |
      Employ automated mechanisms to detect the presence of unauthorized hardware, software,
      and firmware components.
    baseline: [moderate, high]
    parent: CM-8
    cloud_tests:
      aws:
        commands:
          - cmd: "aws configservice describe-config-rules --query 'ConfigRules[?contains(ConfigRuleName,`approved`)]'"
            description: "Check for approved component rules"
            pass_criteria: "Rules detect unauthorized components"
          - cmd: "aws inspector2 list-findings --filter-criteria '{\"findingType\":[{\"comparison\":\"EQUALS\",\"value\":\"PACKAGE_VULNERABILITY\"}]}'"
            description: "Check Inspector findings"
            pass_criteria: "Inspector detects unauthorized software"
      azure:
        commands:
          - cmd: "az security assessment list --query '[?status.code==`Unhealthy`]'"
            description: "Check unhealthy assessments"
            pass_criteria: "Unauthorized components are detected"
      gcp:
        commands:
          - cmd: "gcloud container images list"
            description: "List container images"
            pass_criteria: "Only authorized images are used"

  CM-9:
    title: Configuration Management Plan
    description: |
      Develop, document, and implement a configuration management plan that addresses roles,
      responsibilities, and configuration management processes and procedures.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws configservice describe-configuration-recorders"
            description: "Check Config service (CM implementation)"
            pass_criteria: "AWS Config is the CM tool"
          - cmd: "aws servicecatalog list-portfolios"
            description: "List Service Catalog portfolios"
            pass_criteria: "Service Catalog supports CM"
      azure:
        commands:
          - cmd: "az policy assignment list"
            description: "List policy assignments"
            pass_criteria: "Policies support CM"
      gcp:
        commands:
          - cmd: "gcloud resource-manager org-policies list --organization=ORG_ID"
            description: "List organization policies"
            pass_criteria: "Org policies support CM"

  CM-10:
    title: Software Usage Restrictions
    description: |
      Use software and associated documentation in accordance with contract agreements
      and copyright laws.
      Track the use of software and associated documentation protected by quantity licenses.
      Control and document the use of peer-to-peer file sharing technology.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws license-manager list-licenses"
            description: "List License Manager licenses"
            pass_criteria: "Software licenses are tracked"
          - cmd: "aws marketplace-catalog list-entities --catalog AWSMarketplace --entity-type SaaSProduct"
            description: "List Marketplace subscriptions"
            pass_criteria: "Marketplace usage is tracked"
      azure:
        commands:
          - cmd: "az vm list-usage --location LOCATION"
            description: "List VM usage"
            pass_criteria: "Usage is tracked"
      gcp:
        commands:
          - cmd: "gcloud billing accounts list"
            description: "List billing accounts"
            pass_criteria: "Usage is tracked via billing"

  CM-11:
    title: User-Installed Software
    description: |
      Establish policies governing the installation of software by users.
      Enforce software installation policies through automated methods.
      Monitor policy compliance.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ssm describe-instance-information --query 'InstanceInformationList[*].{Id:InstanceId,Platform:PlatformType}'"
            description: "Check SSM managed instances"
            pass_criteria: "SSM controls software installation"
          - cmd: "aws organizations list-policies --filter SERVICE_CONTROL_POLICY"
            description: "List SCPs"
            pass_criteria: "SCPs restrict software installation"
      azure:
        commands:
          - cmd: "az vm extension list --vm-name VM --resource-group RG"
            description: "List installed extensions"
            pass_criteria: "Only approved extensions installed"
      gcp:
        commands:
          - cmd: "gcloud compute instances describe INSTANCE --format='value(metadata.items)'"
            description: "Check instance metadata for software policies"
            pass_criteria: "Metadata enforces software policies"
      kubernetes:
        commands:
          - cmd: "kubectl get validatingwebhookconfigurations"
            description: "Check admission controllers"
            pass_criteria: "Admission controllers restrict images"

  CM-12:
    title: Information Location
    description: |
      Identify and document the location of information that is processed and stored by the system.
      Identify and document the users who have access to the system and information.
    baseline: [high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws macie2 describe-buckets"
            description: "Check Macie data discovery"
            pass_criteria: "Data locations are identified"
          - cmd: "aws s3api list-buckets --query 'Buckets[*].Name'"
            description: "List S3 buckets (data locations)"
            pass_criteria: "Data locations are documented"
          - cmd: "aws rds describe-db-instances --query 'DBInstances[*].{Id:DBInstanceIdentifier,Region:AvailabilityZone}'"
            description: "List database locations"
            pass_criteria: "Database locations are documented"
      azure:
        commands:
          - cmd: "az storage account list --query '[].{Name:name,Location:location}'"
            description: "List storage locations"
            pass_criteria: "Data locations are documented"
      gcp:
        commands:
          - cmd: "gcloud storage buckets list --format='table(name,location)'"
            description: "List bucket locations"
            pass_criteria: "Data locations are documented"

  CM-14:
    title: Signed Components
    description: |
      Prevent the installation of software and firmware components without verification
      that the component has been digitally signed.
    baseline: [high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws signer list-signing-jobs"
            description: "List code signing jobs"
            pass_criteria: "Code signing is used"
          - cmd: "aws lambda get-code-signing-config --code-signing-config-arn ARN"
            description: "Check Lambda code signing"
            pass_criteria: "Lambda functions require signed code"
      azure:
        commands:
          - cmd: "az acr show --name REGISTRY --query 'policies.trustPolicy'"
            description: "Check ACR trust policy"
            pass_criteria: "Image signing is required"
      gcp:
        commands:
          - cmd: "gcloud container binauthz attestors list"
            description: "List Binary Authorization attestors"
            pass_criteria: "Binary Authorization enforces signatures"
      kubernetes:
        commands:
          - cmd: "kubectl get validatingwebhookconfigurations -o json | jq '.items[] | select(.webhooks[].name | contains(\"sigstore\"))'"
            description: "Check for signature validation webhooks"
            pass_criteria: "Image signatures are validated"

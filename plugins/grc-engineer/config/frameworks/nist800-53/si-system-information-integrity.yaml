name: NIST 800-53 SI - System and Information Integrity
family: SI
description: Controls for flaw remediation, malware protection, monitoring, and integrity verification
version: Rev 5

controls:
  SI-1:
    title: Policy and Procedures
    description: |
      Develop, document, and disseminate system and information integrity policy and procedures.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws inspector2 list-coverage"
            description: "Check Inspector coverage"
            pass_criteria: "Inspector monitors for vulnerabilities"
      azure:
        commands:
          - cmd: "az security assessment list"
            description: "List security assessments"
            pass_criteria: "Security assessments are configured"
      gcp:
        commands:
          - cmd: "gcloud container images list-vulnerabilities IMAGE"
            description: "List image vulnerabilities"
            pass_criteria: "Vulnerability scanning is enabled"

  SI-2:
    title: Flaw Remediation
    description: |
      Identify, report, and correct system flaws.
      Install security-relevant software and firmware updates.
      Test updates before installation in operational environments.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ssm describe-instance-patch-states"
            description: "Check patch compliance status"
            pass_criteria: "Instances are patched"
          - cmd: "aws inspector2 list-findings --filter-criteria '{\"findingStatus\":[{\"comparison\":\"EQUALS\",\"value\":\"ACTIVE\"}]}'"
            description: "List active vulnerability findings"
            pass_criteria: "Vulnerabilities are being remediated"
          - cmd: "aws ecr describe-image-scan-findings --repository-name REPO --image-id imageTag=latest"
            description: "Check ECR image scan findings"
            pass_criteria: "Container images are scanned"
        evidence_script: |
          #!/bin/bash
          echo "=== SI-2 Flaw Remediation ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Patch Compliance Status ==="
          aws ssm describe-instance-patch-states --query 'InstancePatchStates[*].{Instance:InstanceId,Installed:InstalledCount,Missing:MissingCount,Failed:FailedCount}' --output table
          echo ""
          echo "=== Active Vulnerability Findings ==="
          aws inspector2 list-findings --filter-criteria '{"findingStatus":[{"comparison":"EQUALS","value":"ACTIVE"}]}' --max-results 20 --query 'findings[*].{Title:title,Severity:severity,Type:type}' --output table 2>/dev/null || echo "Inspector not enabled"
          echo ""
          echo "=== SSM Patch Baselines ==="
          aws ssm describe-patch-baselines --query 'BaselineIdentities[*].{Name:BaselineName,OS:OperatingSystem,Default:DefaultBaseline}' --output table
      azure:
        commands:
          - cmd: "az security assessment list --query '[?status.code==`Unhealthy`]'"
            description: "List unhealthy assessments"
            pass_criteria: "Vulnerabilities are identified"
          - cmd: "az vm update-assessment list"
            description: "List VM update assessments"
            pass_criteria: "VMs are assessed for updates"
      gcp:
        commands:
          - cmd: "gcloud compute os-inventory list-instances"
            description: "List OS inventory instances"
            pass_criteria: "OS inventory tracks software"
          - cmd: "gcloud artifacts docker images list LOCATION-docker.pkg.dev/PROJECT/REPO --include-tags --show-occurrences"
            description: "List container vulnerabilities"
            pass_criteria: "Container vulnerabilities are scanned"
      kubernetes:
        commands:
          - cmd: "kubectl get pods -A -o json | jq '.items[] | {name:.metadata.name,image:.spec.containers[].image}'"
            description: "List pod images for scanning"
            pass_criteria: "Images are scanned for vulnerabilities"

  SI-2(2):
    title: Automated Flaw Remediation Status
    description: |
      Determine if system components have applicable security-relevant updates installed
      using automated mechanisms.
    baseline: [moderate, high]
    parent: SI-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ssm describe-instance-patch-states-for-patch-group --patch-group PATCH_GROUP"
            description: "Check patch group compliance"
            pass_criteria: "Patch groups are compliant"
          - cmd: "aws configservice describe-config-rules --query 'ConfigRules[?contains(ConfigRuleName,`patch`)]'"
            description: "Check patch Config rules"
            pass_criteria: "Config rules monitor patches"
      azure:
        commands:
          - cmd: "az policy state list --query '[?policyDefinitionName contains `update`]'"
            description: "Check update policies"
            pass_criteria: "Update policies are enforced"
      gcp:
        commands:
          - cmd: "gcloud compute os-config patch-deployments list"
            description: "List patch deployments"
            pass_criteria: "Automated patching is configured"

  SI-3:
    title: Malicious Code Protection
    description: |
      Implement malicious code protection mechanisms at system entry and exit points.
      Update malicious code protection mechanisms when new releases are available.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws guardduty list-detectors"
            description: "Check GuardDuty for malware detection"
            pass_criteria: "GuardDuty is enabled"
          - cmd: "aws macie2 get-macie-session"
            description: "Check Macie for data protection"
            pass_criteria: "Macie is enabled"
          - cmd: "aws lambda get-function --function-name FUNCTION --query 'Configuration.CodeSigningConfigArn'"
            description: "Check Lambda code signing"
            pass_criteria: "Code signing prevents malicious code"
        evidence_script: |
          #!/bin/bash
          echo "=== SI-3 Malicious Code Protection ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== GuardDuty Status ==="
          DETECTOR=$(aws guardduty list-detectors --query 'DetectorIds[0]' --output text)
          if [ "$DETECTOR" != "None" ] && [ -n "$DETECTOR" ]; then
            aws guardduty get-detector --detector-id $DETECTOR --query '{Status:Status,DataSources:DataSources}'
            echo ""
            echo "=== Recent Malware Findings ==="
            aws guardduty list-findings --detector-id $DETECTOR --finding-criteria '{"Criterion":{"type":{"Eq":["Trojan:EC2/PhishingDomainRequest!DNS","Backdoor:EC2/C&CActivity.B!DNS"]}}}' --max-results 5
          else
            echo "GuardDuty not enabled"
          fi
      azure:
        commands:
          - cmd: "az security atp show --resource-type storage"
            description: "Check Advanced Threat Protection"
            pass_criteria: "ATP is enabled"
          - cmd: "az vm extension list --vm-name VM --resource-group RG --query '[?contains(name,`Antimalware`)]'"
            description: "Check antimalware extension"
            pass_criteria: "Antimalware is installed"
      gcp:
        commands:
          - cmd: "gcloud scc findings list ORG_ID --filter='category:Malware'"
            description: "Check for malware findings"
            pass_criteria: "Malware detection is active"
      kubernetes:
        commands:
          - cmd: "kubectl get daemonsets -A -o json | jq '.items[] | select(.metadata.name | contains(\"antivirus\") or contains(\"falco\"))'"
            description: "Check for security DaemonSets"
            pass_criteria: "Security agents are deployed"

  SI-4:
    title: System Monitoring
    description: |
      Monitor the system to detect attacks and indicators of potential attacks.
      Monitor inbound and outbound communications traffic for unusual or unauthorized activities.
      Identify unauthorized use of the system.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws guardduty get-detector --detector-id DETECTOR_ID"
            description: "Check GuardDuty detector status"
            pass_criteria: "GuardDuty is actively monitoring"
          - cmd: "aws securityhub describe-hub"
            description: "Check Security Hub status"
            pass_criteria: "Security Hub aggregates findings"
          - cmd: "aws cloudwatch describe-alarms --state-value ALARM"
            description: "Check active CloudWatch alarms"
            pass_criteria: "Alarms detect anomalies"
          - cmd: "aws ec2 describe-flow-logs"
            description: "Check VPC Flow Logs"
            pass_criteria: "Flow logs monitor network traffic"
        evidence_script: |
          #!/bin/bash
          echo "=== SI-4 System Monitoring ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== GuardDuty Status ==="
          DETECTOR=$(aws guardduty list-detectors --query 'DetectorIds[0]' --output text)
          if [ "$DETECTOR" != "None" ] && [ -n "$DETECTOR" ]; then
            aws guardduty get-detector --detector-id $DETECTOR --query '{Status:Status,FindingPublishingFrequency:FindingPublishingFrequency}'
          fi
          echo ""
          echo "=== Security Hub Status ==="
          aws securityhub describe-hub 2>/dev/null || echo "Security Hub not enabled"
          echo ""
          echo "=== VPC Flow Logs ==="
          aws ec2 describe-flow-logs --query 'FlowLogs[*].{Id:FlowLogId,Status:FlowLogStatus,Traffic:TrafficType}' --output table
          echo ""
          echo "=== Active Alarms ==="
          aws cloudwatch describe-alarms --state-value ALARM --query 'MetricAlarms[*].{Name:AlarmName,State:StateValue}' --output table
      azure:
        commands:
          - cmd: "az monitor activity-log alert list"
            description: "List activity log alerts"
            pass_criteria: "Activity monitoring is active"
          - cmd: "az network watcher flow-log list --location LOCATION"
            description: "Check NSG flow logs"
            pass_criteria: "Flow logs monitor traffic"
          - cmd: "az security alert list"
            description: "List security alerts"
            pass_criteria: "Security alerts are generated"
      gcp:
        commands:
          - cmd: "gcloud logging sinks list"
            description: "List log sinks"
            pass_criteria: "Logs are collected for monitoring"
          - cmd: "gcloud scc sources list --organization=ORG_ID"
            description: "List SCC sources"
            pass_criteria: "SCC monitors for threats"
          - cmd: "gcloud compute firewall-rules list --filter='logConfig.enable=true'"
            description: "Check firewall logging"
            pass_criteria: "Firewall logs are enabled"
      kubernetes:
        commands:
          - cmd: "kubectl get pods -n monitoring"
            description: "Check monitoring namespace"
            pass_criteria: "Monitoring tools are deployed"
          - cmd: "kubectl get prometheusrules -A"
            description: "List Prometheus rules"
            pass_criteria: "Alerting rules are configured"

  SI-4(2):
    title: Automated Tools for Real-Time Analysis
    description: |
      Employ automated tools to support near real-time analysis of events.
    baseline: [moderate, high]
    parent: SI-4
    cloud_tests:
      aws:
        commands:
          - cmd: "aws kinesis list-streams"
            description: "Check Kinesis for real-time processing"
            pass_criteria: "Kinesis processes events in real-time"
          - cmd: "aws events list-rules"
            description: "Check EventBridge rules"
            pass_criteria: "EventBridge enables real-time analysis"
      azure:
        commands:
          - cmd: "az stream-analytics job list"
            description: "List Stream Analytics jobs"
            pass_criteria: "Stream Analytics for real-time"
      gcp:
        commands:
          - cmd: "gcloud dataflow jobs list"
            description: "List Dataflow jobs"
            pass_criteria: "Dataflow for real-time analysis"

  SI-4(4):
    title: Inbound and Outbound Communications Traffic
    description: |
      Monitor inbound and outbound communications traffic continuously for unusual or unauthorized activities.
    baseline: [moderate, high]
    parent: SI-4
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-flow-logs --query 'FlowLogs[*].{Id:FlowLogId,Traffic:TrafficType,Status:FlowLogStatus}'"
            description: "Check VPC Flow Logs for all traffic"
            pass_criteria: "Flow logs capture ALL traffic"
          - cmd: "aws networkfirewall list-firewalls"
            description: "Check Network Firewall"
            pass_criteria: "Network Firewall monitors traffic"
      azure:
        commands:
          - cmd: "az network watcher flow-log list --location LOCATION"
            description: "Check NSG flow logs"
            pass_criteria: "Flow logs capture traffic"
      gcp:
        commands:
          - cmd: "gcloud compute networks subnets list --format='table(name,enableFlowLogs)'"
            description: "Check subnet flow logs"
            pass_criteria: "Flow logs enabled on subnets"

  SI-5:
    title: Security Alerts, Advisories, and Directives
    description: |
      Receive security alerts, advisories, and directives from external organizations on an ongoing basis.
      Generate internal security alerts, advisories, and directives.
      Disseminate security alerts to personnel.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws health describe-events --filter 'eventStatusCodes=open'"
            description: "Check AWS Health events"
            pass_criteria: "Health events are monitored"
          - cmd: "aws sns list-topics"
            description: "Check SNS topics for alerts"
            pass_criteria: "SNS distributes alerts"
      azure:
        commands:
          - cmd: "az monitor activity-log list --max-events 5"
            description: "Check activity log for advisories"
            pass_criteria: "Activity log captures events"
      gcp:
        commands:
          - cmd: "gcloud scc notifications list --organization=ORG_ID"
            description: "Check SCC notifications"
            pass_criteria: "Notifications are configured"

  SI-6:
    title: Security and Privacy Function Verification
    description: |
      Verify the correct operation of security and privacy functions.
      Perform verification upon system startup, restart, command, and at defined frequency.
      Notify personnel of failed verification tests.
    baseline: [high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws configservice describe-config-rule-evaluation-status"
            description: "Check Config rule evaluation"
            pass_criteria: "Config rules verify security functions"
          - cmd: "aws guardduty list-detectors"
            description: "Verify GuardDuty is operational"
            pass_criteria: "Security services are running"
      azure:
        commands:
          - cmd: "az security assessment list"
            description: "Check security assessments"
            pass_criteria: "Assessments verify functions"
      gcp:
        commands:
          - cmd: "gcloud scc settings describe --organization=ORG_ID"
            description: "Check SCC settings"
            pass_criteria: "SCC verifies security functions"

  SI-7:
    title: Software, Firmware, and Information Integrity
    description: |
      Employ integrity verification tools to detect unauthorized changes to software, firmware, and information.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws signer list-signing-jobs"
            description: "Check code signing jobs"
            pass_criteria: "Code signing verifies integrity"
          - cmd: "aws cloudtrail describe-trails --query 'trailList[*].{Name:Name,LogFileValidation:LogFileValidationEnabled}'"
            description: "Check CloudTrail log validation"
            pass_criteria: "Log file validation enabled"
          - cmd: "aws s3api get-object-lock-configuration --bucket BUCKET"
            description: "Check S3 Object Lock"
            pass_criteria: "Object Lock prevents modification"
        evidence_script: |
          #!/bin/bash
          echo "=== SI-7 Software and Information Integrity ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== CloudTrail Log Validation ==="
          aws cloudtrail describe-trails --query 'trailList[*].{Name:Name,LogFileValidation:LogFileValidationEnabled}' --output table
          echo ""
          echo "=== S3 Object Lock Status ==="
          for bucket in $(aws s3api list-buckets --query 'Buckets[*].Name' --output text); do
            echo -n "$bucket: "
            aws s3api get-object-lock-configuration --bucket "$bucket" 2>/dev/null && echo "Object Lock enabled" || echo "No Object Lock"
          done
      azure:
        commands:
          - cmd: "az acr show --name REGISTRY --query 'policies.trustPolicy'"
            description: "Check ACR content trust"
            pass_criteria: "Content trust verifies integrity"
      gcp:
        commands:
          - cmd: "gcloud container binauthz policy export"
            description: "Check Binary Authorization policy"
            pass_criteria: "Binary Authorization verifies images"
      kubernetes:
        commands:
          - cmd: "kubectl get validatingwebhookconfigurations"
            description: "Check admission webhooks"
            pass_criteria: "Webhooks verify integrity"

  SI-7(1):
    title: Integrity Checks
    description: |
      Perform integrity checks on software, firmware, and information.
    baseline: [moderate, high]
    parent: SI-7
    cloud_tests:
      aws:
        commands:
          - cmd: "aws cloudtrail validate-logs --trail-arn TRAIL_ARN --start-time START --end-time END"
            description: "Validate CloudTrail logs"
            pass_criteria: "Log integrity is verified"
      azure:
        commands:
          - cmd: "az storage blob immutability-policy show --account-name ACCOUNT --container-name CONTAINER --blob-name BLOB"
            description: "Check immutability policy"
            pass_criteria: "Immutability ensures integrity"
      gcp:
        commands:
          - cmd: "gsutil hash gs://BUCKET/OBJECT"
            description: "Check object hash"
            pass_criteria: "Hash verifies integrity"

  SI-8:
    title: Spam Protection
    description: |
      Employ spam protection mechanisms at system entry and exit points.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ses get-account-sending-enabled"
            description: "Check SES sending status"
            pass_criteria: "SES is configured for email"
          - cmd: "aws workmail describe-organization --organization-id ORG_ID"
            description: "Check WorkMail spam protection"
            pass_criteria: "WorkMail provides spam protection"
      azure:
        commands:
          - cmd: "az communication email list"
            description: "Check Azure Communication Services"
            pass_criteria: "Email services have spam protection"

  SI-10:
    title: Information Input Validation
    description: |
      Check the validity of information inputs.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws wafv2 list-web-acls --scope REGIONAL"
            description: "Check WAF for input validation"
            pass_criteria: "WAF validates inputs"
          - cmd: "aws apigateway get-rest-apis"
            description: "Check API Gateway request validation"
            pass_criteria: "API Gateway validates requests"
      azure:
        commands:
          - cmd: "az network application-gateway waf-policy list"
            description: "Check WAF policies"
            pass_criteria: "WAF validates inputs"
      gcp:
        commands:
          - cmd: "gcloud compute security-policies list"
            description: "Check Cloud Armor policies"
            pass_criteria: "Cloud Armor validates inputs"

  SI-11:
    title: Error Handling
    description: |
      Generate error messages that provide information necessary for corrective actions
      without revealing information that could be exploited.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws apigateway get-gateway-responses --rest-api-id API_ID"
            description: "Check API Gateway responses"
            pass_criteria: "Custom error responses configured"
          - cmd: "aws cloudfront get-distribution --id DIST_ID --query 'Distribution.DistributionConfig.CustomErrorResponses'"
            description: "Check CloudFront error responses"
            pass_criteria: "Custom error pages configured"
      azure:
        commands:
          - cmd: "az webapp config show --resource-group RG --name APP --query 'detailedErrorLoggingEnabled'"
            description: "Check error logging"
            pass_criteria: "Detailed errors not exposed to users"
      gcp:
        commands:
          - cmd: "gcloud app describe --format='value(defaultHostname)'"
            description: "Check App Engine configuration"
            pass_criteria: "Custom error handling configured"

  SI-12:
    title: Information Management and Retention
    description: |
      Manage and retain information within the system and information output from the system
      in accordance with applicable laws, executive orders, directives, regulations, policies, standards, guidelines and operational requirements.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws logs describe-log-groups --query 'logGroups[*].{Name:logGroupName,RetentionDays:retentionInDays}'"
            description: "Check log retention settings"
            pass_criteria: "Retention meets requirements"
          - cmd: "aws s3api get-bucket-lifecycle-configuration --bucket BUCKET"
            description: "Check S3 lifecycle rules"
            pass_criteria: "Lifecycle rules meet retention requirements"
        evidence_script: |
          #!/bin/bash
          echo "=== SI-12 Information Retention ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== CloudWatch Log Retention ==="
          aws logs describe-log-groups --query 'logGroups[*].{Name:logGroupName,RetentionDays:retentionInDays}' --output table
          echo ""
          echo "=== S3 Bucket Lifecycle Policies ==="
          for bucket in $(aws s3api list-buckets --query 'Buckets[*].Name' --output text); do
            echo "Bucket: $bucket"
            aws s3api get-bucket-lifecycle-configuration --bucket "$bucket" 2>/dev/null || echo "No lifecycle policy"
            echo "---"
          done
      azure:
        commands:
          - cmd: "az monitor log-analytics workspace show --resource-group RG --workspace-name WS --query 'retentionInDays'"
            description: "Check Log Analytics retention"
            pass_criteria: "Retention meets requirements"
      gcp:
        commands:
          - cmd: "gcloud logging buckets describe _Default --location=global --format='value(retentionDays)'"
            description: "Check log bucket retention"
            pass_criteria: "Retention meets requirements"

  SI-16:
    title: Memory Protection
    description: |
      Implement security controls to protect the system memory from unauthorized code execution.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-instances --query 'Reservations[*].Instances[*].{Id:InstanceId,Nitro:HypervisorType}'"
            description: "Check for Nitro instances (memory isolation)"
            pass_criteria: "Nitro instances provide memory protection"
          - cmd: "aws lambda get-function-configuration --function-name FUNCTION --query 'Architectures'"
            description: "Check Lambda architecture"
            pass_criteria: "Lambda provides memory isolation"
      azure:
        commands:
          - cmd: "az vm show --resource-group RG --name VM --query 'securityProfile'"
            description: "Check VM security profile"
            pass_criteria: "Confidential VMs protect memory"
      gcp:
        commands:
          - cmd: "gcloud compute instances describe INSTANCE --format='value(confidentialInstanceConfig)'"
            description: "Check Confidential VM config"
            pass_criteria: "Confidential VMs protect memory"

name: NIST 800-53 AT - Awareness and Training
family: AT
description: Controls for security awareness training and role-based training
version: Rev 5

controls:
  AT-1:
    title: Policy and Procedures
    description: |
      Develop, document, and disseminate awareness and training policy and procedures.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-users"
            description: "List users requiring training"
            pass_criteria: "User list supports training tracking"
      azure:
        commands:
          - cmd: "az ad user list"
            description: "List users requiring training"
            pass_criteria: "User list supports training tracking"

  AT-2:
    title: Literacy Training and Awareness
    description: |
      Provide security and privacy literacy training to system users.
      Update literacy training and awareness content periodically.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-users --query 'Users[*].{UserName:UserName,CreateDate:CreateDate}'"
            description: "List users for training verification"
            pass_criteria: "All users have completed training (verify via LMS)"
          - cmd: "aws iam list-user-tags --user-name USERNAME"
            description: "Check user training tags"
            pass_criteria: "Training completion is tagged"
        evidence_script: |
          #!/bin/bash
          echo "=== AT-2 Security Awareness Training ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Users Requiring Training ==="
          aws iam list-users --query 'Users[*].{UserName:UserName,CreateDate:CreateDate}' --output table
          echo ""
          echo "NOTE: Verify training completion via your Learning Management System (LMS)"
          echo "Training records should be maintained externally and include:"
          echo "- Initial security awareness training"
          echo "- Annual refresher training"
          echo "- Role-based training"
      azure:
        commands:
          - cmd: "az ad user list --query '[].{Name:displayName,Created:createdDateTime}'"
            description: "List users for training"
            pass_criteria: "Training completion verified externally"
      gcp:
        commands:
          - cmd: "gcloud identity groups memberships list --group-email=all-users@domain.com"
            description: "List users for training"
            pass_criteria: "Training completion verified externally"

  AT-2(1):
    title: Practical Exercises
    description: |
      Include practical exercises in literacy training that simulate events and incidents.
    baseline: [moderate, high]
    parent: AT-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ses list-configuration-sets"
            description: "Check SES for phishing simulations"
            pass_criteria: "Phishing simulations configured"
      azure:
        commands:
          - cmd: "az security atp show"
            description: "Check ATP for simulations"
            pass_criteria: "Attack simulations available"

  AT-2(2):
    title: Insider Threat
    description: |
      Include awareness training on recognizing and reporting potential indicators of insider threat.
    baseline: [moderate, high]
    parent: AT-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws guardduty list-findings --detector-id DETECTOR --finding-criteria '{\"Criterion\":{\"type\":{\"Eq\":[\"UnauthorizedAccess:IAMUser/InstanceCredentialExfiltration\"]}}}'"
            description: "Check for insider threat indicators"
            pass_criteria: "Insider threat detection is active"
      azure:
        commands:
          - cmd: "az security alert list --query '[?contains(alertType,`insider`)]'"
            description: "Check for insider threat alerts"
            pass_criteria: "Insider threat monitoring active"

  AT-2(3):
    title: Social Engineering and Mining
    description: |
      Include awareness training on recognizing and reporting potential indicators of social engineering
      and social mining.
    baseline: [moderate, high]
    parent: AT-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ses describe-receipt-rule --rule-set-name default --rule-name phishing"
            description: "Check email filtering rules"
            pass_criteria: "Phishing protection configured"
      azure:
        commands:
          - cmd: "az security atp show"
            description: "Check ATP for social engineering detection"
            pass_criteria: "Social engineering detection active"

  AT-2(5):
    title: Advanced Persistent Threat
    description: |
      Include awareness training on advanced persistent threats.
    baseline: [high]
    parent: AT-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws guardduty get-detector --detector-id DETECTOR --query 'DataSources'"
            description: "Check GuardDuty data sources for APT detection"
            pass_criteria: "APT detection capabilities active"
          - cmd: "aws detective list-graphs"
            description: "Check Detective for APT investigation"
            pass_criteria: "Detective available for APT analysis"
      azure:
        commands:
          - cmd: "az security atp show"
            description: "Check ATP for APT detection"
            pass_criteria: "APT detection available"
      gcp:
        commands:
          - cmd: "gcloud scc settings describe --organization=ORG_ID"
            description: "Check SCC for threat detection"
            pass_criteria: "Threat detection active"

  AT-3:
    title: Role-Based Training
    description: |
      Provide role-based security and privacy training to personnel with assigned security roles.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-groups"
            description: "List IAM groups (roles)"
            pass_criteria: "Groups define training requirements"
          - cmd: "aws iam get-group --group-name Administrators"
            description: "Check admin group members"
            pass_criteria: "Admins have role-based training"
        evidence_script: |
          #!/bin/bash
          echo "=== AT-3 Role-Based Training ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== IAM Groups (Training Roles) ==="
          aws iam list-groups --query 'Groups[*].GroupName' --output table
          echo ""
          echo "=== Users by Group ==="
          for group in $(aws iam list-groups --query 'Groups[*].GroupName' --output text); do
            echo "Group: $group"
            aws iam get-group --group-name "$group" --query 'Users[*].UserName' --output text
            echo "---"
          done
          echo ""
          echo "NOTE: Role-based training should include:"
          echo "- System administrators: Security configuration, monitoring"
          echo "- Developers: Secure coding, SDLC"
          echo "- Security team: Incident response, threat hunting"
      azure:
        commands:
          - cmd: "az ad group list --query '[].displayName'"
            description: "List AD groups"
            pass_criteria: "Groups define training requirements"
          - cmd: "az role assignment list --role 'Owner'"
            description: "List owners for admin training"
            pass_criteria: "Owners have admin training"
      gcp:
        commands:
          - cmd: "gcloud iam roles list --project=PROJECT_ID"
            description: "List custom roles"
            pass_criteria: "Roles define training requirements"
      kubernetes:
        commands:
          - cmd: "kubectl get clusterrolebindings -o json | jq '.items[].subjects[]?.name' | sort -u"
            description: "List users/groups with cluster access"
            pass_criteria: "Users have role-based training"

  AT-3(1):
    title: Environmental Controls
    description: |
      Provide training on the employment and operation of environmental controls.
    baseline: [high]
    parent: AT-3
    cloud_tests:
      aws:
        commands:
          - cmd: "aws outposts list-outposts"
            description: "Check for Outposts (physical controls)"
            pass_criteria: "Outposts operators have environmental training"
      azure:
        commands:
          - cmd: "az stack-hci cluster list"
            description: "Check for Azure Stack HCI"
            pass_criteria: "Azure Stack operators have training"

  AT-3(2):
    title: Physical Security Controls
    description: |
      Provide training on the employment and operation of physical security controls.
    baseline: [high]
    parent: AT-3
    cloud_tests:
      aws:
        commands:
          - cmd: "aws outposts list-outposts"
            description: "Check for physical AWS infrastructure"
            pass_criteria: "Physical security training for on-prem"
      azure:
        commands:
          - cmd: "az stack-hci cluster list"
            description: "Check for on-premises infrastructure"
            pass_criteria: "Physical security training completed"

  AT-4:
    title: Training Records
    description: |
      Document and monitor individual information security and privacy training activities.
      Retain training records in accordance with policy.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws s3 ls s3://training-records-bucket/"
            description: "Check for training records storage"
            pass_criteria: "Training records are stored"
          - cmd: "aws dynamodb scan --table-name TrainingRecords --max-items 5"
            description: "Check training records database"
            pass_criteria: "Training records are maintained"
        evidence_script: |
          #!/bin/bash
          echo "=== AT-4 Training Records ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "NOTE: Training records should be maintained and include:"
          echo "- Employee name and ID"
          echo "- Training course completed"
          echo "- Date of completion"
          echo "- Expiration/renewal date"
          echo "- Certification if applicable"
          echo ""
          echo "Training records are typically maintained in:"
          echo "- Learning Management System (LMS)"
          echo "- HR Information System (HRIS)"
          echo "- Dedicated training database"
      azure:
        commands:
          - cmd: "az storage blob list --account-name ACCOUNT --container-name training-records"
            description: "Check training records storage"
            pass_criteria: "Training records are stored"
      gcp:
        commands:
          - cmd: "gsutil ls gs://training-records-bucket/"
            description: "Check training records storage"
            pass_criteria: "Training records are stored"

  AT-6:
    title: Training Feedback
    description: |
      Provide feedback on organizational training results.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws cloudwatch get-metric-statistics --namespace Training --metric-name CompletionRate"
            description: "Check training metrics"
            pass_criteria: "Training metrics are tracked"
      azure:
        commands:
          - cmd: "az monitor metrics list"
            description: "Check metrics capability"
            pass_criteria: "Training metrics can be tracked"

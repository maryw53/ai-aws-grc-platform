name: NIST 800-53 IR - Incident Response
family: IR
description: Controls for incident response preparation, detection, analysis, containment, recovery, and reporting
version: Rev 5

controls:
  IR-1:
    title: Policy and Procedures
    description: |
      Develop, document, and disseminate incident response policy and procedures.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ssm-incidents list-response-plans"
            description: "List Incident Manager response plans"
            pass_criteria: "Response plans are documented"
      azure:
        commands:
          - cmd: "az security automation list"
            description: "List security automation rules"
            pass_criteria: "Incident response automation exists"
      gcp:
        commands:
          - cmd: "gcloud scc notification-configs list --organization=ORG_ID"
            description: "List SCC notification configs"
            pass_criteria: "Incident notifications configured"

  IR-2:
    title: Incident Response Training
    description: |
      Provide incident response training to personnel consistent with assigned roles and responsibilities.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-users --query 'Users[*].UserName'"
            description: "List users for training verification"
            pass_criteria: "Users have completed IR training (verify externally)"
      azure:
        commands:
          - cmd: "az ad user list --query '[].displayName'"
            description: "List users for training verification"
            pass_criteria: "Users have completed IR training (verify externally)"

  IR-3:
    title: Incident Response Testing
    description: |
      Test the effectiveness of the incident response capability.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws fis list-experiments"
            description: "List Fault Injection Simulator experiments"
            pass_criteria: "IR testing via chaos engineering"
          - cmd: "aws ssm-incidents list-incident-records"
            description: "List incident records"
            pass_criteria: "Incident records show testing"
      azure:
        commands:
          - cmd: "az chaos target list"
            description: "List Chaos Studio targets"
            pass_criteria: "Chaos testing configured"
      gcp:
        commands:
          - cmd: "gcloud scc findings list ORG_ID --source=SOURCES"
            description: "List security findings"
            pass_criteria: "Findings show IR testing"

  IR-4:
    title: Incident Handling
    description: |
      Implement an incident handling capability that includes preparation, detection and analysis,
      containment, eradication, and recovery.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ssm-incidents list-response-plans --query 'responsePlanSummaries[*].{Name:name,Arn:arn}'"
            description: "List response plans"
            pass_criteria: "Response plans cover incident lifecycle"
          - cmd: "aws detective list-graphs"
            description: "Check Detective for investigation"
            pass_criteria: "Detective enabled for analysis"
          - cmd: "aws guardduty list-detectors"
            description: "Check GuardDuty for detection"
            pass_criteria: "GuardDuty enabled for detection"
        evidence_script: |
          #!/bin/bash
          echo "=== IR-4 Incident Handling Capability ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Detection: GuardDuty ==="
          DETECTOR=$(aws guardduty list-detectors --query 'DetectorIds[0]' --output text)
          if [ "$DETECTOR" != "None" ]; then
            aws guardduty get-detector --detector-id $DETECTOR --query '{Status:Status,FindingPublishingFrequency:FindingPublishingFrequency}'
          fi
          echo ""
          echo "=== Investigation: Detective ==="
          aws detective list-graphs --query 'GraphList[*].{Arn:Arn,Status:Status}' --output table 2>/dev/null || echo "Detective not enabled"
          echo ""
          echo "=== Response: Incident Manager ==="
          aws ssm-incidents list-response-plans --query 'responsePlanSummaries[*].{Name:name}' --output table 2>/dev/null || echo "Incident Manager not configured"
      azure:
        commands:
          - cmd: "az sentinel incident list --resource-group RG --workspace-name WS"
            description: "List Sentinel incidents"
            pass_criteria: "Incidents are handled in Sentinel"
          - cmd: "az sentinel alert-rule list --resource-group RG --workspace-name WS"
            description: "List Sentinel alert rules"
            pass_criteria: "Alert rules detect incidents"
      gcp:
        commands:
          - cmd: "gcloud scc findings list ORG_ID"
            description: "List SCC findings"
            pass_criteria: "Findings are handled"
          - cmd: "gcloud logging sinks list"
            description: "List log sinks for incident data"
            pass_criteria: "Logs support incident handling"
      kubernetes:
        commands:
          - cmd: "kubectl get events --field-selector type=Warning -A"
            description: "List warning events"
            pass_criteria: "Events are monitored for incidents"

  IR-4(1):
    title: Automated Incident Handling Processes
    description: |
      Employ automated mechanisms to support the incident handling process.
    baseline: [moderate, high]
    parent: IR-4
    cloud_tests:
      aws:
        commands:
          - cmd: "aws events list-rules --query 'Rules[*].{Name:Name,State:State}'"
            description: "List EventBridge rules for automation"
            pass_criteria: "EventBridge automates incident response"
          - cmd: "aws securityhub describe-action-targets"
            description: "Check Security Hub actions"
            pass_criteria: "Automated actions configured"
      azure:
        commands:
          - cmd: "az sentinel automation-rule list --resource-group RG --workspace-name WS"
            description: "List automation rules"
            pass_criteria: "Automation rules handle incidents"
      gcp:
        commands:
          - cmd: "gcloud functions list --filter='eventTrigger'"
            description: "List event-triggered functions"
            pass_criteria: "Functions automate incident response"

  IR-5:
    title: Incident Monitoring
    description: |
      Track and document incidents on an ongoing basis.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ssm-incidents list-incident-records"
            description: "List incident records"
            pass_criteria: "Incidents are tracked"
          - cmd: "aws securityhub get-findings --max-items 10"
            description: "Get recent findings"
            pass_criteria: "Findings are monitored"
        evidence_script: |
          #!/bin/bash
          echo "=== IR-5 Incident Monitoring ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Incident Records ==="
          aws ssm-incidents list-incident-records --query 'incidentRecordSummaries[*].{Title:title,Status:status,Impact:impact}' --output table 2>/dev/null || echo "No incident records"
          echo ""
          echo "=== Security Hub Findings ==="
          aws securityhub get-findings --max-items 10 --query 'Findings[*].{Title:Title,Severity:Severity.Label,Status:Workflow.Status}' --output table
      azure:
        commands:
          - cmd: "az sentinel incident list --resource-group RG --workspace-name WS --query '[].{Title:title,Severity:severity,Status:status}'"
            description: "List tracked incidents"
            pass_criteria: "Incidents are tracked"
      gcp:
        commands:
          - cmd: "gcloud scc findings list ORG_ID --filter='state=ACTIVE'"
            description: "List active findings"
            pass_criteria: "Active findings are monitored"
      kubernetes:
        commands:
          - cmd: "kubectl get events -A --sort-by='.lastTimestamp'"
            description: "List recent events"
            pass_criteria: "Events are monitored"

  IR-6:
    title: Incident Reporting
    description: |
      Require personnel to report suspected incidents to the organizational incident response capability.
      Report incidents to defined authorities.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws sns list-topics --query 'Topics[*].TopicArn'"
            description: "List SNS topics for reporting"
            pass_criteria: "SNS topics exist for incident reporting"
          - cmd: "aws ssm-incidents list-response-plans --query 'responsePlanSummaries[*].{Name:name}'"
            description: "Check response plans with reporting"
            pass_criteria: "Response plans include reporting"
      azure:
        commands:
          - cmd: "az monitor action-group list"
            description: "List action groups for notifications"
            pass_criteria: "Action groups support reporting"
      gcp:
        commands:
          - cmd: "gcloud scc notification-configs list --organization=ORG_ID"
            description: "List notification configs"
            pass_criteria: "Notifications support reporting"

  IR-6(1):
    title: Automated Reporting
    description: |
      Employ automated mechanisms to assist in the reporting of incidents.
    baseline: [moderate, high]
    parent: IR-6
    cloud_tests:
      aws:
        commands:
          - cmd: "aws events list-rules --query 'Rules[?State==`ENABLED`]'"
            description: "List enabled EventBridge rules"
            pass_criteria: "EventBridge automates reporting"
          - cmd: "aws sns list-subscriptions"
            description: "List SNS subscriptions"
            pass_criteria: "SNS automates notifications"
      azure:
        commands:
          - cmd: "az sentinel automation-rule list --resource-group RG --workspace-name WS"
            description: "List automation rules"
            pass_criteria: "Automation rules report incidents"

  IR-7:
    title: Incident Response Assistance
    description: |
      Provide an incident response support resource that offers advice and assistance
      to users for the handling and reporting of incidents.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws support describe-services"
            description: "Check AWS Support access"
            pass_criteria: "AWS Support available for assistance"
      azure:
        commands:
          - cmd: "az support services list"
            description: "Check Azure Support access"
            pass_criteria: "Azure Support available for assistance"
      gcp:
        commands:
          - cmd: "gcloud iam roles describe roles/supportaccount.admin"
            description: "Check Support role"
            pass_criteria: "Support access is configured"

  IR-8:
    title: Incident Response Plan
    description: |
      Develop an incident response plan that provides the organization with a roadmap
      for implementing its incident response capability.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ssm-incidents list-response-plans"
            description: "List response plans"
            pass_criteria: "Response plans document IR process"
          - cmd: "aws ssm list-documents --document-filter-list 'key=DocumentType,value=Automation'"
            description: "List runbooks"
            pass_criteria: "Runbooks support IR plan"
        evidence_script: |
          #!/bin/bash
          echo "=== IR-8 Incident Response Plan ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Response Plans ==="
          aws ssm-incidents list-response-plans --output table 2>/dev/null || echo "No response plans"
          echo ""
          echo "=== SSM Runbooks ==="
          aws ssm list-documents --document-filter-list 'key=DocumentType,value=Automation' --query 'DocumentIdentifiers[*].{Name:Name,Owner:Owner}' --output table
      azure:
        commands:
          - cmd: "az sentinel metadata list --resource-group RG --workspace-name WS"
            description: "List Sentinel content"
            pass_criteria: "Sentinel content documents IR"
      gcp:
        commands:
          - cmd: "gcloud scc settings describe --organization=ORG_ID"
            description: "Check SCC settings"
            pass_criteria: "SCC supports IR plan"

  IR-9:
    title: Information Spillage Response
    description: |
      Respond to information spills by identifying the specific information involved
      and alerting appropriate personnel.
    baseline: [high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws macie2 list-findings --finding-criteria '{\"criterion\":{\"classificationDetails.result.sensitiveData.category\":{\"eq\":[\"PII\"]}}}'"
            description: "Check Macie for data spillage"
            pass_criteria: "Macie detects data spillage"
          - cmd: "aws guardduty list-findings --detector-id DETECTOR --finding-criteria '{\"Criterion\":{\"type\":{\"Eq\":[\"UnauthorizedAccess:S3/MaliciousIPCaller\"]}}}'"
            description: "Check for data exfiltration"
            pass_criteria: "Exfiltration is detected"
      azure:
        commands:
          - cmd: "az security alert list --query '[?alertType contains `DataExfiltration`]'"
            description: "Check for data exfiltration alerts"
            pass_criteria: "Data exfiltration is detected"
      gcp:
        commands:
          - cmd: "gcloud dlp jobs list"
            description: "List DLP jobs"
            pass_criteria: "DLP monitors for spillage"

  IR-10:
    title: Integrated Information Security Analysis Team
    description: |
      Establish an integrated team of forensic/malware analysts, tool developers,
      and real-time operations personnel.
    baseline: [high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-groups --query 'Groups[?contains(GroupName,`Security`) || contains(GroupName,`Incident`)]'"
            description: "List security/incident groups"
            pass_criteria: "Security team groups exist"
          - cmd: "aws detective list-members"
            description: "List Detective members"
            pass_criteria: "Investigation team has access"
      azure:
        commands:
          - cmd: "az ad group list --query '[?contains(displayName,`Security`)]'"
            description: "List security groups"
            pass_criteria: "Security team groups exist"
      gcp:
        commands:
          - cmd: "gcloud iam roles describe roles/securitycenter.admin"
            description: "Check security admin role"
            pass_criteria: "Security team roles defined"

name: NIST 800-53 - Access Control (AC)
family: AC
version: Rev 5
description: Access Control family controls for managing system access

controls:
  AC-1:
    title: Policy and Procedures
    description: Develop, document, and disseminate access control policy and procedures
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws organizations describe-organization"
            description: "Verify organization structure exists for policy enforcement"
            context: "Organizations enable centralized policy management"
          - cmd: "aws iam list-policies --scope Local --query 'Policies[].PolicyName'"
            description: "List custom IAM policies (should reflect documented access control policy)"
      azure:
        commands:
          - cmd: "az policy definition list --query '[].displayName'"
            description: "List Azure Policy definitions"
          - cmd: "az role definition list --custom-role-only true"
            description: "List custom role definitions"
      gcp:
        commands:
          - cmd: "gcloud resource-manager org-policies list --organization=ORG_ID"
            description: "List organization policies"
      kubernetes:
        commands:
          - cmd: "kubectl get clusterroles -o name | wc -l"
            description: "Count cluster roles (compare to documented policy)"

  AC-2:
    title: Account Management
    description: Manage system accounts including establishing, activating, modifying, disabling, and removing accounts
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-users --query 'Users[].{UserName:UserName,CreateDate:CreateDate,PasswordLastUsed:PasswordLastUsed}'"
            description: "List all IAM users with creation and last login dates"
            pass_criteria: "All users should have recent activity or be documented exceptions"
          - cmd: "aws iam get-credential-report"
            description: "Generate comprehensive credential report"
            context: "Decode with: base64 -d"
          - cmd: "aws iam list-users --query 'Users[?PasswordLastUsed==null].UserName'"
            description: "Find users who have never logged in (potential orphaned accounts)"
            pass_criteria: "Empty list or documented service accounts"
          - cmd: "aws iam list-access-keys --user-name USERNAME --query 'AccessKeyMetadata[?Status==`Active`]'"
            description: "Check for active access keys per user"
        evidence_script: |
          #!/bin/bash
          echo "=== AC-2 Account Management Evidence ==="
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "--- All IAM Users ---"
          aws iam list-users --output table
          echo ""
          echo "--- Credential Report ---"
          aws iam generate-credential-report
          sleep 5
          aws iam get-credential-report --query 'Content' --output text | base64 -d
          echo ""
          echo "--- Users Without Console Login ---"
          aws iam list-users --query 'Users[?PasswordLastUsed==null].UserName' --output table
      azure:
        commands:
          - cmd: "az ad user list --query '[].{UPN:userPrincipalName,Enabled:accountEnabled,Created:createdDateTime}'"
            description: "List all Azure AD users with status"
          - cmd: "az ad user list --query '[?accountEnabled==false]'"
            description: "Find disabled user accounts"
          - cmd: "az ad user list --filter \"signInActivity/lastSignInDateTime le 2024-01-01\""
            description: "Find users with no recent sign-in (adjust date)"
        evidence_script: |
          #!/bin/bash
          echo "=== AC-2 Azure Account Management Evidence ==="
          az ad user list --output table
          echo ""
          echo "--- Disabled Accounts ---"
          az ad user list --query '[?accountEnabled==false].userPrincipalName'
      gcp:
        commands:
          - cmd: "gcloud iam service-accounts list --format='table(email,displayName,disabled)'"
            description: "List all service accounts with status"
          - cmd: "gcloud projects get-iam-policy PROJECT_ID --format=json"
            description: "Get IAM policy showing all member bindings"
          - cmd: "gcloud asset search-all-iam-policies --scope=projects/PROJECT_ID"
            description: "Search all IAM policies in project"
      kubernetes:
        commands:
          - cmd: "kubectl get serviceaccounts -A -o custom-columns='NAMESPACE:.metadata.namespace,NAME:.metadata.name,SECRETS:.secrets[*].name'"
            description: "List all service accounts across namespaces"
          - cmd: "kubectl auth can-i --list --as=system:serviceaccount:default:default"
            description: "Check permissions for default service account"

  AC-3:
    title: Access Enforcement
    description: Enforce approved authorizations for logical access to information and system resources
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam get-account-authorization-details --filter User"
            description: "Get detailed authorization for all users"
          - cmd: "aws iam simulate-principal-policy --policy-source-arn ARN --action-names ACTION"
            description: "Simulate policy to verify access enforcement"
          - cmd: "aws iam list-attached-user-policies --user-name USERNAME"
            description: "List policies attached to specific user"
          - cmd: "aws s3api get-bucket-policy --bucket BUCKET_NAME"
            description: "Check S3 bucket access policy"
      azure:
        commands:
          - cmd: "az role assignment list --all --query '[].{Principal:principalName,Role:roleDefinitionName,Scope:scope}'"
            description: "List all role assignments"
          - cmd: "az ad app permission list --id APP_ID"
            description: "List app permissions"
      gcp:
        commands:
          - cmd: "gcloud projects get-iam-policy PROJECT_ID"
            description: "Get IAM policy for access enforcement verification"
          - cmd: "gcloud iam roles describe ROLE_NAME"
            description: "Describe role permissions"
      kubernetes:
        commands:
          - cmd: "kubectl auth can-i --list"
            description: "List current user's permissions"
          - cmd: "kubectl get clusterrolebindings -o json | jq '.items[] | {name: .metadata.name, role: .roleRef.name, subjects: .subjects}'"
            description: "Get cluster role bindings with subjects"

  AC-4:
    title: Information Flow Enforcement
    description: Enforce approved authorizations for controlling the flow of information within the system and between systems
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-security-groups --query 'SecurityGroups[].{GroupId:GroupId,GroupName:GroupName,VpcId:VpcId}'"
            description: "List all security groups"
          - cmd: "aws ec2 describe-network-acls"
            description: "List network ACLs"
          - cmd: "aws ec2 describe-vpc-endpoints"
            description: "List VPC endpoints for private connectivity"
          - cmd: "aws ec2 describe-flow-logs"
            description: "Check VPC flow logs configuration"
      azure:
        commands:
          - cmd: "az network nsg list --query '[].{Name:name,ResourceGroup:resourceGroup}'"
            description: "List all Network Security Groups"
          - cmd: "az network nsg rule list --nsg-name NSG_NAME --resource-group RG_NAME"
            description: "List NSG rules"
          - cmd: "az network private-endpoint list"
            description: "List private endpoints"
      gcp:
        commands:
          - cmd: "gcloud compute firewall-rules list --format='table(name,network,direction,priority,allowed[].map().firewall_rule().join(\",\"))'"
            description: "List firewall rules"
          - cmd: "gcloud compute networks subnets list"
            description: "List VPC subnets"
      kubernetes:
        commands:
          - cmd: "kubectl get networkpolicies -A"
            description: "List all network policies"
          - cmd: "kubectl get networkpolicies -A -o yaml"
            description: "Get detailed network policy rules"

  AC-5:
    title: Separation of Duties
    description: Separate duties of individuals to prevent malicious activity
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-users --query 'Users[].UserName' | xargs -I {} aws iam list-attached-user-policies --user-name {}"
            description: "Check policies per user for separation verification"
          - cmd: "aws organizations list-policies --filter SERVICE_CONTROL_POLICY"
            description: "List SCPs that may enforce separation"
      azure:
        commands:
          - cmd: "az role assignment list --query '[].{Principal:principalName,Role:roleDefinitionName}' | sort"
            description: "List role assignments to verify separation"
      gcp:
        commands:
          - cmd: "gcloud projects get-iam-policy PROJECT_ID --format=json | jq '.bindings[] | {role: .role, members: .members}'"
            description: "Analyze IAM bindings for role separation"
      kubernetes:
        commands:
          - cmd: "kubectl get rolebindings,clusterrolebindings -A -o json | jq '.items[] | {name: .metadata.name, subjects: .subjects, role: .roleRef}'"
            description: "Analyze role bindings for separation"

  AC-6:
    title: Least Privilege
    description: Employ the principle of least privilege, allowing only authorized accesses necessary to accomplish assigned tasks
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-policies --scope Local --only-attached --query 'Policies[].Arn'"
            description: "List attached custom policies"
          - cmd: "aws iam get-policy-version --policy-arn ARN --version-id VERSION"
            description: "Get policy document to review permissions"
          - cmd: "aws iam list-entities-for-policy --policy-arn arn:aws:iam::aws:policy/AdministratorAccess"
            description: "Find entities with AdministratorAccess (should be minimal)"
            pass_criteria: "Minimal or no entities with full admin access"
          - cmd: "aws accessanalyzer list-findings --analyzer-arn ANALYZER_ARN"
            description: "Check Access Analyzer findings for over-permissive access"
      azure:
        commands:
          - cmd: "az role assignment list --role 'Owner' --all"
            description: "List all Owner role assignments (should be minimal)"
          - cmd: "az role assignment list --role 'Contributor' --all"
            description: "List Contributor assignments"
      gcp:
        commands:
          - cmd: "gcloud projects get-iam-policy PROJECT_ID --format=json | jq '.bindings[] | select(.role==\"roles/owner\")'"
            description: "Find Owner role bindings (should be minimal)"
          - cmd: "gcloud iam roles list --project=PROJECT_ID --format='table(name,title)'"
            description: "List custom roles for least privilege implementation"
      kubernetes:
        commands:
          - cmd: "kubectl get clusterrolebindings -o json | jq '.items[] | select(.roleRef.name==\"cluster-admin\") | .subjects'"
            description: "Find cluster-admin bindings (should be minimal)"
          - cmd: "kubectl auth can-i --list --as=system:serviceaccount:NAMESPACE:SA_NAME"
            description: "Verify service account has minimal permissions"

  AC-7:
    title: Unsuccessful Logon Attempts
    description: Enforce a limit of consecutive invalid logon attempts and take action when limit is exceeded
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam get-account-password-policy"
            description: "Check password policy for lockout settings"
            pass_criteria: "MaxPasswordAge and other limits should be set"
          - cmd: "aws cognito-idp describe-user-pool --user-pool-id POOL_ID"
            description: "Check Cognito user pool lockout policy"
      azure:
        commands:
          - cmd: "az ad conditional-access policy list"
            description: "List conditional access policies"
          - cmd: "az rest --method GET --uri 'https://graph.microsoft.com/v1.0/policies/authenticationMethodsPolicy'"
            description: "Get authentication methods policy"
      gcp:
        commands:
          - cmd: "gcloud identity groups list"
            description: "List identity groups (Cloud Identity has lockout settings)"
      kubernetes:
        commands:
          - cmd: "kubectl get configmap -n kube-system | grep audit"
            description: "Check for audit configuration that logs failed attempts"

  AC-8:
    title: System Use Notification
    description: Display system use notification message before granting access
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ssm describe-instance-information"
            description: "Check SSM managed instances (can have login banners)"
          - cmd: "aws ec2 describe-instances --query 'Reservations[].Instances[].{ID:InstanceId,Tags:Tags}'"
            description: "List instances to verify banner configuration"
      azure:
        commands:
          - cmd: "az vm list --query '[].{Name:name,ResourceGroup:resourceGroup}'"
            description: "List VMs to check banner configuration"
      gcp:
        commands:
          - cmd: "gcloud compute instances list --format='table(name,zone,status)'"
            description: "List compute instances for banner verification"
      kubernetes:
        commands:
          - cmd: "kubectl get configmap -n kube-system motd -o yaml 2>/dev/null || echo 'No MOTD configmap'"
            description: "Check for message of the day configuration"

  AC-10:
    title: Concurrent Session Control
    description: Limit the number of concurrent sessions for each account and/or account type
    baseline: [high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam get-account-password-policy"
            description: "Check account-level session settings"
          - cmd: "aws sts get-session-token"
            description: "Test session token generation"
      azure:
        commands:
          - cmd: "az ad conditional-access policy list --query '[?conditions.signInRiskLevels!=null]'"
            description: "Check conditional access for session controls"
      gcp:
        commands:
          - cmd: "gcloud auth list"
            description: "List active authentications"

  AC-11:
    title: Device Lock
    description: Prevent further access to the system by initiating a device lock after a period of inactivity
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws workspaces describe-workspaces-connection-status"
            description: "Check WorkSpaces connection status"
      azure:
        commands:
          - cmd: "az policy definition list --query '[?contains(displayName, \"screen lock\")]'"
            description: "Check for screen lock policies"
      gcp:
        commands:
          - cmd: "gcloud compute instances describe INSTANCE --format='value(metadata.items)'"
            description: "Check instance metadata for session timeout settings"

  AC-12:
    title: Session Termination
    description: Automatically terminate a user session after a defined condition
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam get-role --role-name ROLE_NAME --query 'Role.MaxSessionDuration'"
            description: "Check role max session duration"
          - cmd: "aws sts get-caller-identity"
            description: "Verify current session identity"
      azure:
        commands:
          - cmd: "az ad app show --id APP_ID --query 'tokenLifetimePolicies'"
            description: "Check token lifetime policies"
      gcp:
        commands:
          - cmd: "gcloud auth print-access-token --format='value(expiry)'"
            description: "Check access token expiry"

  AC-14:
    title: Permitted Actions Without Identification or Authentication
    description: Identify user actions that can be performed on the system without identification or authentication
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws s3api get-bucket-policy-status --bucket BUCKET"
            description: "Check if bucket allows public access"
          - cmd: "aws s3api get-public-access-block --bucket BUCKET"
            description: "Check public access block settings"
          - cmd: "aws apigateway get-rest-apis"
            description: "List APIs to check for unauthenticated endpoints"
      azure:
        commands:
          - cmd: "az storage account list --query '[].{Name:name,AllowBlobPublicAccess:allowBlobPublicAccess}'"
            description: "Check storage accounts for public access"
      gcp:
        commands:
          - cmd: "gcloud storage buckets describe gs://BUCKET --format='value(iamConfiguration.publicAccessPrevention)'"
            description: "Check bucket public access prevention"

  AC-17:
    title: Remote Access
    description: Establish and document usage restrictions, configuration requirements, and authorization for remote access
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-security-groups --filters 'Name=ip-permission.from-port,Values=22' 'Name=ip-permission.cidr,Values=0.0.0.0/0'"
            description: "Find security groups allowing SSH from anywhere"
            pass_criteria: "No security groups should allow 0.0.0.0/0 on port 22"
          - cmd: "aws ec2 describe-security-groups --filters 'Name=ip-permission.from-port,Values=3389' 'Name=ip-permission.cidr,Values=0.0.0.0/0'"
            description: "Find security groups allowing RDP from anywhere"
          - cmd: "aws ssm describe-sessions --state Active"
            description: "List active SSM sessions"
      azure:
        commands:
          - cmd: "az network nsg rule list --nsg-name NSG --resource-group RG --query '[?destinationPortRange==`22` || destinationPortRange==`3389`]'"
            description: "Find NSG rules allowing SSH/RDP"
          - cmd: "az network bastion list"
            description: "List Azure Bastion hosts for secure remote access"
      gcp:
        commands:
          - cmd: "gcloud compute firewall-rules list --filter='allowed[].ports:22 AND sourceRanges:0.0.0.0/0'"
            description: "Find firewall rules allowing SSH from anywhere"
          - cmd: "gcloud compute instances list --filter='status=RUNNING' --format='table(name,networkInterfaces[0].accessConfigs[0].natIP)'"
            description: "List instances with public IPs"
      kubernetes:
        commands:
          - cmd: "kubectl get svc -A -o json | jq '.items[] | select(.spec.type==\"LoadBalancer\" or .spec.type==\"NodePort\") | {name: .metadata.name, type: .spec.type, ports: .spec.ports}'"
            description: "Find externally exposed services"

  AC-18:
    title: Wireless Access
    description: Establish usage restrictions and implementation guidance for wireless access
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-client-vpn-endpoints"
            description: "List Client VPN endpoints"
      azure:
        commands:
          - cmd: "az network vnet-gateway list"
            description: "List VPN gateways"
      gcp:
        commands:
          - cmd: "gcloud compute vpn-gateways list"
            description: "List VPN gateways"

  AC-19:
    title: Access Control for Mobile Devices
    description: Establish usage restrictions and implementation guidance for mobile device access
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws workmail list-mobile-device-access-rules --organization-id ORG_ID"
            description: "List WorkMail mobile device access rules"
      azure:
        commands:
          - cmd: "az graph query -q \"resources | where type == 'microsoft.intune/deviceconfigurations'\""
            description: "Query Intune device configurations"
      gcp:
        commands:
          - cmd: "gcloud identity groups search --labels='cloudidentity.googleapis.com/groups.security'"
            description: "Search security groups that may control mobile access"

  AC-20:
    title: Use of External Systems
    description: Establish terms and conditions for authorized use of external systems
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ram list-resources --resource-owner SELF"
            description: "List resources shared via RAM"
          - cmd: "aws organizations list-accounts"
            description: "List organization accounts (external system boundary)"
      azure:
        commands:
          - cmd: "az ad external-identity list"
            description: "List external identity configurations"
      gcp:
        commands:
          - cmd: "gcloud projects get-iam-policy PROJECT_ID --format=json | jq '.bindings[] | select(.members[] | contains(\"user:\") | not)'"
            description: "Find non-user IAM bindings (external services)"

  AC-21:
    title: Information Sharing
    description: Facilitate information sharing by enabling authorized users to determine access and share
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ram list-resource-shares"
            description: "List RAM resource shares"
          - cmd: "aws s3api get-bucket-acl --bucket BUCKET"
            description: "Check bucket ACL for sharing"
      azure:
        commands:
          - cmd: "az role assignment list --include-inherited --include-groups"
            description: "List all role assignments including inherited"
      gcp:
        commands:
          - cmd: "gcloud projects get-iam-policy PROJECT_ID"
            description: "Get IAM policy to review sharing"

  AC-22:
    title: Publicly Accessible Content
    description: Designate individuals authorized to post information and review content for nonpublic information
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws s3api list-buckets --query 'Buckets[].Name' | xargs -I {} aws s3api get-bucket-policy-status --bucket {}"
            description: "Check all buckets for public policy status"
          - cmd: "aws cloudfront list-distributions --query 'DistributionList.Items[].{Id:Id,DomainName:DomainName}'"
            description: "List CloudFront distributions (public content)"
      azure:
        commands:
          - cmd: "az storage blob list --account-name ACCOUNT --container-name CONTAINER --query '[?properties.blobType==`BlockBlob`].name'"
            description: "List blobs in public containers"
      gcp:
        commands:
          - cmd: "gcloud storage buckets list --format='table(name,iamConfiguration.publicAccessPrevention)'"
            description: "List buckets with public access status"

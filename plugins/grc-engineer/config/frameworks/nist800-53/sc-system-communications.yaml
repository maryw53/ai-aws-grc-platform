  SC-28:
    title: Protection of Information at Rest
    description: |
      Protect the confidentiality and integrity of information at rest.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-volumes --query 'Volumes[*].{VolumeId:VolumeId,Encrypted:Encrypted,KmsKeyId:KmsKeyId}'"
            description: "Check EBS volume encryption"
            pass_criteria: "All volumes are encrypted"
          - cmd: "aws s3api get-bucket-encryption --bucket BUCKET"
            description: "Check S3 bucket encryption"
            pass_criteria: "Default encryption enabled"
          - cmd: "aws rds describe-db-instances --query 'DBInstances[*].{Id:DBInstanceIdentifier,StorageEncrypted:StorageEncrypted,KmsKeyId:KmsKeyId}'"
            description: "Check RDS encryption"
            pass_criteria: "All databases are encrypted"
        evidence_script: |
          #!/bin/bash
          echo "=== SC-28 Protection of Information at Rest ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== EBS Volume Encryption ==="
          aws ec2 describe-volumes --query 'Volumes[*].{VolumeId:VolumeId,Encrypted:Encrypted,Size:Size}' --output table
          echo ""
          echo "Unencrypted Volumes:"
          aws ec2 describe-volumes --query 'Volumes[?Encrypted==`false`].VolumeId' --output table
          echo ""
          echo "=== S3 Bucket Encryption ==="
          for bucket in $(aws s3api list-buckets --query 'Buckets[*].Name' --output text); do
            echo -n "Bucket: $bucket - "
            aws s3api get-bucket-encryption --bucket "$bucket" 2>/dev/null && echo "Encrypted" || echo "NOT ENCRYPTED"
          done
          echo ""
          echo "=== RDS Encryption ==="
          aws rds describe-db-instances --query 'DBInstances[*].{Id:DBInstanceIdentifier,StorageEncrypted:StorageEncrypted}' --output table
      azure:
        commands:
          - cmd: "az disk list --query '[].{Name:name,Encrypted:encryptionSettingsCollection.enabled}'"
            description: "Check disk encryption"
            pass_criteria: "All disks are encrypted"
          - cmd: "az storage account list --query '[].{Name:name,Encryption:encryption.services.blob.enabled}'"
            description: "Check storage account encryption"
            pass_criteria: "All storage accounts encrypted"
      gcp:
        commands:
          - cmd: "gcloud compute disks list --format='table(name,diskEncryptionKey)'"
            description: "Check disk encryption"
            pass_criteria: "All disks use CMEK or default encryption"
          - cmd: "gsutil kms encryption gs://BUCKET"
            description: "Check GCS bucket encryption"
            pass_criteria: "Bucket uses KMS encryption"
      kubernetes:
        commands:
          - cmd: "kubectl get secrets -A -o json | jq '.items[] | {name:.metadata.name,type:.type}'"
            description: "Check secrets are using Kubernetes secrets"
            pass_criteria: "Sensitive data stored as secrets"


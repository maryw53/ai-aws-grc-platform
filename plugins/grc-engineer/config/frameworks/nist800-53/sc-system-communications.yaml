name: NIST 800-53 SC - System and Communications Protection
family: SC
description: Controls for protecting system communications, boundaries, and information at rest/transit
version: Rev 5

controls:
  SC-1:
    title: Policy and Procedures
    description: |
      Develop, document, and disseminate system and communications protection policy and procedures.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws organizations describe-organization"
            description: "Verify organizational structure for policy management"
            pass_criteria: "Organization exists"
      azure:
        commands:
          - cmd: "az policy definition list --management-group MG_NAME"
            description: "List policy definitions"
            pass_criteria: "Policies are defined"
      gcp:
        commands:
          - cmd: "gcloud resource-manager org-policies list --organization=ORG_ID"
            description: "List organization policies"
            pass_criteria: "Policies are defined"

  SC-2:
    title: Separation of System and User Functionality
    description: |
      Separate user functionality from system management functionality.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-vpcs --query 'Vpcs[*].{VpcId:VpcId,Tags:Tags}'"
            description: "List VPCs to verify network separation"
            pass_criteria: "Separate VPCs for management and user workloads"
          - cmd: "aws ec2 describe-subnets --query 'Subnets[*].{SubnetId:SubnetId,VpcId:VpcId,Tags:Tags}'"
            description: "List subnets for separation verification"
            pass_criteria: "Separate subnets for different functions"
      azure:
        commands:
          - cmd: "az network vnet list --query '[].{Name:name,AddressSpace:addressSpace.addressPrefixes}'"
            description: "List VNets for separation"
            pass_criteria: "Separate VNets for management and user workloads"
      gcp:
        commands:
          - cmd: "gcloud compute networks list"
            description: "List VPC networks"
            pass_criteria: "Separate networks for different functions"
      kubernetes:
        commands:
          - cmd: "kubectl get namespaces -l type=system"
            description: "List system namespaces"
            pass_criteria: "System and user namespaces are separated"

  SC-3:
    title: Security Function Isolation
    description: |
      Isolate security functions from nonsecurity functions.
    baseline: [high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws organizations list-accounts --query 'Accounts[*].{Id:Id,Name:Name}'"
            description: "List accounts for isolation verification"
            pass_criteria: "Security accounts are isolated (Security Hub, Log Archive)"
          - cmd: "aws ec2 describe-security-groups --filters 'Name=group-name,Values=*security*'"
            description: "List security-related security groups"
            pass_criteria: "Dedicated security groups for security functions"
      azure:
        commands:
          - cmd: "az account list --query '[].{Name:name,State:state}'"
            description: "List subscriptions for isolation"
            pass_criteria: "Security subscription is isolated"
      gcp:
        commands:
          - cmd: "gcloud projects list --filter='name:security'"
            description: "List security projects"
            pass_criteria: "Dedicated security project exists"

  SC-4:
    title: Information in Shared System Resources
    description: |
      Prevent unauthorized and unintended information transfer via shared system resources.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-instances --query 'Reservations[*].Instances[*].{Id:InstanceId,Tenancy:Placement.Tenancy}'"
            description: "Check instance tenancy"
            pass_criteria: "Dedicated tenancy for sensitive workloads"
          - cmd: "aws rds describe-db-instances --query 'DBInstances[*].{Id:DBInstanceIdentifier,MultiAZ:MultiAZ,StorageEncrypted:StorageEncrypted}'"
            description: "Check RDS instance isolation"
            pass_criteria: "Encrypted storage, appropriate isolation"
      azure:
        commands:
          - cmd: "az vm list --query '[].{Name:name,DedicatedHost:host}'"
            description: "Check dedicated host usage"
            pass_criteria: "Dedicated hosts for sensitive workloads"
      gcp:
        commands:
          - cmd: "gcloud compute instances list --format='table(name,scheduling.nodeAffinities)'"
            description: "Check sole-tenant nodes"
            pass_criteria: "Sole-tenant for sensitive workloads"

  SC-5:
    title: Denial-of-Service Protection
    description: |
      Protect against denial-of-service attacks by employing security safeguards.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws shield describe-subscription"
            description: "Check AWS Shield subscription"
            pass_criteria: "Shield Advanced for DDoS protection"
          - cmd: "aws wafv2 list-web-acls --scope REGIONAL"
            description: "List WAF web ACLs"
            pass_criteria: "WAF configured for DDoS protection"
          - cmd: "aws cloudfront list-distributions --query 'DistributionList.Items[*].{Id:Id,WebACLId:WebACLId}'"
            description: "Check CloudFront WAF association"
            pass_criteria: "CloudFront distributions have WAF"
        evidence_script: |
          #!/bin/bash
          echo "=== SC-5 Denial-of-Service Protection ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== AWS Shield Status ==="
          aws shield describe-subscription 2>/dev/null || echo "Shield Advanced not subscribed"
          echo ""
          echo "=== WAF Web ACLs ==="
          aws wafv2 list-web-acls --scope REGIONAL --query 'WebACLs[*].{Name:Name,Id:Id}' --output table
          aws wafv2 list-web-acls --scope CLOUDFRONT --query 'WebACLs[*].{Name:Name,Id:Id}' --output table
          echo ""
          echo "=== CloudFront Distributions ==="
          aws cloudfront list-distributions --query 'DistributionList.Items[*].{Id:Id,DomainName:DomainName,WebACLId:WebACLId}' --output table
      azure:
        commands:
          - cmd: "az network ddos-protection list"
            description: "List DDoS protection plans"
            pass_criteria: "DDoS protection plan exists"
          - cmd: "az network application-gateway waf-policy list"
            description: "List WAF policies"
            pass_criteria: "WAF policies configured"
      gcp:
        commands:
          - cmd: "gcloud compute security-policies list"
            description: "List Cloud Armor security policies"
            pass_criteria: "Cloud Armor policies configured"
          - cmd: "gcloud compute backend-services list --format='table(name,securityPolicy)'"
            description: "Check backend service security policies"
            pass_criteria: "Backend services have security policies"
      kubernetes:
        commands:
          - cmd: "kubectl get limitranges -A"
            description: "Check resource limit ranges"
            pass_criteria: "Limit ranges prevent resource exhaustion"
          - cmd: "kubectl get resourcequotas -A"
            description: "Check resource quotas"
            pass_criteria: "Resource quotas limit resource consumption"

  SC-7:
    title: Boundary Protection
    description: |
      Monitor and control communications at external system boundary and key internal boundaries.
      Implement subnetworks for publicly accessible system components.
      Connect to external networks through managed interfaces.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-internet-gateways"
            description: "List Internet Gateways"
            pass_criteria: "IGWs attached only to appropriate VPCs"
          - cmd: "aws ec2 describe-nat-gateways"
            description: "List NAT Gateways"
            pass_criteria: "NAT Gateways for private subnet egress"
          - cmd: "aws ec2 describe-network-acls --query 'NetworkAcls[*].{Id:NetworkAclId,VpcId:VpcId,Entries:Entries}'"
            description: "List Network ACLs"
            pass_criteria: "NACLs restrict traffic appropriately"
          - cmd: "aws ec2 describe-security-groups --query 'SecurityGroups[?IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]]]'"
            description: "Find security groups with open access"
            pass_criteria: "No unnecessary 0.0.0.0/0 rules"
        evidence_script: |
          #!/bin/bash
          echo "=== SC-7 Boundary Protection ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== VPCs ==="
          aws ec2 describe-vpcs --query 'Vpcs[*].{VpcId:VpcId,CidrBlock:CidrBlock,IsDefault:IsDefault}' --output table
          echo ""
          echo "=== Internet Gateways ==="
          aws ec2 describe-internet-gateways --query 'InternetGateways[*].{Id:InternetGatewayId,Attachments:Attachments}' --output table
          echo ""
          echo "=== Security Groups with 0.0.0.0/0 ==="
          aws ec2 describe-security-groups --query 'SecurityGroups[?IpPermissions[?IpRanges[?CidrIp==`0.0.0.0/0`]]].{GroupId:GroupId,GroupName:GroupName}' --output table
          echo ""
          echo "=== Network ACLs ==="
          aws ec2 describe-network-acls --query 'NetworkAcls[*].{Id:NetworkAclId,VpcId:VpcId}' --output table
      azure:
        commands:
          - cmd: "az network nsg list --query '[].{Name:name,Rules:securityRules[?access==`Allow` && direction==`Inbound` && sourceAddressPrefix==`*`]}'"
            description: "Find NSGs with open inbound rules"
            pass_criteria: "No unnecessary open rules"
          - cmd: "az network public-ip list"
            description: "List public IPs"
            pass_criteria: "Public IPs are justified and protected"
          - cmd: "az network firewall list"
            description: "List Azure Firewalls"
            pass_criteria: "Firewall protects boundaries"
      gcp:
        commands:
          - cmd: "gcloud compute firewall-rules list --filter='sourceRanges:0.0.0.0/0'"
            description: "Find firewall rules with open access"
            pass_criteria: "No unnecessary 0.0.0.0/0 rules"
          - cmd: "gcloud compute addresses list --filter='addressType:EXTERNAL'"
            description: "List external IP addresses"
            pass_criteria: "External IPs are justified"
      kubernetes:
        commands:
          - cmd: "kubectl get networkpolicies -A"
            description: "List network policies"
            pass_criteria: "Network policies restrict traffic"
          - cmd: "kubectl get ingress -A"
            description: "List ingress resources"
            pass_criteria: "Ingress is properly configured"

  SC-7(3):
    title: Access Points
    description: |
      Limit the number of external network connections to the system.
    baseline: [moderate, high]
    parent: SC-7
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-internet-gateways"
            description: "Count Internet Gateways"
            pass_criteria: "Minimal IGWs, justified for each"
          - cmd: "aws directconnect describe-connections"
            description: "List Direct Connect connections"
            pass_criteria: "Direct Connect connections are documented"
          - cmd: "aws ec2 describe-vpn-gateways"
            description: "List VPN Gateways"
            pass_criteria: "VPN gateways are documented"
      azure:
        commands:
          - cmd: "az network vnet-gateway list"
            description: "List VNet Gateways"
            pass_criteria: "Gateways are limited and documented"
          - cmd: "az network express-route list"
            description: "List ExpressRoute circuits"
            pass_criteria: "ExpressRoute is documented"
      gcp:
        commands:
          - cmd: "gcloud compute interconnects list"
            description: "List Cloud Interconnects"
            pass_criteria: "Interconnects are documented"
          - cmd: "gcloud compute vpn-tunnels list"
            description: "List VPN tunnels"
            pass_criteria: "VPN tunnels are documented"

  SC-7(4):
    title: External Telecommunications Services
    description: |
      Implement a managed interface for each external telecommunication service.
      Establish a traffic flow policy for each managed interface.
    baseline: [moderate, high]
    parent: SC-7
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-transit-gateway-attachments"
            description: "List Transit Gateway attachments"
            pass_criteria: "Transit Gateway manages external connections"
          - cmd: "aws networkfirewall list-firewalls"
            description: "List Network Firewalls"
            pass_criteria: "Network Firewall at managed interfaces"
      azure:
        commands:
          - cmd: "az network firewall list"
            description: "List Azure Firewalls"
            pass_criteria: "Firewall at managed interfaces"
      gcp:
        commands:
          - cmd: "gcloud compute routers list"
            description: "List Cloud Routers"
            pass_criteria: "Cloud Routers manage traffic"

  SC-7(5):
    title: Deny by Default / Allow by Exception
    description: |
      Deny network communications traffic by default and allow by exception.
    baseline: [moderate, high]
    parent: SC-7
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-security-groups --query 'SecurityGroups[*].{GroupId:GroupId,GroupName:GroupName,IngressRules:IpPermissions}'"
            description: "Review security group rules"
            pass_criteria: "Security groups deny by default, explicit allows only"
          - cmd: "aws ec2 describe-network-acls --query 'NetworkAcls[*].{Id:NetworkAclId,Entries:Entries}'"
            description: "Review NACL rules"
            pass_criteria: "NACLs deny by default"
      azure:
        commands:
          - cmd: "az network nsg list --query '[].{Name:name,DefaultRules:defaultSecurityRules}'"
            description: "Check NSG default rules"
            pass_criteria: "Default deny rules exist"
      gcp:
        commands:
          - cmd: "gcloud compute firewall-rules list --filter='priority:65534 OR priority:65535'"
            description: "Check implied deny rules"
            pass_criteria: "Implied deny rules are in effect"
      kubernetes:
        commands:
          - cmd: "kubectl get networkpolicies -A -o json | jq '.items[] | select(.spec.policyTypes | contains([\"Ingress\",\"Egress\"]))'"
            description: "Check default deny network policies"
            pass_criteria: "Default deny policies exist"

  SC-8:
    title: Transmission Confidentiality and Integrity
    description: |
      Protect the confidentiality and integrity of transmitted information.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws elbv2 describe-listeners --query 'Listeners[*].{Arn:ListenerArn,Protocol:Protocol,SslPolicy:SslPolicy}'"
            description: "Check ELB listener protocols"
            pass_criteria: "HTTPS/TLS protocols only, strong SSL policy"
          - cmd: "aws apigateway get-rest-apis"
            description: "List API Gateway APIs"
            pass_criteria: "APIs use HTTPS"
          - cmd: "aws rds describe-db-instances --query 'DBInstances[*].{Id:DBInstanceIdentifier,PubliclyAccessible:PubliclyAccessible,StorageEncrypted:StorageEncrypted}'"
            description: "Check RDS encryption in transit settings"
            pass_criteria: "SSL/TLS required for connections"
        evidence_script: |
          #!/bin/bash
          echo "=== SC-8 Transmission Confidentiality and Integrity ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== ELB Listeners ==="
          aws elbv2 describe-load-balancers --query 'LoadBalancers[*].LoadBalancerArn' --output text | while read lb; do
            echo "Load Balancer: $lb"
            aws elbv2 describe-listeners --load-balancer-arn "$lb" --query 'Listeners[*].{Protocol:Protocol,Port:Port,SslPolicy:SslPolicy}' --output table
          done
          echo ""
          echo "=== CloudFront SSL/TLS ==="
          aws cloudfront list-distributions --query 'DistributionList.Items[*].{Id:Id,ViewerCertificate:ViewerCertificate.MinimumProtocolVersion}' --output table
      azure:
        commands:
          - cmd: "az network application-gateway list --query '[].{Name:name,SslPolicy:sslPolicy}'"
            description: "Check Application Gateway SSL policies"
            pass_criteria: "Strong TLS policies configured"
          - cmd: "az storage account list --query '[].{Name:name,MinTls:minimumTlsVersion,HttpsOnly:enableHttpsTrafficOnly}'"
            description: "Check storage account TLS settings"
            pass_criteria: "TLS 1.2+ required, HTTPS only"
      gcp:
        commands:
          - cmd: "gcloud compute ssl-policies list"
            description: "List SSL policies"
            pass_criteria: "Modern TLS policies configured"
          - cmd: "gcloud compute target-https-proxies list"
            description: "List HTTPS proxies"
            pass_criteria: "HTTPS proxies use strong SSL policies"
      kubernetes:
        commands:
          - cmd: "kubectl get ingress -A -o json | jq '.items[] | {name:.metadata.name,tls:.spec.tls}'"
            description: "Check ingress TLS configuration"
            pass_criteria: "TLS configured on ingresses"

  SC-8(1):
    title: Cryptographic Protection
    description: |
      Implement cryptographic mechanisms to prevent unauthorized disclosure and detect changes
      to information during transmission.
    baseline: [moderate, high]
    parent: SC-8
    cloud_tests:
      aws:
        commands:
          - cmd: "aws elbv2 describe-listeners --query 'Listeners[?Protocol==`HTTPS`].{Arn:ListenerArn,SslPolicy:SslPolicy}'"
            description: "Check HTTPS listener SSL policies"
            pass_criteria: "Using ELBSecurityPolicy-TLS-1-2 or stronger"
          - cmd: "aws acm list-certificates --query 'CertificateSummaryList[*].{Domain:DomainName,Status:Status}'"
            description: "List ACM certificates"
            pass_criteria: "Valid certificates for all endpoints"
      azure:
        commands:
          - cmd: "az keyvault certificate list --vault-name VAULT"
            description: "List Key Vault certificates"
            pass_criteria: "Valid certificates for encryption"
      gcp:
        commands:
          - cmd: "gcloud compute ssl-certificates list"
            description: "List SSL certificates"
            pass_criteria: "Valid certificates for all endpoints"

  SC-10:
    title: Network Disconnect
    description: |
      Terminate network connections at the end of sessions or after a defined period of inactivity.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws elbv2 describe-target-groups --query 'TargetGroups[*].{Name:TargetGroupName,IdleTimeout:Attributes}'"
            description: "Check target group idle timeout"
            pass_criteria: "Appropriate idle timeout configured"
          - cmd: "aws ssm describe-document --name SSM-SessionManagerRunShell --query 'Document.Content'"
            description: "Check Session Manager timeout settings"
            pass_criteria: "Session timeout is configured"
      azure:
        commands:
          - cmd: "az network application-gateway show --resource-group RG --name AG --query 'backendHttpSettingsCollection[*].{Name:name,Timeout:requestTimeout}'"
            description: "Check Application Gateway timeout"
            pass_criteria: "Appropriate timeout configured"
      gcp:
        commands:
          - cmd: "gcloud compute backend-services describe SERVICE --format='value(timeoutSec)'"
            description: "Check backend service timeout"
            pass_criteria: "Appropriate timeout configured"

  SC-12:
    title: Cryptographic Key Establishment and Management
    description: |
      Establish and manage cryptographic keys when cryptography is required.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws kms list-keys"
            description: "List KMS keys"
            pass_criteria: "KMS keys exist for cryptographic operations"
          - cmd: "aws kms describe-key --key-id KEY_ID --query 'KeyMetadata.{KeyState:KeyState,Origin:Origin,KeyManager:KeyManager}'"
            description: "Check KMS key configuration"
            pass_criteria: "Keys are enabled and properly managed"
          - cmd: "aws kms get-key-rotation-status --key-id KEY_ID"
            description: "Check key rotation status"
            pass_criteria: "Automatic key rotation enabled"
        evidence_script: |
          #!/bin/bash
          echo "=== SC-12 Cryptographic Key Management ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== KMS Keys ==="
          aws kms list-keys --query 'Keys[*].KeyId' --output text | while read key; do
            echo "Key: $key"
            aws kms describe-key --key-id "$key" --query 'KeyMetadata.{State:KeyState,Origin:Origin,Manager:KeyManager}'
            aws kms get-key-rotation-status --key-id "$key" 2>/dev/null || echo "Rotation status not available"
            echo "---"
          done
      azure:
        commands:
          - cmd: "az keyvault list --query '[].{Name:name,Location:location}'"
            description: "List Key Vaults"
            pass_criteria: "Key Vaults exist for key management"
          - cmd: "az keyvault key list --vault-name VAULT"
            description: "List keys in Key Vault"
            pass_criteria: "Keys are properly managed"
      gcp:
        commands:
          - cmd: "gcloud kms keyrings list --location=global"
            description: "List KMS key rings"
            pass_criteria: "Key rings exist"
          - cmd: "gcloud kms keys list --keyring=KEYRING --location=LOCATION"
            description: "List KMS keys"
            pass_criteria: "Keys are managed"
      kubernetes:
        commands:
          - cmd: "kubectl get secrets -A -o json | jq '.items[] | select(.type==\"kubernetes.io/tls\") | .metadata.name'"
            description: "List TLS secrets"
            pass_criteria: "TLS secrets are properly managed"

  SC-12(1):
    title: Availability
    description: |
      Maintain availability of information in the event of the loss of cryptographic keys.
    baseline: [moderate, high]
    parent: SC-12
    cloud_tests:
      aws:
        commands:
          - cmd: "aws kms list-aliases --query 'Aliases[*].{Alias:AliasName,TargetKeyId:TargetKeyId}'"
            description: "Check KMS key aliases for key management"
            pass_criteria: "Aliases exist for key management"
          - cmd: "aws backup list-backup-plans"
            description: "Check backup plans for key material"
            pass_criteria: "Backup plans exist"
      azure:
        commands:
          - cmd: "az keyvault show --name VAULT --query '{SoftDelete:properties.enableSoftDelete,PurgeProtection:properties.enablePurgeProtection}'"
            description: "Check Key Vault soft delete and purge protection"
            pass_criteria: "Soft delete and purge protection enabled"
      gcp:
        commands:
          - cmd: "gcloud kms keys describe KEY --keyring=KEYRING --location=LOCATION --format='value(primary.state)'"
            description: "Check key state"
            pass_criteria: "Key is enabled"

  SC-13:
    title: Cryptographic Protection
    description: |
      Implement FIPS-validated or NSA-approved cryptography.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws kms describe-key --key-id KEY_ID --query 'KeyMetadata.{KeySpec:KeySpec,KeyUsage:KeyUsage}'"
            description: "Check KMS key specifications"
            pass_criteria: "FIPS-compliant key specifications"
          - cmd: "aws elbv2 describe-listeners --query 'Listeners[?Protocol==`HTTPS`].SslPolicy'"
            description: "Check SSL policies for FIPS compliance"
            pass_criteria: "FIPS-compliant SSL policies"
      azure:
        commands:
          - cmd: "az keyvault key show --vault-name VAULT --name KEY --query '{KeyType:key.kty,KeySize:key.keySize}'"
            description: "Check Key Vault key specifications"
            pass_criteria: "FIPS-compliant key specifications"
      gcp:
        commands:
          - cmd: "gcloud kms keys describe KEY --keyring=KEYRING --location=LOCATION --format='value(versionTemplate.algorithm)'"
            description: "Check KMS key algorithm"
            pass_criteria: "FIPS-compliant algorithm"

  SC-17:
    title: Public Key Infrastructure Certificates
    description: |
      Issue public key certificates under an appropriate certificate policy
      or obtain public key certificates from an approved service provider.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws acm list-certificates --query 'CertificateSummaryList[*].{Domain:DomainName,Status:Status,Type:Type}'"
            description: "List ACM certificates"
            pass_criteria: "Certificates are valid and from approved issuers"
          - cmd: "aws acm describe-certificate --certificate-arn ARN --query 'Certificate.{Issuer:Issuer,NotAfter:NotAfter,Status:Status}'"
            description: "Check certificate details"
            pass_criteria: "Certificate from approved issuer, not expired"
        evidence_script: |
          #!/bin/bash
          echo "=== SC-17 PKI Certificates ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== ACM Certificates ==="
          aws acm list-certificates --query 'CertificateSummaryList[*].CertificateArn' --output text | while read arn; do
            echo "Certificate: $arn"
            aws acm describe-certificate --certificate-arn "$arn" --query 'Certificate.{Domain:DomainName,Issuer:Issuer,Status:Status,NotAfter:NotAfter}'
            echo "---"
          done
      azure:
        commands:
          - cmd: "az keyvault certificate list --vault-name VAULT --query '[].{Name:name,Enabled:attributes.enabled}'"
            description: "List Key Vault certificates"
            pass_criteria: "Certificates are valid"
      gcp:
        commands:
          - cmd: "gcloud certificate-manager certificates list"
            description: "List Certificate Manager certificates"
            pass_criteria: "Certificates are from approved providers"

  SC-20:
    title: Secure Name/Address Resolution Service (Authoritative Source)
    description: |
      Provide additional data origin authentication and integrity verification artifacts
      for DNS responses.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws route53 list-hosted-zones"
            description: "List Route 53 hosted zones"
            pass_criteria: "Hosted zones are configured"
          - cmd: "aws route53 get-dnssec --hosted-zone-id ZONE_ID"
            description: "Check DNSSEC status"
            pass_criteria: "DNSSEC is enabled"
      azure:
        commands:
          - cmd: "az network dns zone list"
            description: "List DNS zones"
            pass_criteria: "DNS zones are configured"
      gcp:
        commands:
          - cmd: "gcloud dns managed-zones list"
            description: "List Cloud DNS zones"
            pass_criteria: "DNS zones are configured"
          - cmd: "gcloud dns managed-zones describe ZONE --format='value(dnssecConfig.state)'"
            description: "Check DNSSEC status"
            pass_criteria: "DNSSEC is on"

  SC-21:
    title: Secure Name/Address Resolution Service (Recursive or Caching Resolver)
    description: |
      Request and perform data origin authentication and data integrity verification
      on name/address resolution responses.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws route53resolver list-resolver-endpoints"
            description: "List Route 53 Resolver endpoints"
            pass_criteria: "Resolver endpoints configured"
          - cmd: "aws route53resolver list-resolver-dnssec-configs"
            description: "Check DNSSEC validation configuration"

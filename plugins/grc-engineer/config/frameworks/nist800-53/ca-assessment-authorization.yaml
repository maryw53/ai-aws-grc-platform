name: NIST 800-53 CA - Security Assessment and Authorization
family: CA
description: Controls for security assessments, system connections, and continuous monitoring
version: Rev 5

controls:
  CA-1:
    title: Policy and Procedures
    description: |
      Develop, document, and disseminate assessment, authorization, and monitoring policy and procedures.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws securityhub describe-hub"
            description: "Check Security Hub for assessment"
            pass_criteria: "Security Hub is enabled"
      azure:
        commands:
          - cmd: "az security assessment list"
            description: "Check security assessments"
            pass_criteria: "Assessments are configured"

  CA-2:
    title: Control Assessments
    description: |
      Develop a control assessment plan. Assess security and privacy controls.
      Produce a security and privacy assessment report.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws securityhub get-findings --max-items 20"
            description: "Get Security Hub findings"
            pass_criteria: "Control assessments are documented"
          - cmd: "aws configservice describe-compliance-by-config-rule"
            description: "Check Config compliance"
            pass_criteria: "Controls are assessed"
          - cmd: "aws auditmanager list-assessments"
            description: "List Audit Manager assessments"
            pass_criteria: "Formal assessments exist"
        evidence_script: |
          #!/bin/bash
          echo "=== CA-2 Control Assessments ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Config Rule Compliance ==="
          aws configservice describe-compliance-by-config-rule --query 'ComplianceByConfigRules[*].{Rule:ConfigRuleName,Compliance:Compliance.ComplianceType}' --output table
          echo ""
          echo "=== Security Hub Standards ==="
          aws securityhub get-enabled-standards --query 'StandardsSubscriptions[*].{Standard:StandardsArn,Status:StandardsStatus}' --output table
          echo ""
          echo "=== Audit Manager Assessments ==="
          aws auditmanager list-assessments --query 'assessmentMetadata[*].{Name:name,Status:status}' --output table 2>/dev/null || echo "Audit Manager not configured"
      azure:
        commands:
          - cmd: "az security assessment list"
            description: "List assessments"
            pass_criteria: "Assessments are documented"
          - cmd: "az policy state summarize"
            description: "Summarize policy compliance"
            pass_criteria: "Policy compliance is assessed"
      gcp:
        commands:
          - cmd: "gcloud scc findings list ORG_ID"
            description: "List SCC findings"
            pass_criteria: "Findings document assessments"
      kubernetes:
        commands:
          - cmd: "kubectl get podsecuritypolicies"
            description: "Check PSPs"
            pass_criteria: "Security policies are assessed"

  CA-2(1):
    title: Independent Assessors
    description: |
      Employ independent assessors or assessment teams to conduct control assessments.
    baseline: [moderate, high]
    parent: CA-2
    cloud_tests:
      aws:
        commands:
          - cmd: "aws auditmanager list-assessments"
            description: "List Audit Manager for third-party assessment"
            pass_criteria: "Third-party assessments documented"

  CA-3:
    title: Information Exchange
    description: |
      Approve and manage the exchange of information between the system and other systems.
      Document interface characteristics, security requirements, and information exchanged.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-vpc-peering-connections"
            description: "List VPC peering connections"
            pass_criteria: "Peering connections are documented"
          - cmd: "aws ram list-resources --resource-owner SELF"
            description: "List RAM shared resources"
            pass_criteria: "Shared resources are documented"
          - cmd: "aws apigateway get-rest-apis"
            description: "List API interfaces"
            pass_criteria: "APIs are documented"
        evidence_script: |
          #!/bin/bash
          echo "=== CA-3 Information Exchange ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== VPC Peering Connections ==="
          aws ec2 describe-vpc-peering-connections --query 'VpcPeeringConnections[*].{Id:VpcPeeringConnectionId,Status:Status.Code,Requester:RequesterVpcInfo.VpcId,Accepter:AccepterVpcInfo.VpcId}' --output table
          echo ""
          echo "=== Transit Gateway Attachments ==="
          aws ec2 describe-transit-gateway-attachments --query 'TransitGatewayAttachments[*].{Id:TransitGatewayAttachmentId,Type:ResourceType,State:State}' --output table
          echo ""
          echo "=== API Gateway APIs ==="
          aws apigateway get-rest-apis --query 'items[*].{Name:name,Id:id}' --output table
      azure:
        commands:
          - cmd: "az network vnet peering list --resource-group RG --vnet-name VNET"
            description: "List VNet peerings"
            pass_criteria: "Peerings are documented"
          - cmd: "az apim api list --resource-group RG --service-name SERVICE"
            description: "List API Management APIs"
            pass_criteria: "APIs are documented"
      gcp:
        commands:
          - cmd: "gcloud compute networks peerings list"
            description: "List VPC peerings"
            pass_criteria: "Peerings are documented"
          - cmd: "gcloud api-gateway apis list"
            description: "List API Gateway APIs"
            pass_criteria: "APIs are documented"

  CA-5:
    title: Plan of Action and Milestones
    description: |
      Develop a plan of action and milestones for the system to document planned remedial actions.
      Update plan of action and milestones based on findings.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws securityhub get-findings --filters '{\"WorkflowStatus\":[{\"Value\":\"NEW\",\"Comparison\":\"EQUALS\"}]}' --max-items 10"
            description: "Get new findings requiring POA&M"
            pass_criteria: "Findings are tracked for remediation"
          - cmd: "aws ssm list-ops-items --ops-item-filters 'Key=Status,Values=Open,Operator=Equal'"
            description: "List open OpsItems"
            pass_criteria: "OpsItems track remediation"
      azure:
        commands:
          - cmd: "az security task list"
            description: "List security tasks"
            pass_criteria: "Tasks track remediation"
      gcp:
        commands:
          - cmd: "gcloud scc findings list ORG_ID --filter='state=ACTIVE'"
            description: "List active findings"
            pass_criteria: "Findings tracked for remediation"

  CA-6:
    title: Authorization
    description: |
      Authorize the system to operate. Authorization is based on security and privacy plan,
      assessment report, and plan of action and milestones.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws organizations list-accounts"
            description: "List organization accounts"
            pass_criteria: "Accounts are authorized"
          - cmd: "aws auditmanager list-assessments"
            description: "Check Audit Manager for authorization evidence"
            pass_criteria: "Authorization evidence exists"
      azure:
        commands:
          - cmd: "az account list"
            description: "List subscriptions"
            pass_criteria: "Subscriptions are authorized"

  CA-7:
    title: Continuous Monitoring
    description: |
      Develop a continuous monitoring strategy and implement a continuous monitoring program.
      Establish metrics. Monitor system security and privacy controls.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws securityhub describe-hub"
            description: "Check Security Hub status"
            pass_criteria: "Continuous monitoring via Security Hub"
          - cmd: "aws configservice describe-configuration-recorder-status"
            description: "Check Config recorder"
            pass_criteria: "Config continuously monitors"
          - cmd: "aws guardduty list-detectors"
            description: "Check GuardDuty"
            pass_criteria: "GuardDuty continuously monitors"
          - cmd: "aws cloudwatch describe-alarms"
            description: "Check CloudWatch alarms"
            pass_criteria: "CloudWatch provides metrics"
        evidence_script: |
          #!/bin/bash
          echo "=== CA-7 Continuous Monitoring ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Security Hub Status ==="
          aws securityhub describe-hub
          echo ""
          echo "=== Config Recorder Status ==="
          aws configservice describe-configuration-recorder-status --output table
          echo ""
          echo "=== GuardDuty Status ==="
          DETECTOR=$(aws guardduty list-detectors --query 'DetectorIds[0]' --output text)
          if [ "$DETECTOR" != "None" ] && [ -n "$DETECTOR" ]; then
            aws guardduty get-detector --detector-id $DETECTOR --query '{Status:Status}'
          fi
          echo ""
          echo "=== CloudWatch Alarms ==="
          aws cloudwatch describe-alarms --query 'MetricAlarms[*].{Name:AlarmName,State:StateValue}' --output table | head -20
      azure:
        commands:
          - cmd: "az security pricing list"
            description: "Check Security Center pricing"
            pass_criteria: "Security Center monitors continuously"
          - cmd: "az monitor metrics alert list"
            description: "List metric alerts"
            pass_criteria: "Metrics are monitored"
      gcp:
        commands:
          - cmd: "gcloud scc settings describe --organization=ORG_ID"
            description: "Check SCC settings"
            pass_criteria: "SCC monitors continuously"
          - cmd: "gcloud monitoring policies list"
            description: "List alerting policies"
            pass_criteria: "Metrics are monitored"
      kubernetes:
        commands:
          - cmd: "kubectl get servicemonitors -A"
            description: "Check Prometheus ServiceMonitors"
            pass_criteria: "Services are monitored"

  CA-7(1):
    title: Independent Assessment
    description: |
      Employ independent assessors or assessment teams to monitor the security controls on an ongoing basis.
    baseline: [moderate, high]
    parent: CA-7
    cloud_tests:
      aws:
        commands:
          - cmd: "aws auditmanager list-assessments"
            description: "Check Audit Manager"
            pass_criteria: "Independent assessment via Audit Manager"

  CA-8:
    title: Penetration Testing
    description: |
      Conduct penetration testing at defined frequency.
    baseline: [high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws inspector2 list-findings --filter-criteria '{\"findingType\":[{\"comparison\":\"EQUALS\",\"value\":\"NETWORK_REACHABILITY\"}]}'"
            description: "Check network reachability findings"
            pass_criteria: "Network exposure is assessed"
      azure:
        commands:
          - cmd: "az security assessment list --query '[?contains(name,`penetration`)]'"
            description: "Check for penetration testing results"
            pass_criteria: "Penetration testing documented"

  CA-9:
    title: Internal System Connections
    description: |
      Authorize internal connections of system components. Document interface characteristics
      and security requirements.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-security-groups"
            description: "List security groups (internal connections)"
            pass_criteria: "Internal connections are authorized"
          - cmd: "aws ec2 describe-network-interfaces"
            description: "List network interfaces"
            pass_criteria: "Interfaces are documented"
      azure:
        commands:
          - cmd: "az network nic list"
            description: "List network interfaces"
            pass_criteria: "Interfaces are documented"
      gcp:
        commands:
          - cmd: "gcloud compute networks describe NETWORK"
            description: "Describe network"
            pass_criteria: "Network connections are documented"
      kubernetes:
        commands:
          - cmd: "kubectl get networkpolicies -A"
            description: "List network policies"
            pass_criteria: "Internal connections are controlled"

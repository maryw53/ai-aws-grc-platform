name: NIST 800-53 PE - Physical and Environmental Protection
family: PE
description: Controls for physical access and environmental protection (limited cloud applicability)
version: Rev 5

controls:
  PE-1:
    title: Policy and Procedures
    description: |
      Develop, document, and disseminate physical and environmental protection policy and procedures.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws outposts list-outposts"
            description: "List Outposts (on-premises AWS)"
            pass_criteria: "Outposts require physical security policy"
          - cmd: "aws artifact get-terms"
            description: "Check AWS Artifact for compliance"
            pass_criteria: "AWS provides physical security attestations"
      azure:
        commands:
          - cmd: "az stack-hci cluster list"
            description: "List Azure Stack HCI"
            pass_criteria: "On-premises requires physical policy"

  PE-2:
    title: Physical Access Authorizations
    description: |
      Develop, approve, and maintain a list of individuals with authorized access to the facility.
      Issue authorization credentials. Review the access list periodically.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws outposts list-outposts"
            description: "Check for on-premises infrastructure"
            pass_criteria: "Outposts require physical access list"
        evidence_script: |
          #!/bin/bash
          echo "=== PE-2 Physical Access Authorizations ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "NOTE: Physical access controls are primarily the responsibility of the cloud provider."
          echo ""
          echo "=== AWS Outposts (On-Premises) ==="
          aws outposts list-outposts --query 'Outposts[*].{Id:OutpostId,Name:Name,SiteId:SiteId}' --output table 2>/dev/null || echo "No Outposts"
          echo ""
          echo "For cloud-hosted resources, physical security is inherited from AWS."
          echo "See AWS SOC reports in AWS Artifact for physical access controls."

  PE-3:
    title: Physical Access Control
    description: |
      Enforce physical access authorizations at entry/exit points by verifying access authorizations.
      Maintain physical access audit logs. Control access to areas containing information systems.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws outposts list-sites"
            description: "List Outpost sites"
            pass_criteria: "Sites require physical access controls"
      azure:
        commands:
          - cmd: "az stack-hci cluster list"
            description: "List on-premises clusters"
            pass_criteria: "Clusters require physical access"

  PE-4:
    title: Access Control for Transmission
    description: |
      Control physical access to system distribution and transmission lines within organizational facilities.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws directconnect describe-connections"
            description: "List Direct Connect connections"
            pass_criteria: "Direct Connect requires physical security"
          - cmd: "aws directconnect describe-locations"
            description: "List Direct Connect locations"
            pass_criteria: "DX locations have physical controls"
      azure:
        commands:
          - cmd: "az network express-route circuit list"
            description: "List ExpressRoute circuits"
            pass_criteria: "ExpressRoute requires physical security"
      gcp:
        commands:
          - cmd: "gcloud compute interconnects list"
            description: "List Cloud Interconnects"
            pass_criteria: "Interconnects require physical security"

  PE-5:
    title: Access Control for Output Devices
    description: |
      Control physical access to information system output devices.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "echo 'Output devices are managed at the organizational facility level'"
            description: "Note on cloud applicability"
            pass_criteria: "Review workstation policies separately"

  PE-6:
    title: Monitoring Physical Access
    description: |
      Monitor physical access to the facility where the system resides.
      Review physical access logs. Coordinate with incident response capability.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws outposts list-outposts"
            description: "Check for on-premises AWS"
            pass_criteria: "Outposts require access monitoring"
        evidence_script: |
          #!/bin/bash
          echo "=== PE-6 Physical Access Monitoring ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "NOTE: For cloud-hosted resources, physical access monitoring is inherited from AWS."
          echo ""
          echo "AWS provides physical access monitoring through:"
          echo "- 24/7 Security Operations Center"
          echo "- Video surveillance"
          echo "- Intrusion detection systems"
          echo "- Access logs and audit trails"
          echo ""
          echo "See AWS SOC 2 Type II report in AWS Artifact for details."

  PE-8:
    title: Visitor Access Records
    description: |
      Maintain visitor access records to the facility where the system resides.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws outposts list-outposts"
            description: "Check for on-premises"
            pass_criteria: "Outposts require visitor logs"

  PE-9:
    title: Power Equipment and Cabling
    description: |
      Protect power equipment and power cabling for the system from damage and destruction.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-availability-zones"
            description: "Check availability zone redundancy"
            pass_criteria: "AWS provides power redundancy"
          - cmd: "aws outposts list-outposts"
            description: "Check Outposts power requirements"
            pass_criteria: "Outposts require power protection"
      azure:
        commands:
          - cmd: "az group list --query '[].location' | sort | uniq"
            description: "Check region distribution"
            pass_criteria: "Multi-region provides redundancy"

  PE-10:
    title: Emergency Shutoff
    description: |
      Provide the capability to shut off power to the system in emergency situations.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-instances --query 'Reservations[*].Instances[*].{Id:InstanceId,State:State.Name}'"
            description: "List instances (can be stopped)"
            pass_criteria: "Instances can be emergency stopped"
      azure:
        commands:
          - cmd: "az vm list --query '[].{Name:name,State:powerState}'"
            description: "List VMs (can be stopped)"
            pass_criteria: "VMs can be emergency stopped"

  PE-11:
    title: Emergency Power
    description: |
      Provide a short-term uninterruptible power supply to facilitate orderly shutdown
      or transition to an alternate power source.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-availability-zones"
            description: "Check AZ redundancy"
            pass_criteria: "AWS provides UPS at data centers"
      azure:
        commands:
          - cmd: "az account list-locations"
            description: "List Azure regions"
            pass_criteria: "Azure provides UPS at data centers"

  PE-12:
    title: Emergency Lighting
    description: |
      Employ and maintain automatic emergency lighting that activates in the event of power outage.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "echo 'Emergency lighting is provided by cloud provider at data centers'"
            description: "Cloud provider responsibility"
            pass_criteria: "Inherited from AWS"

  PE-13:
    title: Fire Protection
    description: |
      Employ and maintain fire detection and suppression systems that are supported by an independent energy source.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "echo 'Fire protection is provided by cloud provider at data centers'"
            description: "Cloud provider responsibility"
            pass_criteria: "Inherited from AWS"

  PE-14:
    title: Environmental Controls
    description: |
      Maintain temperature and humidity levels within the facility within acceptable levels.
      Monitor environmental conditions at defined frequency.
    baseline: [low, moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws outposts list-outposts"
            description: "Check for on-premises infrastructure"
            pass_criteria: "Outposts require environmental controls"
      azure:
        commands:
          - cmd: "az stack-hci cluster list"
            description: "Check for on-premises"
            pass_criteria: "On-premises requires environmental controls"

  PE-15:
    title: Water Damage Protection
    description: |
      Protect the system from damage resulting from water leakage by providing master shutoff valves
      and ensuring personnel know valve location.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "echo 'Water damage protection is provided by cloud provider'"
            description: "Cloud provider responsibility"
            pass_criteria: "Inherited from AWS"

  PE-16:
    title: Delivery and Removal
    description: |
      Authorize and control the entry and exit of information system components.
      Maintain records of the items.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws snowball list-jobs"
            description: "List Snowball jobs (physical delivery)"
            pass_criteria: "Physical delivery is tracked"
          - cmd: "aws outposts list-outposts"
            description: "Check Outposts"
            pass_criteria: "Outpost equipment is tracked"
      azure:
        commands:
          - cmd: "az databox job list"
            description: "List Data Box jobs"
            pass_criteria: "Physical delivery is tracked"

  PE-17:
    title: Alternate Work Site
    description: |
      Employ security controls at alternate work sites.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws workspaces describe-workspaces"
            description: "List WorkSpaces"
            pass_criteria: "Virtual desktops for remote work"
          - cmd: "aws ec2 describe-client-vpn-endpoints"
            description: "List Client VPN endpoints"
            pass_criteria: "VPN for remote access"
      azure:
        commands:
          - cmd: "az desktopvirtualization workspace list"
            description: "List AVD workspaces"
            pass_criteria: "Virtual desktops available"
      gcp:
        commands:
          - cmd: "gcloud compute vpn-tunnels list"
            description: "List VPN tunnels"
            pass_criteria: "VPN for remote access"

  PE-18:
    title: Location of System Components
    description: |
      Position system components within the facility to minimize potential damage from physical and environmental hazards.
    baseline: [moderate, high]
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-availability-zones"
            description: "Check AZ distribution"
            pass_criteria: "Components distributed across AZs"
          - cmd: "aws rds describe-db-instances --query 'DBInstances[*].{Id:DBInstanceIdentifier,MultiAZ:MultiAZ}'"
            description: "Check Multi-AZ"
            pass_criteria: "Critical systems in multiple locations"
      azure:
        commands:
          - cmd: "az vm availability-set list"
            description: "Check availability sets"
            pass_criteria: "VMs distributed for resilience"
      gcp:
        commands:
          - cmd: "gcloud compute regions list"
            description: "List regions"
            pass_criteria: "Multi-region for resilience"

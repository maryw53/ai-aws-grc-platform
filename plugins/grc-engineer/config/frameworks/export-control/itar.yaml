name: ITAR - International Traffic in Arms Regulations
version: "2024"
description: |
  Engineering posture map for defense articles, technical data, and defense services
  under the U.S. Munitions List (USML). Administered by the State Department's
  Directorate of Defense Trade Controls (DDTC).

  ENGINEERING GUIDANCE ONLY. NOT LEGAL ADVICE. The cloud_tests and pass_criteria
  below are starting points for security engineers; DDTC determines applicability
  and the 22 CFR 120.54 encrypted-technical-data carve-out and 22 CFR 122.5
  recordkeeping scope are nuanced. Validate specific postures with export-control
  counsel before adoption.

applicable_to:
  - Defense contractors
  - Aerospace and defense manufacturers
  - Organizations handling USML items
  - Systems processing technical data related to defense articles

key_requirements:
  data_sovereignty:
    description: |
      ITAR-controlled technical data is stored in US-located systems by default.
      22 CFR 120.54 carves out properly-encrypted technical data from the release
      definition, so non-US storage of end-to-end-encrypted data with US-controlled
      keys can be defensible. Default to US-located; document any deviation with
      counsel.
    cloud_controls:
      - Default: data stored in US-located regions
      - Access limited to US persons
      - No foreign national access without authorization
      - Non-US storage requires documented encryption posture and counsel sign-off

  access_control:
    description: |
      Only "US persons" as defined in 22 CFR 120.62 may access ITAR-controlled
      technical data. The 120.62 definition covers citizens, lawful permanent
      residents, "protected individuals" under 8 USC 1324b(a)(3), and
      US-incorporated entities. Don't narrow this to "citizens or LPRs only";
      that over-restricts and can trigger employment-law exposure.
    cloud_controls:
      - Verify US-person status under the full 22 CFR 120.62 definition
      - Tag users with the 120.62 category that applies (citizen, LPR, protected individual, US entity)
      - Implement role-based access control
      - Audit all access to controlled data
      - Review the verification method with HR and counsel

  encryption:
    description: ITAR data must be encrypted in transit and at rest
    cloud_controls:
      - FIPS 140-2 validated encryption
      - Customer-managed encryption keys
      - Encryption for all data at rest

controls:
  ITAR-1:
    title: US Person Verification
    description: Verify that all users with access to ITAR data are US persons
    cloud_tests:
      aws:
        commands:
          - cmd: "aws iam list-users --query 'Users[*].UserName'"
            description: "List all IAM users for US person verification"
            pass_criteria: "All users verified as US persons"
          - cmd: "aws iam list-user-tags --user-name USERNAME"
            description: "Check user tags for citizenship verification"
            pass_criteria: "User tagged with citizenship status"
        evidence_script: |
          #!/bin/bash
          echo "=== ITAR-1 US Person Verification ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== IAM Users ==="
          aws iam list-users --query 'Users[*].{UserName:UserName,CreateDate:CreateDate}' --output table
          echo ""
          echo "NOTE: Verify each user is a US person (citizen or permanent resident)"
          echo "Maintain documentation of verification in personnel files"
      azure:
        commands:
          - cmd: "az ad user list --query '[].{Name:displayName,UPN:userPrincipalName}'"
            description: "List all Azure AD users for verification"
            pass_criteria: "All users verified as US persons"
      gcp:
        commands:
          - cmd: "gcloud iam service-accounts list"
            description: "List service accounts"
            pass_criteria: "Access limited to US persons"

  ITAR-2:
    title: Data-Residency Posture (US-Located by Default)
    description: |
      ITAR technical data is stored in US-located regions by default.
      22 CFR 120.54 encryption carve-out can permit non-US storage of properly-
      encrypted data; do not rely on it without counsel sign-off.
    cloud_tests:
      aws:
        commands:
          - cmd: "aws s3api get-bucket-location --bucket BUCKET"
            description: "Check S3 bucket location"
            pass_criteria: "Bucket in US region (us-east-1, us-west-2, etc.)"
          - cmd: "aws ec2 describe-regions --query 'Regions[*].RegionName'"
            description: "List available regions"
            pass_criteria: "Only US regions used"
          - cmd: "aws ec2 describe-instances --query 'Reservations[*].Instances[*].{Id:InstanceId,AZ:Placement.AvailabilityZone}'"
            description: "Check instance locations"
            pass_criteria: "All instances in US regions"
        evidence_script: |
          #!/bin/bash
          echo "=== ITAR-2 Data Residency (US-Located by Default) ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== S3 Bucket Locations ==="
          for bucket in $(aws s3api list-buckets --query 'Buckets[*].Name' --output text); do
            location=$(aws s3api get-bucket-location --bucket "$bucket" --query 'LocationConstraint' --output text)
            echo "$bucket: $location"
          done
          echo ""
          echo "=== RDS Instance Locations ==="
          aws rds describe-db-instances --query 'DBInstances[*].{Id:DBInstanceIdentifier,AZ:AvailabilityZone}' --output table
          echo ""
          echo "=== EC2 Instance Locations ==="
          aws ec2 describe-instances --query 'Reservations[*].Instances[*].{Id:InstanceId,AZ:Placement.AvailabilityZone}' --output table
      azure:
        commands:
          - cmd: "az account list-locations --query '[?contains(name,`us`)].name'"
            description: "List US locations"
            pass_criteria: "Only US locations used"
          - cmd: "az resource list --query '[].{Name:name,Location:location}'"
            description: "Check resource locations"
            pass_criteria: "All resources in US regions"
      gcp:
        commands:
          - cmd: "gcloud compute regions list --filter='name:us-*'"
            description: "List US regions"
            pass_criteria: "Only US regions used"
          - cmd: "gcloud storage buckets list --format='table(name,location)'"
            description: "Check bucket locations"
            pass_criteria: "Buckets in US regions"

  ITAR-3:
    title: Encryption Requirements
    description: ITAR data must use FIPS 140-2 validated encryption
    cloud_tests:
      aws:
        commands:
          - cmd: "aws kms list-keys"
            description: "List KMS keys"
            pass_criteria: "KMS provides FIPS 140-2 Level 2 validated HSMs"
          - cmd: "aws ec2 describe-volumes --query 'Volumes[*].{VolumeId:VolumeId,Encrypted:Encrypted}'"
            description: "Check EBS encryption"
            pass_criteria: "All volumes encrypted"
          - cmd: "aws s3api get-bucket-encryption --bucket BUCKET"
            description: "Check S3 encryption"
            pass_criteria: "SSE-KMS encryption enabled"
        evidence_script: |
          #!/bin/bash
          echo "=== ITAR-3 Encryption Requirements ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== KMS Keys (FIPS 140-2 Level 2) ==="
          aws kms list-keys --query 'Keys[*].KeyId' --output text | while read key; do
            echo "Key: $key"
            aws kms describe-key --key-id "$key" --query 'KeyMetadata.{State:KeyState,Origin:Origin}'
          done
          echo ""
          echo "=== EBS Volume Encryption ==="
          aws ec2 describe-volumes --query 'Volumes[*].{VolumeId:VolumeId,Encrypted:Encrypted}' --output table
          echo ""
          echo "=== S3 Bucket Encryption ==="
          for bucket in $(aws s3api list-buckets --query 'Buckets[*].Name' --output text); do
            echo -n "$bucket: "
            aws s3api get-bucket-encryption --bucket "$bucket" 2>/dev/null && echo "Encrypted" || echo "NOT ENCRYPTED"
          done
      azure:
        commands:
          - cmd: "az keyvault list --query '[].{Name:name,EnableSoftDelete:enableSoftDelete}'"
            description: "List Key Vaults"
            pass_criteria: "Key Vault provides FIPS 140-2 Level 2 HSMs"
      gcp:
        commands:
          - cmd: "gcloud kms keyrings list --location=us"
            description: "List KMS key rings in US"
            pass_criteria: "CMEK encryption configured"

  ITAR-4:
    title: Access Logging and Audit
    description: Maintain comprehensive audit trails for all ITAR data access
    cloud_tests:
      aws:
        commands:
          - cmd: "aws cloudtrail describe-trails"
            description: "Check CloudTrail configuration"
            pass_criteria: "CloudTrail logs all management and data events"
          - cmd: "aws cloudtrail get-event-selectors --trail-name TRAIL"
            description: "Check event selectors"
            pass_criteria: "Data events logged for S3 and other services"
          - cmd: "aws logs describe-log-groups --query 'logGroups[*].{Name:logGroupName,RetentionDays:retentionInDays}'"
            description: "Check log retention"
            pass_criteria: "Logs covering 22 CFR 122.5 record categories retained 5+ years (operational logs may have shorter retention)"
        evidence_script: |
          #!/bin/bash
          echo "=== ITAR-4 Access Logging and Audit ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== CloudTrail Configuration ==="
          aws cloudtrail describe-trails --query 'trailList[*].{Name:Name,IsMultiRegion:IsMultiRegionTrail,LogValidation:LogFileValidationEnabled}' --output table
          echo ""
          echo "=== Log Retention ==="
          aws logs describe-log-groups --query 'logGroups[*].{Name:logGroupName,RetentionDays:retentionInDays}' --output table
          echo ""
          echo "NOTE: 22 CFR 122.5 requires 5-year retention for specific record categories (manufacturing, transactions, broker records). Map your logs to those categories; don't assume every audit log is in scope. Operational logs can have shorter retention set by your own policy."
      azure:
        commands:
          - cmd: "az monitor activity-log list --max-events 5"
            description: "Check activity logging"
            pass_criteria: "Activity logs are enabled"
      gcp:
        commands:
          - cmd: "gcloud logging sinks list"
            description: "List log sinks"
            pass_criteria: "Logs exported for long-term retention"

  ITAR-5:
    title: Network Isolation
    description: ITAR systems should be isolated from non-ITAR systems
    cloud_tests:
      aws:
        commands:
          - cmd: "aws ec2 describe-vpcs --query 'Vpcs[*].{VpcId:VpcId,CidrBlock:CidrBlock,Tags:Tags}'"
            description: "Check VPC isolation"
            pass_criteria: "Dedicated VPCs for ITAR workloads"
          - cmd: "aws ec2 describe-vpc-peering-connections"
            description: "Check VPC peering"
            pass_criteria: "No peering to non-ITAR environments"
      azure:
        commands:
          - cmd: "az network vnet list --query '[].{Name:name,Tags:tags}'"
            description: "Check VNet isolation"
            pass_criteria: "Dedicated VNets for ITAR"
      gcp:
        commands:
          - cmd: "gcloud compute networks list"
            description: "List VPC networks"
            pass_criteria: "Isolated networks for ITAR"

  ITAR-6:
    title: Export Control Marking
    description: ITAR data must be marked with appropriate export control notices
    cloud_tests:
      aws:
        commands:
          - cmd: "aws s3api get-object-tagging --bucket BUCKET --key KEY"
            description: "Check object export control tags"
            pass_criteria: "Objects tagged with ITAR classification"
          - cmd: "aws resourcegroupstaggingapi get-resources --tag-filters Key=ExportControl,Values=ITAR"
            description: "Find ITAR-tagged resources"
            pass_criteria: "ITAR resources are tagged"
      azure:
        commands:
          - cmd: "az resource list --query '[?tags.ExportControl==`ITAR`]'"
            description: "Find ITAR-tagged resources"
            pass_criteria: "ITAR resources are tagged"
      gcp:
        commands:
          - cmd: "gcloud asset search-all-resources --query='labels.export_control:itar'"
            description: "Find ITAR-labeled resources"
            pass_criteria: "ITAR resources are labeled"

  ITAR-7:
    title: Third-Party Access Control
    description: Control access by cloud service providers and third parties
    cloud_tests:
      aws:
        commands:
          - cmd: "aws organizations list-policies --filter SERVICE_CONTROL_POLICY"
            description: "Check SCPs for third-party restrictions"
            pass_criteria: "SCPs restrict unauthorized access"
          - cmd: "aws iam list-roles --query 'Roles[?contains(AssumeRolePolicyDocument|to_string(@),`sts:ExternalId`)]'"
            description: "Check for external access roles"
            pass_criteria: "External access is controlled"
      azure:
        commands:
          - cmd: "az ad sp list --filter=\"servicePrincipalType eq 'Application'\""
            description: "List service principals"
            pass_criteria: "Third-party access is controlled"

aws_govcloud:
  description: AWS GovCloud (US) is the conservative default for ITAR workloads
  benefits:
    - US-located regions
    - US persons only personnel
    - FedRAMP High authorization
    - Documented ITAR support story from AWS
  verification_command: "aws ec2 describe-regions --region us-gov-west-1"

azure_government:
  description: Azure Government is the conservative default for ITAR workloads on Azure
  benefits:
    - US-located datacenters
    - Screened US personnel
    - FedRAMP High authorization
  verification_command: "az cloud list --query '[?name==`AzureUSGovernment`]'"

gcp_assured_workloads:
  description: GCP Assured Workloads for ITAR compliance
  benefits:
    - Data residency controls
    - Personnel access controls
    - Compliance monitoring

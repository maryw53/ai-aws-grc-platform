name: EAR - Export Administration Regulations
version: "2024"
description: |
  Engineering posture map for dual-use commercial items under the Commerce Control
  List (CCL). Administered by the Bureau of Industry and Security (BIS), U.S.
  Department of Commerce. Controls technology, software, and commodities that have
  both commercial and potential military applications.

  ENGINEERING GUIDANCE ONLY. NOT LEGAL ADVICE. Under 15 CFR 734.6, BIS is the
  authority on EAR licensing. Sanctions rules in 15 CFR 746 (comprehensive
  embargoes, Russia/Belarus under 746.8, Crimea/DNR/LNR under 746.6, etc.)
  shift; verify against current BIS country guidance before adopting any
  geo-blocking posture below. Validate with export-control counsel.

applicable_to:
  - Commercial exporters of dual-use items
  - Technology companies with encryption products (Category 5 Part 2)
  - Cloud service providers
  - Software and semiconductor companies
  - Organizations subject to Entity List restrictions
  - Companies exporting to embargoed countries

key_requirements:
  classification:
    description: Determine if items are subject to EAR and assign proper ECCN
    cloud_controls:
      - Classify technology and software under CCL
      - Determine if EAR99 (not listed) or specific ECCN applies
      - Encryption items require ECCN 5D002, 5A002 classification

  screening:
    description: Screen end users and end uses against BIS denied parties lists
    cloud_controls:
      - Check against Entity List, Denied Persons List, Unverified List
      - Screen for Specially Designated Nationals (SDN)
      - Verify end-use is not for prohibited purposes

  encryption:
    description: Encryption products require FIPS 140 compliance and proper classification
    cloud_controls:
      - FIPS 140-2/140-3 validated cryptographic modules
      - Self-classification or BIS review for encryption items
      - License exceptions (ENC) for certain encryption exports

controls:
  EAR-1:
    title: Export Control Classification (ECCN)
    description: Determine proper ECCN or EAR99 classification for items
    cloud_tests:
      aws:
        commands:
          - cmd: "aws resourcegroupstaggingapi get-resources --tag-filters Key=ECCN"
            description: "List resources with ECCN tags"
            pass_criteria: "All controlled items have proper ECCN classification tags"
          - cmd: "aws s3api get-object-tagging --bucket BUCKET --key KEY"
            description: "Check object ECCN classification"
            pass_criteria: "Technical data tagged with ECCN or EAR99"
        evidence_script: |
          #!/bin/bash
          echo "=== EAR-1 Export Control Classification ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Resources with ECCN Tags ==="
          aws resourcegroupstaggingapi get-resources --tag-filters Key=ECCN --query 'ResourceTagMappingList[*].{ARN:ResourceARN,Tags:Tags}' --output table
          echo ""
          echo "NOTE: Common ECCNs:"
          echo "  - 5D002: Encryption software"
          echo "  - 5A002: Encryption hardware"
          echo "  - 5E002: Encryption technology"
          echo "  - EAR99: Items not on CCL (no license for most exports; end-user/use/destination rules still apply)"
      azure:
        commands:
          - cmd: "az resource list --query '[?tags.ECCN].{Name:name,ECCN:tags.ECCN}'"
            description: "List resources with ECCN tags"
            pass_criteria: "Dual-use items properly classified"
      gcp:
        commands:
          - cmd: "gcloud asset search-all-resources --query='labels.eccn:*'"
            description: "Find resources with ECCN labels"
            pass_criteria: "Items labeled with proper ECCN"

  EAR-2:
    title: End-User and End-Use Screening
    description: Screen customers and partners against BIS denied parties lists
    cloud_tests:
      aws:
        commands:
          - cmd: "aws dynamodb scan --table-name DeniedPartiesScreening"
            description: "Check denied parties screening records"
            pass_criteria: "All customers screened against Entity List, DPL, UVL, SDN"
          - cmd: "aws cloudwatch logs filter-log-events --log-group-name /aws/screening --filter-pattern 'DENIED'"
            description: "Check screening logs for denied parties"
            pass_criteria: "Denied party access attempts are logged and blocked"
        evidence_script: |
          #!/bin/bash
          echo "=== EAR-2 End-User Screening ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== BIS Denied Parties Lists ==="
          echo "  - Entity List: Restricted parties for national security/foreign policy"
          echo "  - Denied Persons List (DPL): Export privileges denied"
          echo "  - Unverified List (UVL): End-use could not be verified"
          echo "  - Treasury SDN: Specially Designated Nationals"
          echo ""
          echo "Screening should occur:"
          echo "  - Before granting account access"
          echo "  - Quarterly for existing customers"
          echo "  - After any BIS list updates"
      azure:
        commands:
          - cmd: "az monitor activity-log list --filters 'category eq Security' --max-events 100"
            description: "Check security logs for screening events"
            pass_criteria: "Denied party screening is logged"
      gcp:
        commands:
          - cmd: "gcloud logging read 'resource.type=cloud_function AND textPayload:\"denied party\"' --limit 50"
            description: "Check Cloud Functions logs for screening"
            pass_criteria: "Screening performed on user provisioning"

  EAR-3:
    title: Encryption Compliance (FIPS 140)
    description: Encryption items must use FIPS 140-2/140-3 validated modules
    cloud_tests:
      aws:
        commands:
          - cmd: "aws kms list-keys"
            description: "Verify KMS provides FIPS 140-2 Level 2/3 validated HSMs"
            pass_criteria: "AWS KMS HSMs are FIPS 140-2 Level 2+ validated"
          - cmd: "aws ec2 describe-volumes --query 'Volumes[?Encrypted==`true`]'"
            description: "Check encrypted volumes use FIPS encryption"
            pass_criteria: "All encryption uses FIPS 140 validated modules"
          - cmd: "aws s3api get-bucket-encryption --bucket BUCKET"
            description: "Verify S3 uses SSE-KMS (FIPS 140)"
            pass_criteria: "SSE-KMS encryption enabled"
        evidence_script: |
          #!/bin/bash
          echo "=== EAR-3 Encryption Compliance ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== FIPS 140-2 Encryption Status ==="
          echo "AWS KMS: FIPS 140-2 Level 2 validated (Certificate #3139, #3195, etc.)"
          echo ""
          echo "=== Encryption Coverage ==="
          echo "EBS Volumes:"
          aws ec2 describe-volumes --query 'Volumes[*].{VolumeId:VolumeId,Encrypted:Encrypted,KmsKeyId:KmsKeyId}' --output table
          echo ""
          echo "S3 Buckets:"
          for bucket in $(aws s3api list-buckets --query 'Buckets[*].Name' --output text); do
            echo -n "$bucket: "
            aws s3api get-bucket-encryption --bucket "$bucket" 2>/dev/null && echo "Encrypted (SSE-KMS)" || echo "NOT ENCRYPTED"
          done
          echo ""
          echo "NOTE: Category 5 Part 2 encryption requires:"
          echo "  - FIPS 140-2/140-3 validated modules"
          echo "  - Self-classification or BIS review for ECCN 5D002/5A002"
          echo "  - License Exception ENC may apply for certain encryption"
      azure:
        commands:
          - cmd: "az keyvault list --query '[].properties.enabledForDiskEncryption'"
            description: "Verify Key Vault FIPS 140-2 compliance"
            pass_criteria: "Azure Key Vault uses FIPS 140-2 Level 2 HSMs"
      gcp:
        commands:
          - cmd: "gcloud kms keys list --location=global --keyring=KEY_RING"
            description: "Verify Cloud KMS FIPS 140-2 compliance"
            pass_criteria: "GCP Cloud KMS uses FIPS 140-2 Level 3 validated HSMs"

  EAR-4:
    title: Geographic Access Controls
    description: |
      Block access in line with current 15 CFR 746 sanctions and any item-specific
      licensing under 15 CFR 740. The country list shifts; the BIS country guidance
      page is the authoritative live reference.
    cloud_tests:
      aws:
        commands:
          - cmd: "aws wafv2 list-web-acls --scope REGIONAL"
            description: "Check WAF rules for geographic restrictions"
            pass_criteria: "WAF blocks access aligned with current 15 CFR 746 sanctions (at minimum: comprehensive embargoes CU, IR, KP, SY; Crimea/DNR/LNR per 746.6; item controls under 746.8 for Russia/Belarus)"
          - cmd: "aws cloudfront list-distributions --query 'DistributionList.Items[*].Restrictions'"
            description: "Check CloudFront geo-restrictions"
            pass_criteria: "CDN restrictions reflect current sanctions; verify against BIS country guidance"
          - cmd: "aws guardduty list-findings --finding-criteria 'Criterion={\"resource.resourceType\":{\"Eq\":[\"AccessKey\"]}}'"
            description: "Check GuardDuty for suspicious geographic access"
            pass_criteria: "Access from sanctioned regions is detected and blocked"
        evidence_script: |
          #!/bin/bash
          echo "=== EAR-4 Geographic Access Controls ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "ENGINEERING GUIDANCE ONLY. NOT LEGAL ADVICE."
          echo "Verify the current sanctions list against BIS country guidance:"
          echo "  https://www.bis.doc.gov/index.php/policy-guidance/country-guidance"
          echo ""
          echo "=== Snapshot of EAR-relevant sanctions (verify before relying on) ==="
          echo "Comprehensive embargoes (15 CFR 746):"
          echo "  - Cuba (CU)"
          echo "  - Iran (IR)"
          echo "  - North Korea (KP)"
          echo "  - Syria (SY)"
          echo ""
          echo "Region-specific comprehensive sanctions (15 CFR 746.6):"
          echo "  - Crimea, so-called DNR, and so-called LNR regions of Ukraine"
          echo ""
          echo "Item-level country controls (15 CFR 746.8 et al.):"
          echo "  - Russia (RU) and Belarus (BY): broad item-level restrictions"
          echo "  - Venezuela (VE): restrictions per 15 CFR 746.10"
          echo "  - Other countries: see BIS country guidance for current actions"
          echo ""
          echo "=== CloudFront Geo-Restrictions ==="
          aws cloudfront list-distributions --query 'DistributionList.Items[*].{Id:Id,Restrictions:Restrictions.GeoRestriction}' --output table
          echo ""
          echo "Apply geo-blocking matched to current BIS guidance, not a static four-country list."
      azure:
        commands:
          - cmd: "az network front-door list --query '[].frontendEndpoints[].resourceState'"
            description: "Check Front Door geo-filtering rules"
            pass_criteria: "Geo-filtering aligned with current 15 CFR 746 sanctions"
      gcp:
        commands:
          - cmd: "gcloud compute security-policies list"
            description: "Check Cloud Armor geo-blocking policies"
            pass_criteria: "Cloud Armor rules aligned with current 15 CFR 746 sanctions"

  EAR-5:
    title: Technology Transfer Controls
    description: Control the export of technical data and source code
    cloud_tests:
      aws:
        commands:
          - cmd: "aws codecommit list-repositories"
            description: "List code repositories with technical data"
            pass_criteria: "Source code repositories have access controls"
          - cmd: "aws s3api get-bucket-policy --bucket BUCKET"
            description: "Check bucket policies for technical data access"
            pass_criteria: "Technical data buckets restrict access by geography and screening"
          - cmd: "aws iam get-role-policy --role-name ROLE --policy-name POLICY"
            description: "Verify IAM policies restrict foreign national access"
            pass_criteria: "Policies enforce access controls on technical data"
        evidence_script: |
          #!/bin/bash
          echo "=== EAR-5 Technology Transfer Controls ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Technical Data Definition (EAR 734.2) ==="
          echo "  - Information required for design, development, production, or use"
          echo "  - Blueprints, plans, diagrams, models, formulae, tables, engineering designs"
          echo "  - Manuals and instructions"
          echo "  - Source code (depending on ECCN)"
          echo ""
          echo "=== CodeCommit Repositories ==="
          aws codecommit list-repositories --query 'repositories[*].repositoryName' --output table
          echo ""
          echo "=== S3 Buckets with Technical Data ==="
          aws s3api list-buckets --query 'Buckets[?contains(Name,`technical`)||contains(Name,`source`)].Name' --output table
          echo ""
          echo "NOTE: Deemed exports apply - foreign nationals accessing technical data"
          echo "within the US may require license (EAR 734.13)"
      azure:
        commands:
          - cmd: "az repos list --query '[].name'"
            description: "List Azure Repos repositories"
            pass_criteria: "Source code access is controlled"
      gcp:
        commands:
          - cmd: "gcloud source repos list"
            description: "List Cloud Source Repositories"
            pass_criteria: "Repository access restricted by geography and screening"

  EAR-6:
    title: Cloud Service Provider Attestations
    description: Verify cloud provider EAR compliance features and attestations
    cloud_tests:
      aws:
        commands:
          - cmd: "aws artifact list-reports --query 'reportsList[?reportName==`EAR` || contains(reportName,`Export`)]'"
            description: "Check AWS Artifact for EAR-related compliance reports"
            pass_criteria: "AWS provides encryption and compliance documentation"
          - cmd: "aws kms describe-key --key-id KEY_ID --query 'KeyMetadata.CustomerMasterKeySpec'"
            description: "Verify customer-managed encryption keys (CMEK)"
            pass_criteria: "CMEK configured for controlled data"
        evidence_script: |
          #!/bin/bash
          echo "=== EAR-6 Cloud Service Provider Attestations ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== AWS Compliance for EAR ==="
          echo "  - FIPS 140-2 validated encryption (AWS KMS)"
          echo "  - Customer-managed encryption keys (CMEK) available"
          echo "  - No access to customer data without permission"
          echo "  - Data residency controls via regions"
          echo ""
          echo "=== Azure Compliance for EAR ==="
          echo "  - FIPS 140-2 Level 2 validated (Azure Key Vault HSMs)"
          echo "  - Customer Lockbox for access control"
          echo "  - Encryption at rest with customer-managed keys"
          echo ""
          echo "=== GCP Compliance for EAR ==="
          echo "  - FIPS 140-2 Level 3 validated (Cloud KMS HSMs)"
          echo "  - Customer-managed encryption keys (CMEK)"
          echo "  - VPC Service Controls for data perimeter"
          echo ""
          echo "Reference: BIS FAQ on Cloud Computing and EAR"
      azure:
        commands:
          - cmd: "az keyvault key list --vault-name VAULT --query '[].attributes.enabled'"
            description: "Verify customer-managed keys in Key Vault"
            pass_criteria: "CMEK configured for EAR-controlled data"
      gcp:
        commands:
          - cmd: "gcloud kms keys list --location=LOCATION --keyring=KEYRING"
            description: "Verify Cloud KMS customer-managed keys"
            pass_criteria: "CMEK configured for controlled data"

  EAR-7:
    title: License Exception Applicability
    description: Determine if a License Exception applies instead of requiring a license
    cloud_tests:
      aws:
        commands:
          - cmd: "aws resourcegroupstaggingapi get-resources --tag-filters Key=LicenseException"
            description: "List resources using License Exceptions"
            pass_criteria: "Items using ENC, TSU, or other exceptions are documented"
          - cmd: "aws s3api get-object-tagging --bucket BUCKET --key KEY"
            description: "Check if encryption software uses License Exception ENC"
            pass_criteria: "Encryption items tagged with applicable exception (ENC, TSU)"
        evidence_script: |
          #!/bin/bash
          echo "=== EAR-7 License Exception Applicability ==="
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "=== Common License Exceptions ==="
          echo ""
          echo "ENC (Encryption):"
          echo "  - Applies to certain encryption items (ECCN 5A002, 5D002)"
          echo "  - Self-classification reporting required"
          echo "  - Available for most destinations except embargoed countries"
          echo ""
          echo "TSU (Technology and Software - Unrestricted):"
          echo "  - Publicly available technology/software"
          echo "  - Educational information"
          echo "  - Published items available to general public"
          echo ""
          echo "BAG (Baggage):"
          echo "  - Personal baggage exports"
          echo "  - Tools of trade (laptops, phones with encryption)"
          echo ""
          echo "TMP (Temporary imports/exports/re-exports):"
          echo "  - Temporary exports for testing, demo, exhibitions"
          echo ""
          echo "NOTE: License Exceptions do NOT apply to:"
          echo "  - Exports to embargoed countries (Cuba, Iran, North Korea, Syria)"
          echo "  - Exports to denied parties (Entity List, DPL)"
          echo ""
          echo "=== Resources Using License Exceptions ==="
          aws resourcegroupstaggingapi get-resources --tag-filters Key=LicenseException --query 'ResourceTagMappingList[*].{ARN:ResourceARN,Tags:Tags}' --output table
      azure:
        commands:
          - cmd: "az resource list --query '[?tags.LicenseException].{Name:name,Exception:tags.LicenseException}'"
            description: "List resources using license exceptions"
            pass_criteria: "Exception usage documented (ENC, TSU, etc.)"
      gcp:
        commands:
          - cmd: "gcloud asset search-all-resources --query='labels.license_exception:*'"
            description: "Find resources with license exception labels"
            pass_criteria: "Exception applicability documented"

aws_commercial:
  description: AWS commercial regions for EAR-controlled workloads
  benefits:
    - FIPS 140-2 Level 2+ encryption
    - Customer-managed encryption keys (CMEK)
    - Geographic access controls via WAF
    - Denied party screening via custom solutions
  recommendations:
    - Use CloudFront geo-restrictions for embargo countries
    - Tag resources with ECCN classifications
    - Implement denied party screening in provisioning workflow
    - Enable CloudTrail for audit logs

azure_commercial:
  description: Azure commercial for EAR compliance
  benefits:
    - FIPS 140-2 Level 2 Key Vault HSMs
    - Customer Lockbox for support access
    - Geographic filtering via Front Door and WAF
  recommendations:
    - Use Azure Policy to enforce CMEK
    - Tag resources with ECCN metadata
    - Implement screening via Azure Functions

gcp_commercial:
  description: GCP commercial for EAR-controlled data
  benefits:
    - FIPS 140-2 Level 3 Cloud KMS HSMs
    - VPC Service Controls for data perimeter
    - Cloud Armor for geo-blocking
  recommendations:
    - Use CMEK for all controlled data
    - Label resources with ECCN
    - Implement screening via Cloud Functions

bis_resources:
  description: Bureau of Industry and Security (BIS) resources
  links:
    - "EAR Regulations: https://www.bis.gov/regulations/ear"
    - "Commerce Control List: https://www.bis.gov/regulations/ear/738"
    - "Entity List: https://www.bis.doc.gov/index.php/policy-guidance/lists-of-parties-of-concern/entity-list"
    - "Denied Persons List: https://www.bis.doc.gov/index.php/policy-guidance/lists-of-parties-of-concern/denied-persons-list"
    - "Encryption and EAR: https://www.bis.doc.gov/index.php/encryption-and-export-administration-regulations-ear"
    - "Cloud Computing FAQ: https://www.bis.doc.gov/index.php/documents/regulation-docs/2326-cloud-computing"
